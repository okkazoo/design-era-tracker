<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Design Era — Task Join</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Literata:ital,wght@0,300;0,400;1,300&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ECEAE3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 24px 90px;
    font-family: 'JetBrains Mono', monospace;
    gap: 16px;
  }

  .header { text-align: center; }

  .page-title {
    font-size: 9px; font-weight: 600; letter-spacing: 0.2em;
    text-transform: uppercase; color: #A09888;
    margin-bottom: 6px;
  }

  .page-sub {
    font-family: 'Literata', Georgia, serif;
    font-size: 20px; font-weight: 300; color: #3A3028;
    letter-spacing: 0.01em; margin-bottom: 4px;
  }

  .progress-count {
    font-size: 9px; font-weight: 600; letter-spacing: 0.15em;
    text-transform: uppercase; color: #A09888;
    transition: color 0.3s;
  }
  .progress-count.all-done { color: #B8501E; }

  canvas { display: block; cursor: pointer; }

  .bottom-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }

  .pill-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 8px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: #A09888;
    background: none; border: 1px solid rgba(160,150,140,0.35);
    border-radius: 20px; padding: 7px 16px; cursor: pointer;
    text-decoration: none; display: inline-block;
    transition: color 0.15s, border-color 0.15s;
  }
  .pill-btn:hover { color: #3A3028; border-color: rgba(100,90,80,0.5); }
</style>
</head>
<body>

<div class="header">
  <p class="page-title">Design Era · Gothic Revival · tap to complete</p>
  <p class="page-sub">Written Draft</p>
  <p class="progress-count" id="counter">0 of 8</p>
</div>

<canvas id="c"></canvas>

<div class="bottom-row">
  <a class="pill-btn" href="https://docs.google.com/document/d/1qhYTqs4MBMqSuItfAKnL4PDtX6ODZjupmVqqXqTUePE/edit" target="_blank">&#128221; open draft</a>
  <a class="pill-btn" href="https://docs.google.com/document/d/165hVND8iHDwSE7idWdEvO1Mlh8BxPugOklV3zWaVKMQ/edit" target="_blank">&#128203; task sheet</a>
  <button class="pill-btn" id="resetBtn">&#8634; reset</button>
</div>

<script>
// ── Tasks ──────────────────────────────────────────────────────────────────
const TASKS = [
  { id:'d1', label:'Principles + Quote',       done:'Principles set',     sub:'Day 1 · Fri',  sec:'Set the Scene' },
  { id:'d2', label:'Key Player — Pugin',       done:'Pugin researched',   sub:'Day 2 · Sat',  sec:'Key Players' },
  { id:'d3', label:'Barry + Scott',            done:'Players detailed',   sub:'Day 3 · Sun',  sec:'Key Players' },
  { id:'d4', label:'Key Pieces',               done:'Pieces curated',     sub:'Day 4 · Mon',  sec:'Key Pieces' },
  { id:'d5', label:'Captions + Compare',       done:'Captioned',          sub:'Day 5 · Tue',  sec:'Summary' },
  { id:'d6', label:'Bibliography + Structure', done:'Structured',         sub:'Day 6 · Wed',  sec:'All Sections' },
  { id:'d7', label:'Proofread + Polish',       done:'Polished',           sub:'Day 7 · Thu',  sec:'All Sections' },
  { id:'d8', label:'Buffer / Final Review',    done:'Draft complete',     sub:'Day 8 · Fri',  sec:'—' },
];

const N = TASKS.length;

// ── Dimensions ─────────────────────────────────────────────────────────────
const CH  = 68;           // cell height
const GAP = 6;
const R   = 18;           // corner radius
const SW  = 1.8;          // stroke width
const I   = SW / 2;       // inset
const CW  = Math.min(380, window.innerWidth - 48);
const TH  = N * CH + (N - 1) * GAP;

// ── Colours ────────────────────────────────────────────────────────────────
const STROKE = '#B8501E';
const FILL_UNDONE_RGBA = [245, 224, 202, 0.55];
const FILL_DONE_RGBA   = [201, 122, 58,  0.22];
const FILL_SOLID_RGB   = [184, 82, 32];

// ── Canvas ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const DPR    = window.devicePixelRatio || 1;

canvas.width        = CW * DPR;
canvas.height       = TH * DPR;
canvas.style.width  = CW + 'px';
canvas.style.height = TH + 'px';
ctx.scale(DPR, DPR);

// ── State ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'design-era-join';

function makeState() {
  return Array.from({ length: N }, (_, i) => ({
    done:      false,
    homeY:     i * (CH + GAP),
    fillOp:    0,
    strokeOp:  0.25,
    divotFrac: 0,
    textFade:  0,
  }));
}

let cells     = makeState();
let solidFrac = 0;
let raf       = null;
let tgt       = cells.map(() => ({ fillOp: 0, strokeOp: 0.25, divotFrac: 0, textFade: 0 }));
let tgtSolid  = 0;

function allDone() { return cells.every(c => c.done); }

function doneCount() { return cells.filter(c => c.done).length; }

function updateCounter() {
  const el = document.getElementById('counter');
  const n = doneCount();
  el.textContent = n === N ? 'all done' : n + ' of ' + N;
  el.classList.toggle('all-done', n === N);
}

function recalcTargets() {
  tgtSolid = allDone() ? 1 : 0;
  cells.forEach((cell, i) => {
    tgt[i].fillOp   = cell.done ? 1.0 : 0;
    tgt[i].strokeOp = cell.done ? 1.0 : 0.25;
    tgt[i].textFade = cell.done ? 1.0 : 0;
    // divotFrac: merge with NEXT cell (below)
    tgt[i].divotFrac = (i < N-1 && cell.done && cells[i+1].done) ? 1 : 0;
  });
}

// ── Persistence ────────────────────────────────────────────────────────────
function saveLS() {
  const s = {};
  cells.forEach((c, i) => { if (c.done) s[TASKS[i].id] = true; });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}

function loadLS() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    cells.forEach((c, i) => {
      if (s[TASKS[i].id]) {
        c.done = true;
        c.fillOp = 1; c.strokeOp = 1; c.textFade = 1;
      }
    });
    // Snap divots for already-done neighbours
    cells.forEach((c, i) => {
      if (i < N-1 && c.done && cells[i+1].done) c.divotFrac = 1;
    });
    if (allDone()) solidFrac = 1;
  } catch {}
}

// ── Animation ──────────────────────────────────────────────────────────────
const S_FILL = 0.055, S_STROKE = 0.07, S_DIVOT = 0.06, S_TEXT = 0.045, S_SOLID = 0.04;

function tick() {
  let dirty = false;
  cells.forEach((cell, i) => {
    function step(key, speed) {
      const d = tgt[i][key] - cell[key];
      if (Math.abs(d) > 0.001) { cell[key] += d * speed; dirty = true; }
      else cell[key] = tgt[i][key];
    }
    step('fillOp',    S_FILL);
    step('strokeOp',  S_STROKE);
    step('divotFrac', S_DIVOT);
    step('textFade',  S_TEXT);
  });
  const ds = tgtSolid - solidFrac;
  if (Math.abs(ds) > 0.001) { solidFrac += ds * S_SOLID; dirty = true; }
  else solidFrac = tgtSolid;

  draw();
  raf = dirty ? requestAnimationFrame(tick) : null;
}

function kick() { if (!raf) raf = requestAnimationFrame(tick); }

// ── Colour helpers ─────────────────────────────────────────────────────────
function fillColour(fillOp) {
  const [r0,g0,b0,a0] = FILL_DONE_RGBA;
  const [rs,gs,bs]     = FILL_SOLID_RGB;
  const r = Math.round(r0 + (rs-r0)*solidFrac);
  const g = Math.round(g0 + (gs-g0)*solidFrac);
  const b = Math.round(b0 + (bs-b0)*solidFrac);
  const a = (a0 + (1-a0)*solidFrac) * fillOp;
  return `rgba(${r},${g},${b},${a.toFixed(3)})`;
}

function textColour(alpha) {
  const r = Math.round(139 + (255-139)*solidFrac);
  const g = Math.round(80  + (255-80)*solidFrac);
  const b = Math.round(32  + (255-32)*solidFrac);
  return `rgba(${r},${g},${b},${alpha.toFixed(3)})`;
}

function strokeColour(op) {
  const r = Math.round(184 + (140-184)*solidFrac);
  const g = Math.round(82  + (46-82)*solidFrac);
  const b = Math.round(32  + (18-32)*solidFrac);
  return `rgba(${r},${g},${b},${op.toFixed(3)})`;
}

// ── Paths ──────────────────────────────────────────────────────────────────
function rrPath(y) {
  const x0=I, y0=y+I, x1=CW-I, y1=y+CH-I, r=R-I;
  const p = new Path2D();
  p.moveTo(x0+r, y0);
  p.lineTo(x1-r, y0); p.quadraticCurveTo(x1, y0, x1, y0+r);
  p.lineTo(x1, y1-r); p.quadraticCurveTo(x1, y1, x1-r, y1);
  p.lineTo(x0+r, y1); p.quadraticCurveTo(x0, y1, x0, y1-r);
  p.lineTo(x0, y0+r); p.quadraticCurveTo(x0, y0, x0+r, y0);
  p.closePath();
  return p;
}

// Merged vertical run — divots pinch inward on left + right edges
function mergedPathV(ytop, ybot, joins) {
  const DF = 18, DC = 8;
  const lx=I, rx=CW-I, ty=ytop+I, by=ybot-I, r=R-I;
  const p = new Path2D();

  // Top edge
  p.moveTo(lx+r, ty);
  p.lineTo(rx-r, ty); p.quadraticCurveTo(rx, ty, rx, ty+r);

  // Right edge going down — divots pinch left
  joins.forEach(({ jy, frac }) => {
    const f = DF*frac, c = DC*frac;
    p.lineTo(rx, jy-c);
    p.quadraticCurveTo(rx-f, jy, rx, jy+c);
  });

  // Bottom-right corner
  p.lineTo(rx, by-r); p.quadraticCurveTo(rx, by, rx-r, by);

  // Bottom edge
  p.lineTo(lx+r, by); p.quadraticCurveTo(lx, by, lx, by-r);

  // Left edge going up — divots pinch right (reversed)
  [...joins].reverse().forEach(({ jy, frac }) => {
    const f = DF*frac, c = DC*frac;
    p.lineTo(lx, jy+c);
    p.quadraticCurveTo(lx+f, jy, lx, jy-c);
  });

  // Top-left corner
  p.lineTo(lx, ty+r); p.quadraticCurveTo(lx, ty, lx+r, ty);
  p.closePath();
  return p;
}

// ── Draw ───────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, CW, TH);

  // ① Undone cells
  cells.forEach(cell => {
    if (cell.done) return;
    const p = rrPath(cell.homeY);
    ctx.fillStyle = `rgba(${FILL_UNDONE_RGBA.join(',')})`;
    ctx.fill(p);
    ctx.strokeStyle = STROKE;
    ctx.lineWidth = SW;
    ctx.globalAlpha = cell.strokeOp;
    ctx.stroke(p);
    ctx.globalAlpha = 1;
  });

  // ② Done runs — merged vertical shapes
  let i = 0;
  while (i < N) {
    if (!cells[i].done) { i++; continue; }
    let j = i;
    while (j < N && cells[j].done) j++;

    const ytop = cells[i].homeY;
    const ybot = cells[j-1].homeY + CH;

    const joins = [];
    for (let k = i+1; k < j; k++) {
      const bottomPrev = cells[k-1].homeY + CH;
      const topCurr    = cells[k].homeY;
      joins.push({ jy: (bottomPrev + topCurr) / 2, frac: cells[k-1].divotFrac });
    }

    const path = (j-i === 1) ? rrPath(cells[i].homeY) : mergedPathV(ytop, ybot, joins);

    let avgFill = 0, avgStroke = 0;
    for (let k = i; k < j; k++) { avgFill += cells[k].fillOp; avgStroke += cells[k].strokeOp; }
    avgFill   /= (j-i);
    avgStroke /= (j-i);

    ctx.fillStyle   = fillColour(avgFill);
    ctx.fill(path);
    ctx.strokeStyle = strokeColour(avgStroke);
    ctx.lineWidth   = SW;
    ctx.stroke(path);

    i = j;
  }

  // ③ Text
  cells.forEach((cell, i) => {
    const t  = TASKS[i];
    const y  = cell.homeY;
    const tf = cell.textFade;
    const undoneA = (1 - tf) * 0.5;
    const doneA   = tf * 0.92;

    ctx.save();

    // Undone text
    if (undoneA > 0.005) {
      ctx.font = '300 12.5px Literata, Georgia, serif';
      ctx.fillStyle = textColour(undoneA);
      ctx.fillText(t.label, 16, y + 30);

      ctx.font = '8.5px JetBrains Mono, monospace';
      ctx.fillStyle = textColour(undoneA * 0.6);
      ctx.fillText(t.sub, 16, y + 48);

      // Section tag right-aligned
      ctx.fillStyle = textColour(undoneA * 0.35);
      ctx.font = '7.5px JetBrains Mono, monospace';
      const secW = ctx.measureText(t.sec).width;
      ctx.fillText(t.sec, CW - 16 - secW, y + 30);
    }

    // Done text
    if (doneA > 0.005) {
      ctx.font = 'italic 300 12.5px Literata, Georgia, serif';
      ctx.fillStyle = textColour(doneA);
      ctx.fillText(t.done, 16, y + 30);

      ctx.font = '8.5px JetBrains Mono, monospace';
      ctx.fillStyle = textColour(doneA * 0.65);
      ctx.fillText(t.sub, 16, y + 48);

      // Section tag right-aligned
      ctx.fillStyle = textColour(doneA * 0.4);
      ctx.font = '7.5px JetBrains Mono, monospace';
      const secW = ctx.measureText(t.sec).width;
      ctx.fillText(t.sec, CW - 16 - secW, y + 30);
    }

    ctx.restore();
  });
}

// ── Click ──────────────────────────────────────────────────────────────────
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const my = e.clientY - rect.top;
  for (let i = 0; i < N; i++) {
    const y = cells[i].homeY;
    if (my >= y && my <= y + CH) {
      cells[i].done = !cells[i].done;
      saveLS();
      updateCounter();
      recalcTargets();
      kick();
      break;
    }
  }
});

// ── Reset ──────────────────────────────────────────────────────────────────
document.getElementById('resetBtn').addEventListener('click', () => {
  if (raf) { cancelAnimationFrame(raf); raf = null; }
  cells     = makeState();
  solidFrac = 0;
  tgtSolid  = 0;
  tgt = cells.map(() => ({ fillOp: 0, strokeOp: 0.25, divotFrac: 0, textFade: 0 }));
  localStorage.removeItem(STORAGE_KEY);
  updateCounter();
  draw();
});

// ── Telegram ───────────────────────────────────────────────────────────────
if (window.Telegram && window.Telegram.WebApp) {
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();
}

// ── Init ───────────────────────────────────────────────────────────────────
loadLS();
recalcTargets();
updateCounter();
draw();
</script>
</body>
</html>
