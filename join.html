<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Design Era — Task Join</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Literata:ital,wght@0,300;0,400;1,300&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ECEAE3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 24px 90px;
    font-family: 'JetBrains Mono', monospace;
    gap: 16px;
    -webkit-user-select: none;
    user-select: none;
  }

  .header { text-align: center; }

  .page-title {
    font-size: 9px; font-weight: 600; letter-spacing: 0.2em;
    text-transform: uppercase; color: #A09888;
    margin-bottom: 6px;
  }

  .page-sub {
    font-family: 'Literata', Georgia, serif;
    font-size: 20px; font-weight: 300; color: #3A3028;
    letter-spacing: 0.01em; margin-bottom: 4px;
  }

  .progress-count {
    font-size: 9px; font-weight: 600; letter-spacing: 0.15em;
    text-transform: uppercase; color: #A09888;
    transition: color 0.3s;
  }
  .progress-count.all-done { color: #B8501E; }

  canvas { display: block; cursor: pointer; touch-action: none; -webkit-user-select: none; user-select: none; }

  /* ── Canvas wrapper ───────────────────────────────────── */
  .canvas-wrap {
    position: relative;
  }

  /* ── Detail panel ─────────────────────────────────────── */
  .detail-panel {
    position: absolute;
    left: 0;
    right: 0;
    z-index: 10;
    opacity: 0;
    transform: translateY(-6px);
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .detail-panel.open {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .detail-pointer {
    width: 12px;
    height: 12px;
    background: rgba(255,252,245,0.88);
    border: 1px solid rgba(160,150,140,0.25);
    border-right: none;
    border-bottom: none;
    transform: rotate(45deg);
    margin-left: 32px;
    margin-bottom: -7px;
    position: relative;
    z-index: 1;
  }

  .detail-inner {
    background: rgba(255,252,245,0.88);
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(160,150,140,0.25);
    border-radius: 16px;
    padding: 20px;
    position: relative;
    z-index: 2;
  }

  .detail-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .detail-title {
    font-family: 'Literata', Georgia, serif;
    font-size: 15px;
    font-weight: 400;
    color: #3A3028;
    line-height: 1.3;
  }

  .detail-day {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #A09888;
    white-space: nowrap;
    margin-left: 12px;
    margin-top: 3px;
  }

  .detail-section {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #B8501E;
    margin-bottom: 12px;
    opacity: 0.7;
  }

  .detail-bullets {
    list-style: none;
    margin: 0 0 16px 0;
    padding: 0;
  }

  .detail-bullets li {
    font-family: 'Literata', Georgia, serif;
    font-size: 12.5px;
    font-weight: 300;
    color: #5A5045;
    line-height: 1.55;
    padding: 5px 0 5px 14px;
    position: relative;
  }

  .detail-bullets li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 12px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #C4A882;
  }

  .detail-deliverable {
    font-family: 'Literata', Georgia, serif;
    font-size: 11.5px;
    font-weight: 300;
    font-style: italic;
    color: #8B6030;
    padding: 10px 0;
    border-top: 1px solid rgba(160,150,140,0.2);
    margin-bottom: 16px;
  }

  .detail-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .action-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-radius: 20px;
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.2s ease;
    border: none;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }

  .action-btn:active { transform: scale(0.96); }

  .btn-complete {
    background: #B8501E;
    color: #F5E0CA;
  }

  .btn-complete.is-done {
    background: rgba(160,150,140,0.2);
    color: #A09888;
  }

  .btn-close {
    background: rgba(160,150,140,0.15);
    color: #A09888;
    width: 32px;
    height: 32px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0;
    text-transform: none;
    margin-left: auto;
    border-radius: 50%;
  }

  .btn-pass {
    background: none;
    border: 1px solid rgba(123,139,111,0.4);
    color: #7B8B6F;
  }
  .btn-pass.is-passed {
    background: rgba(123,139,111,0.12);
    color: #7B8B6F;
  }

  .detail-links {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .btn-doc {
    background: none;
    border: 1px dashed rgba(160,150,140,0.4);
    color: #A09888;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-radius: 8px;
    padding: 6px 14px;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-doc:active { color: #3A3028; border-color: rgba(100,90,80,0.5); }

  /* ── Bottom row ───────────────────────────────────────── */
  .bottom-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }

  .pill-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 8px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: #A09888;
    background: none; border: 1px solid rgba(160,150,140,0.35);
    border-radius: 20px; padding: 7px 16px; cursor: pointer;
    text-decoration: none; display: inline-block;
    transition: color 0.15s, border-color 0.15s;
  }
  .pill-btn:hover { color: #3A3028; border-color: rgba(100,90,80,0.5); }
</style>
</head>
<body>

<div class="header">
  <p class="page-title">Design Era · Gothic Revival</p>
  <p class="page-sub">Written Draft</p>
  <p class="progress-count" id="counter">Due Friday 14 March</p>
</div>

<div class="canvas-wrap" id="canvasWrap">
  <canvas id="c"></canvas>

  <div class="detail-panel" id="detailPanel">
    <div class="detail-pointer" id="detailPointer"></div>
    <div class="detail-inner">
    <div class="detail-head">
      <span class="detail-title" id="detailTitle"></span>
      <span class="detail-day" id="detailDay"></span>
    </div>
    <div class="detail-section" id="detailSection"></div>
    <ul class="detail-bullets" id="detailBullets"></ul>
    <div class="detail-deliverable" id="detailDeliverable"></div>
    <div class="detail-actions">
      <button class="action-btn btn-complete" id="btnComplete"></button>
      <button class="action-btn btn-pass" id="btnPass">pass</button>
      <button class="action-btn btn-close" id="btnClose">&times;</button>
    </div>
    <div class="detail-links">
      <a class="btn-doc" id="btnDoc" target="_blank">&#8599; open doc</a>
    </div>
  </div>
</div>
</div>

<div class="bottom-row">
  <button class="pill-btn" id="resetBtn">&#8634; reset</button>
</div>

<script>
// ── Tasks with detail bullets ──────────────────────────────────────────────
const TASKS = [
  { id:'d1', label:'Principles + Quote', done:'Principles set', sub:'List design principles, find a Ruskin or Pugin quote', sec:'Set the Scene',
    bullets: [
      'Write one paragraph listing Gothic Revival design principles\u2009—\u2009pointed arches, ribbed vaults, flying buttresses, tracery, stained glass, cluster columns, verticality, quatrefoils',
      'Find a quote from John Ruskin or A.W.N. Pugin about craftsmanship vs industrialisation',
      'Slot the quote into your Set the Scene section with attribution',
    ],
    deliverable: 'A new principles paragraph + a quote with attribution in your doc',
    url: 'https://docs.google.com/document/d/1qhYTqs4MBMqSuItfAKnL4PDtX6ODZjupmVqqXqTUePE/edit',
  },
  { id:'d2', label:'Key Player \u2014 Pugin', done:'Pugin researched', sub:'Research Pugin\u2019s faith, Parliament, Contrasts', sec:'Key Players',
    bullets: [
      'Research A.W.N. Pugin: Catholic faith driving his Gothic obsession',
      'His work on the Houses of Parliament interiors',
      'His book Contrasts (1836) comparing medieval vs industrial architecture',
      'Write 4\u20135 sentences: who he was, what drove him, his key contribution',
    ],
    deliverable: 'Pugin has his own mini-section under Key Players',
    url: 'https://docs.google.com/document/d/1qhYTqs4MBMqSuItfAKnL4PDtX6ODZjupmVqqXqTUePE/edit',
  },
  { id:'d3', label:'Barry + Scott', done:'Players detailed', sub:'Write up Barry and Scott, 3\u20134 sentences each', sec:'Key Players',
    bullets: [
      'Sir Charles Barry: classical architect, won the Parliament competition, partnered with Pugin\u2009—\u20093\u20134 sentences',
      'Sir George Gilbert Scott: prolific restorer, designed St Pancras Station hotel, Albert Memorial\u2009—\u20093\u20134 sentences',
    ],
    deliverable: 'All four Key Players (Walpole, Pugin, Barry, Scott) have detail',
    url: 'https://docs.google.com/document/d/1qhYTqs4MBMqSuItfAKnL4PDtX6ODZjupmVqqXqTUePE/edit',
  },
  { id:'d4', label:'Key Pieces', done:'Pieces curated', sub:'Pick 2\u20133 buildings, image + analysis for each', sec:'Key Pieces',
    bullets: [
      'Pick 2\u20133 buildings beyond Strawberry Hill and Parliament',
      'Good options: St Pancras Station (Scott, 1868), All Saints Margaret Street (Butterfield, 1859), Victoria Tower',
      'For each: find an image, write 2\u20133 sentences on visible Gothic design elements',
    ],
    deliverable: '4\u20135 Key Pieces total, each with image + name/date/designer + analysis',
    url: 'https://docs.google.com/document/d/1qhYTqs4MBMqSuItfAKnL4PDtX6ODZjupmVqqXqTUePE/edit',
  },
  { id:'d5', label:'Captions + Compare', done:'Captioned', sub:'Caption all images, expand Arts & Crafts comparison', sec:'Summary',
    bullets: [
      'Add proper captions to ALL images: building name, architect, date, source',
      'Expand Arts & Crafts comparison: shared values (anti-industrial, handmade) vs differences (grand architecture vs domestic crafts)',
    ],
    deliverable: 'Every image captioned, comparison section is 5\u20136 sentences',
    url: 'https://docs.google.com/document/d/1qhYTqs4MBMqSuItfAKnL4PDtX6ODZjupmVqqXqTUePE/edit',
  },
  { id:'d6', label:'Bibliography + Structure', done:'Structured', sub:'Compile sources, check doc matches task sheet order', sec:'All Sections',
    bullets: [
      'Compile sources list (websites, books, image credits)',
      'Re-read whole doc against task sheet: Intro \u2192 Set the Scene \u2192 Key Players \u2192 Key Pieces \u2192 Summary',
      'Move any paragraphs into the correct section',
    ],
    deliverable: 'Bibliography exists and doc follows the required structure',
    url: 'https://docs.google.com/document/d/165hVND8iHDwSE7idWdEvO1Mlh8BxPugOklV3zWaVKMQ/edit',
  },
  { id:'d7', label:'Proofread + Polish', done:'Polished', sub:'Fix spelling, read aloud, check Excellence criteria', sec:'All Sections',
    bullets: [
      'Fix spelling: "granger" \u2192 "grandeur", "Meany" \u2192 "Many", "themes" \u2192 "Thames", "Shean" \u2192 "Shein", "peak" \u2192 "pique"',
      'Read aloud for flow\u2009—\u2009tighten rambling sentences',
      'Check against Excellence criteria: are you interpreting the movement\u2019s characteristics, not just describing them?',
    ],
    deliverable: 'Clean, error-free draft ready to show BKJ',
    url: 'https://docs.google.com/document/d/1qhYTqs4MBMqSuItfAKnL4PDtX6ODZjupmVqqXqTUePE/edit',
  },
  { id:'d8', label:'Buffer / Final Review', done:'Draft complete', sub:'Catch up or strengthen weak sections', sec:'\u2014',
    bullets: [
      'Catch-up day if anything ran over',
      'Or: add one more image, strengthen a weak section, get teacher feedback',
    ],
    deliverable: 'Polished written draft complete',
    url: 'https://docs.google.com/document/d/1qhYTqs4MBMqSuItfAKnL4PDtX6ODZjupmVqqXqTUePE/edit',
  },
];

const N = TASKS.length;

// ── Dimensions ─────────────────────────────────────────────────────────────
const CH  = 68;
const GAP = 6;
const R   = 18;
const SW  = 1.8;
const II  = SW / 2;
const CW  = Math.min(380, window.innerWidth - 48);
const TH  = N * CH + (N - 1) * GAP;

// ── Colours ────────────────────────────────────────────────────────────────
const STROKE = '#B8501E';
const PASS_STROKE = '#7B8B6F';
const FILL_UNDONE_RGBA = [245, 224, 202, 0.55];
const FILL_DONE_RGBA   = [201, 122, 58,  0.22];
const FILL_SOLID_RGB   = [184, 82, 32];

// ── Canvas ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const DPR    = window.devicePixelRatio || 1;

canvas.width        = CW * DPR;
canvas.height       = TH * DPR;
canvas.style.width  = CW + 'px';
canvas.style.height = TH + 'px';
ctx.scale(DPR, DPR);

// ── State ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'design-era-join';
let selectedIdx = -1;

function makeState() {
  return Array.from({ length: N }, (_, i) => ({
    done:      false,
    passed:    false,
    homeY:     i * (CH + GAP),
    fillOp:    0,
    strokeOp:  0.25,
    divotFrac: 0,
    textFade:  0,
  }));
}

let cells     = makeState();
let solidFrac = 0;
let raf       = null;
let tgt       = cells.map(() => ({ fillOp: 0, strokeOp: 0.25, divotFrac: 0, textFade: 0 }));
let tgtSolid  = 0;

function doneCount() { return cells.filter(c => c.done).length; }
function passCount() { return cells.filter(c => c.passed).length; }

function updateCounter() { /* static due date, no-op */ }

function recalcTargets() {
  tgtSolid = cells.every(c => c.done) ? 1 : 0;
  cells.forEach((cell, i) => {
    tgt[i].fillOp    = cell.done ? 1.0 : 0;
    tgt[i].strokeOp  = cell.done ? 1.0 : 0.25;
    tgt[i].textFade  = cell.done ? 1.0 : 0;
    tgt[i].divotFrac = (i < N-1 && cell.done && cells[i+1].done) ? 1 : 0;
  });
}

// ── Persistence ────────────────────────────────────────────────────────────
function saveLS() {
  const s = {};
  cells.forEach((c, i) => {
    if (c.done) s[TASKS[i].id] = 'done';
    else if (c.passed) s[TASKS[i].id] = 'passed';
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}

function loadLS() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    cells.forEach((c, i) => {
      const v = s[TASKS[i].id];
      if (v === true || v === 'done') {
        c.done = true;
        c.fillOp = 1; c.strokeOp = 1; c.textFade = 1;
      } else if (v === 'passed') {
        c.passed = true;
      }
    });
    cells.forEach((c, i) => {
      if (i < N-1 && c.done && cells[i+1].done) c.divotFrac = 1;
    });
    if (cells.every(c => c.done)) solidFrac = 1;
  } catch {}
}

// ── Detail panel ───────────────────────────────────────────────────────────
const panel     = document.getElementById('detailPanel');
const elTitle   = document.getElementById('detailTitle');
const elDay     = document.getElementById('detailDay');
const elSection = document.getElementById('detailSection');
const elBullets = document.getElementById('detailBullets');
const elDeliv   = document.getElementById('detailDeliverable');
const btnComp   = document.getElementById('btnComplete');
const btnPass   = document.getElementById('btnPass');
const btnDoc    = document.getElementById('btnDoc');
const btnClose  = document.getElementById('btnClose');

function refreshDetailButtons(idx) {
  const isDone = cells[idx].done;
  const isPassed = cells[idx].passed;
  if (isDone) {
    btnComp.textContent = 'mark incomplete';
    btnComp.classList.add('is-done');
    btnPass.style.display = 'none';
  } else if (isPassed) {
    btnComp.textContent = 'mark complete';
    btnComp.classList.remove('is-done');
    btnPass.textContent = 'unpass';
    btnPass.classList.add('is-passed');
    btnPass.style.display = '';
  } else {
    btnComp.textContent = 'mark complete';
    btnComp.classList.remove('is-done');
    btnPass.textContent = 'pass';
    btnPass.classList.remove('is-passed');
    btnPass.style.display = '';
  }
}

function showDetail(idx) {
  if (idx === selectedIdx) { hideDetail(); return; }
  selectedIdx = idx;
  const t = TASKS[idx];

  elTitle.textContent   = t.label;
  elDay.textContent     = 'Task ' + (idx + 1);
  elSection.textContent = t.sec;
  elBullets.innerHTML   = t.bullets.map(b => '<li>' + b + '</li>').join('');
  elDeliv.textContent   = '\u2714 ' + t.deliverable;
  btnDoc.href           = t.url;

  refreshDetailButtons(idx);

  const cellBottom = cells[idx].homeY + CH + 4;
  panel.style.top = cellBottom + 'px';
  panel.classList.add('open');

  setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
}

function hideDetail() {
  selectedIdx = -1;
  panel.classList.remove('open');
}

function toggleDone(idx) {
  if (cells[idx].done) {
    cells[idx].done = false;
  } else {
    cells[idx].done = true;
    cells[idx].passed = false;
  }
  saveLS(); updateCounter(); recalcTargets(); kick();
  if (selectedIdx === idx) refreshDetailButtons(idx);
}

function togglePass(idx) {
  if (cells[idx].passed) {
    cells[idx].passed = false;
  } else {
    cells[idx].passed = true;
    cells[idx].done = false;
  }
  saveLS(); updateCounter(); recalcTargets(); kick();
  if (selectedIdx === idx) refreshDetailButtons(idx);
}

btnComp.addEventListener('click', () => {
  if (selectedIdx >= 0) { toggleDone(selectedIdx); hideDetail(); draw(); }
});

btnPass.addEventListener('click', () => {
  if (selectedIdx >= 0) { togglePass(selectedIdx); hideDetail(); draw(); }
});

btnClose.addEventListener('click', () => { hideDetail(); draw(); });

// ── Animation ──────────────────────────────────────────────────────────────
const S_FILL = 0.055, S_STROKE = 0.07, S_DIVOT = 0.06, S_TEXT = 0.045, S_SOLID = 0.04;

function tick() {
  let dirty = false;
  cells.forEach((cell, i) => {
    function step(key, speed) {
      const d = tgt[i][key] - cell[key];
      if (Math.abs(d) > 0.001) { cell[key] += d * speed; dirty = true; }
      else cell[key] = tgt[i][key];
    }
    step('fillOp',    S_FILL);
    step('strokeOp',  S_STROKE);
    step('divotFrac', S_DIVOT);
    step('textFade',  S_TEXT);
  });
  const ds = tgtSolid - solidFrac;
  if (Math.abs(ds) > 0.001) { solidFrac += ds * S_SOLID; dirty = true; }
  else solidFrac = tgtSolid;

  draw();
  raf = dirty ? requestAnimationFrame(tick) : null;
}

function kick() { if (!raf) raf = requestAnimationFrame(tick); }

// ── Colour helpers ─────────────────────────────────────────────────────────
function fillColour(fillOp) {
  const [r0,g0,b0,a0] = FILL_DONE_RGBA;
  const [rs,gs,bs]     = FILL_SOLID_RGB;
  const r = Math.round(r0 + (rs-r0)*solidFrac);
  const g = Math.round(g0 + (gs-g0)*solidFrac);
  const b = Math.round(b0 + (bs-b0)*solidFrac);
  const a = (a0 + (1-a0)*solidFrac) * fillOp;
  return `rgba(${r},${g},${b},${a.toFixed(3)})`;
}

function textColour(alpha) {
  const r = Math.round(139 + (255-139)*solidFrac);
  const g = Math.round(80  + (255-80)*solidFrac);
  const b = Math.round(32  + (255-32)*solidFrac);
  return `rgba(${r},${g},${b},${alpha.toFixed(3)})`;
}

function strokeColour(op) {
  const r = Math.round(184 + (140-184)*solidFrac);
  const g = Math.round(82  + (46-82)*solidFrac);
  const b = Math.round(32  + (18-32)*solidFrac);
  return `rgba(${r},${g},${b},${op.toFixed(3)})`;
}

// ── Paths ──────────────────────────────────────────────────────────────────
function rrPath(y) {
  const x0=II, y0=y+II, x1=CW-II, y1=y+CH-II, r=R-II;
  const p = new Path2D();
  p.moveTo(x0+r, y0);
  p.lineTo(x1-r, y0); p.quadraticCurveTo(x1, y0, x1, y0+r);
  p.lineTo(x1, y1-r); p.quadraticCurveTo(x1, y1, x1-r, y1);
  p.lineTo(x0+r, y1); p.quadraticCurveTo(x0, y1, x0, y1-r);
  p.lineTo(x0, y0+r); p.quadraticCurveTo(x0, y0, x0+r, y0);
  p.closePath();
  return p;
}

function mergedPathV(ytop, ybot, joins) {
  const DF = 18, DC = 8;
  const lx=II, rx=CW-II, ty=ytop+II, by=ybot-II, r=R-II;
  const p = new Path2D();

  p.moveTo(lx+r, ty);
  p.lineTo(rx-r, ty); p.quadraticCurveTo(rx, ty, rx, ty+r);

  joins.forEach(({ jy, frac }) => {
    const f = DF*frac, c = DC*frac;
    p.lineTo(rx, jy-c);
    p.quadraticCurveTo(rx-f, jy, rx, jy+c);
  });

  p.lineTo(rx, by-r); p.quadraticCurveTo(rx, by, rx-r, by);
  p.lineTo(lx+r, by); p.quadraticCurveTo(lx, by, lx, by-r);

  [...joins].reverse().forEach(({ jy, frac }) => {
    const f = DF*frac, c = DC*frac;
    p.lineTo(lx, jy+c);
    p.quadraticCurveTo(lx+f, jy, lx, jy-c);
  });

  p.lineTo(lx, ty+r); p.quadraticCurveTo(lx, ty, lx+r, ty);
  p.closePath();
  return p;
}

// ── Border animation (center-top/bottom → corners → side midpoints) ─────
function drawBorderAnim(homeY, progress, isDone) {
  const x0 = II, y0 = homeY + II;
  const x1 = CW - II, y1 = homeY + CH - II;
  const r = R - II;
  const cx = (x0 + x1) / 2;
  const cy = (y0 + y1) / 2;

  const halfW = cx - x0 - r;
  const arcL  = (Math.PI / 2) * r;
  const halfH = cy - y0 - r;
  const arm   = halfW + arcL + halfH;
  const dist  = progress * arm;

  ctx.lineCap = 'round';

  function traceArm(segs) {
    let rem = dist;
    ctx.beginPath();
    let on = false;
    for (const s of segs) {
      if (rem <= 0) break;
      if (s.type === 'line') {
        const len = Math.hypot(s.ex - s.sx, s.ey - s.sy);
        const t = Math.min(rem / len, 1);
        if (!on) { ctx.moveTo(s.sx, s.sy); on = true; }
        ctx.lineTo(s.sx + (s.ex - s.sx) * t, s.sy + (s.ey - s.sy) * t);
        rem -= len;
      } else {
        const aLen = Math.abs(s.ea - s.sa) * r;
        const t = Math.min(rem / aLen, 1);
        if (!on) {
          ctx.moveTo(s.cx + r * Math.cos(s.sa), s.cy + r * Math.sin(s.sa));
          on = true;
        }
        ctx.arc(s.cx, s.cy, r, s.sa, s.sa + (s.ea - s.sa) * t, s.ccw);
        rem -= aLen;
      }
    }
    ctx.stroke();
  }

  const arms = [
    // TR
    [{ type: 'line', sx: cx, sy: y0, ex: x1 - r, ey: y0 },
     { type: 'arc', cx: x1 - r, cy: y0 + r, sa: -Math.PI/2, ea: 0, ccw: false },
     { type: 'line', sx: x1, sy: y0 + r, ex: x1, ey: cy }],
    // TL
    [{ type: 'line', sx: cx, sy: y0, ex: x0 + r, ey: y0 },
     { type: 'arc', cx: x0 + r, cy: y0 + r, sa: -Math.PI/2, ea: -Math.PI, ccw: true },
     { type: 'line', sx: x0, sy: y0 + r, ex: x0, ey: cy }],
    // BR
    [{ type: 'line', sx: cx, sy: y1, ex: x1 - r, ey: y1 },
     { type: 'arc', cx: x1 - r, cy: y1 - r, sa: Math.PI/2, ea: 0, ccw: true },
     { type: 'line', sx: x1, sy: y1 - r, ex: x1, ey: cy }],
    // BL
    [{ type: 'line', sx: cx, sy: y1, ex: x0 + r, ey: y1 },
     { type: 'arc', cx: x0 + r, cy: y1 - r, sa: Math.PI/2, ea: Math.PI, ccw: false },
     { type: 'line', sx: x0, sy: y1 - r, ex: x0, ey: cy }],
  ];

  if (isDone) {
    // Uncompleting: erase the done border first, then draw faint border on top
    ctx.strokeStyle = '#ECEAE3';
    ctx.globalAlpha = 1;
    ctx.lineWidth = SW + 2;
    arms.forEach(a => traceArm(a));

    ctx.strokeStyle = STROKE;
    ctx.globalAlpha = 0.25;
    ctx.lineWidth = SW;
    arms.forEach(a => traceArm(a));
  } else {
    // Completing: draw full-opacity border
    ctx.strokeStyle = STROKE;
    ctx.globalAlpha = 1;
    ctx.lineWidth = SW;
    arms.forEach(a => traceArm(a));
  }
  ctx.globalAlpha = 1;
}

// ── Draw ───────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, CW, TH);

  // ① Undone and passed cells
  cells.forEach((cell, idx) => {
    if (cell.done) return;
    const p = rrPath(cell.homeY);

    if (cell.passed) {
      ctx.fillStyle = 'rgba(123,139,111,0.10)';
      ctx.fill(p);
      ctx.strokeStyle = PASS_STROKE;
      ctx.lineWidth = SW;
      ctx.globalAlpha = 0.55;
      ctx.stroke(p);
      ctx.globalAlpha = 1;
    } else if (idx === selectedIdx) {
      ctx.fillStyle = 'rgba(245,224,202,0.85)';
      ctx.fill(p);
      ctx.strokeStyle = STROKE;
      ctx.lineWidth = SW;
      ctx.globalAlpha = 0.6;
      ctx.stroke(p);
      ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = `rgba(${FILL_UNDONE_RGBA.join(',')})`;
      ctx.fill(p);
      ctx.strokeStyle = STROKE;
      ctx.lineWidth = SW;
      ctx.globalAlpha = cell.strokeOp;
      ctx.stroke(p);
      ctx.globalAlpha = 1;
    }
  });

  // ② Done runs (merged cells)
  let i = 0;
  while (i < N) {
    if (!cells[i].done) { i++; continue; }
    let j = i;
    while (j < N && cells[j].done) j++;

    const ytop = cells[i].homeY;
    const ybot = cells[j-1].homeY + CH;

    const joins = [];
    for (let k = i+1; k < j; k++) {
      const bottomPrev = cells[k-1].homeY + CH;
      const topCurr    = cells[k].homeY;
      joins.push({ jy: (bottomPrev + topCurr) / 2, frac: cells[k-1].divotFrac });
    }

    const path = (j-i === 1) ? rrPath(cells[i].homeY) : mergedPathV(ytop, ybot, joins);

    let avgFill = 0, avgStroke = 0;
    for (let k = i; k < j; k++) { avgFill += cells[k].fillOp; avgStroke += cells[k].strokeOp; }
    avgFill   /= (j-i);
    avgStroke /= (j-i);

    ctx.fillStyle   = fillColour(avgFill);
    ctx.fill(path);
    ctx.strokeStyle = strokeColour(avgStroke);
    ctx.lineWidth   = SW;
    ctx.stroke(path);

    i = j;
  }

  // ③ Text
  cells.forEach((cell, idx) => {
    const t  = TASKS[idx];
    const y  = cell.homeY;
    const selBoost = (idx === selectedIdx) ? 1.6 : 1.0;

    ctx.save();

    const num = String(idx + 1);

    if (cell.passed) {
      ctx.font = '300 12.5px Literata, Georgia, serif';
      ctx.fillStyle = 'rgba(123,139,111,0.45)';
      ctx.fillText(t.label, 16, y + 30);

      ctx.font = '8.5px JetBrains Mono, monospace';
      ctx.fillStyle = 'rgba(123,139,111,0.3)';
      ctx.fillText(t.sub, 16, y + 48);

      ctx.font = '7.5px JetBrains Mono, monospace';
      ctx.fillStyle = 'rgba(123,139,111,0.35)';
      const nw = ctx.measureText(num).width;
      ctx.fillText(num, CW - 16 - nw, y + 30);
    } else {
      const tf = cell.textFade;
      const undoneA = (1 - tf) * 0.5;
      const doneA   = tf * 0.92;

      if (undoneA > 0.005) {
        ctx.font = '300 12.5px Literata, Georgia, serif';
        ctx.fillStyle = textColour(Math.min(undoneA * selBoost, 1));
        ctx.fillText(t.label, 16, y + 30);

        ctx.font = '8.5px JetBrains Mono, monospace';
        ctx.fillStyle = textColour(Math.min(undoneA * 0.6 * selBoost, 1));
        ctx.fillText(t.sub, 16, y + 48);

        ctx.fillStyle = textColour(undoneA * 0.35 * selBoost);
        ctx.font = '7.5px JetBrains Mono, monospace';
        const nw = ctx.measureText(num).width;
        ctx.fillText(num, CW - 16 - nw, y + 30);
      }

      if (doneA > 0.005) {
        ctx.font = 'italic 300 12.5px Literata, Georgia, serif';
        ctx.fillStyle = textColour(doneA);
        ctx.fillText(t.done, 16, y + 30);

        ctx.font = '8.5px JetBrains Mono, monospace';
        ctx.fillStyle = textColour(doneA * 0.65);
        ctx.fillText(t.sub, 16, y + 48);

        ctx.fillStyle = textColour(doneA * 0.4);
        ctx.font = '7.5px JetBrains Mono, monospace';
        const nw = ctx.measureText(num).width;
        ctx.fillText(num, CW - 16 - nw, y + 30);
      }
    }

    ctx.restore();
  });

  // ④ Hold border animation
  if (pressIdx >= 0 && holdProg > 0 && !holdDone) {
    drawBorderAnim(cells[pressIdx].homeY, holdProg, cells[pressIdx].done);
  }
}

// ── Long press to complete ──────────────────────────────────────────────────
const HOLD_MS = 500;
let pressIdx   = -1;
let pressStart = 0;
let holdProg   = 0;
let holdDone   = false;
let holdRaf    = null;

function hitCell(clientY) {
  const rect = canvas.getBoundingClientRect();
  const my = clientY - rect.top;
  for (let i = 0; i < N; i++) {
    const y = cells[i].homeY;
    if (my >= y && my <= y + CH) return i;
  }
  return -1;
}

function holdTick() {
  if (pressIdx < 0) return;
  const elapsed = Date.now() - pressStart;
  holdProg = Math.min(elapsed / HOLD_MS, 1);
  draw();

  if (holdProg >= 1 && !holdDone) {
    holdDone = true;
    if (navigator.vibrate) navigator.vibrate(18);
    toggleDone(pressIdx);
    setTimeout(() => { holdProg = 0; pressIdx = -1; draw(); }, 150);
    return;
  }
  if (!holdDone) holdRaf = requestAnimationFrame(holdTick);
}

function cancelHold() {
  if (holdRaf) { cancelAnimationFrame(holdRaf); holdRaf = null; }
  pressIdx = -1; holdProg = 0; holdDone = false;
  draw();
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);

  const idx = hitCell(e.clientY);
  if (idx < 0) { pressIdx = -1; return; }

  pressIdx   = idx;
  pressStart = Date.now();
  holdProg   = 0;
  holdDone   = false;
  holdRaf    = requestAnimationFrame(holdTick);
});

canvas.addEventListener('pointermove', e => {
  if (pressIdx < 0) return;
  const idx = hitCell(e.clientY);
  if (idx !== pressIdx) cancelHold();
});

canvas.addEventListener('pointerup', e => {
  if (holdRaf) { cancelAnimationFrame(holdRaf); holdRaf = null; }
  const elapsed = Date.now() - pressStart;
  const idx = pressIdx;
  pressIdx = -1; holdProg = 0;

  if (holdDone) { holdDone = false; draw(); return; }
  holdDone = false;
  draw();

  if (idx >= 0 && elapsed < 250) {
    showDetail(idx);
    draw();
  }
});

canvas.addEventListener('pointercancel', cancelHold);
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ── Reset ──────────────────────────────────────────────────────────────────
document.getElementById('resetBtn').addEventListener('click', () => {
  if (raf) { cancelAnimationFrame(raf); raf = null; }
  cells     = makeState();
  solidFrac = 0;
  tgtSolid  = 0;
  tgt = cells.map(() => ({ fillOp: 0, strokeOp: 0.25, divotFrac: 0, textFade: 0 }));
  localStorage.removeItem(STORAGE_KEY);
  hideDetail();
  updateCounter();
  draw();
});

// ── Telegram ───────────────────────────────────────────────────────────────
if (window.Telegram && window.Telegram.WebApp) {
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();
}

// ── Resize wrapper to fit panel below last cell ────────────────────────────
function updateWrapHeight() {
  const wrap = document.getElementById('canvasWrap');
  if (selectedIdx >= 0) {
    const panelH = panel.querySelector('.detail-inner').offsetHeight + 20;
    const needed = cells[selectedIdx].homeY + CH + 4 + panelH;
    wrap.style.minHeight = Math.max(TH, needed) + 'px';
  } else {
    wrap.style.minHeight = TH + 'px';
  }
}

const resizeObs = new MutationObserver(updateWrapHeight);
resizeObs.observe(panel, { attributes: true, attributeFilter: ['class'] });

// ── Init ───────────────────────────────────────────────────────────────────
loadLS();
recalcTargets();
updateCounter();
draw();
document.getElementById('canvasWrap').style.minHeight = TH + 'px';
</script>
</body>
