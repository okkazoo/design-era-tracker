// TaskCanvas: self-contained canvas with inline-expand detail
function TaskCanvas(wrapEl, tasks, storageKey, colors, panelId) {
  const self = this;
  const PASS_STROKE = '#7B8B6F';
  const FINAL_STROKE = '#C49A3C';

  const N = tasks.length;
  const CH = 78, GAP = 6, R = 18, SW = 1.8, II = SW / 2;
  const CW = Math.min(340, wrapEl.offsetWidth || 340);

  const _SR = colors.ACCENT_RGB[0], _SG = colors.ACCENT_RGB[1], _SB = colors.ACCENT_RGB[2];
  const _TR = colors.TEXT_BASE[0], _TG = colors.TEXT_BASE[1], _TB = colors.TEXT_BASE[2];
  const _STR = colors.STROKE_TARGET[0], _STG = colors.STROKE_TARGET[1], _STB = colors.STROKE_TARGET[2];

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const DPR = window.devicePixelRatio || 1;
  wrapEl.querySelector('.tc-canvas-slot').appendChild(canvas);

  let selectedIdx = -1;
  let expandIdx = -1; // which cell currently has expand height (may differ from selectedIdx during collapse)
  let expandH = 0, expandTarget = 0; // animated expand height

  // textBtm: Y offset from cell top where text ends (for detail panel positioning)
  let cells = Array.from({ length: N }, (_, i) => ({
    done: false, passed: false, homeY: 0, textBtm: CH,
    fillOp: 0, strokeOp: 0.25, divotFrac: 0, textFade: 0,
  }));
  let solidFrac = 0, tgtSolid = 0;
  let raf = null;
  let tgt = cells.map(() => ({ fillOp: 0, strokeOp: 0.25, divotFrac: 0, textFade: 0 }));

  // Dynamic layout — cell height includes expand area
  // Base cell height accounts for text wrapping
  function baseCellH(idx) { return Math.max(CH, cells[idx].textBtm + 26); }
  function cellH(idx) { return baseCellH(idx) + (idx === expandIdx ? expandH : 0); }

  function computeLayout() {
    let y = 0;
    for (let i = 0; i < N; i++) {
      cells[i].homeY = y;
      y += cellH(i) + GAP;
    }
  }

  function totalH() {
    let h = 0;
    for (let i = 0; i < N; i++) h += cellH(i);
    return h + (N - 1) * GAP;
  }

  function resizeCanvas() {
    const th = totalH();
    canvas.width = CW * DPR;
    canvas.height = th * DPR;
    canvas.style.width = CW + 'px';
    canvas.style.height = th + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    wrapEl.style.minHeight = (th + 40) + 'px';
  }

  function isLocked(idx) {
    const reqs = tasks[idx].requires;
    if (!reqs || reqs.length === 0) return false;
    return reqs.some(r => r !== idx && !cells[r].done && !cells[r].passed);
  }
  function pendingDeps(idx) {
    const reqs = tasks[idx].requires;
    if (!reqs) return [];
    return reqs.filter(r => r !== idx && !cells[r].done && !cells[r].passed);
  }

  function doneCount() { return cells.filter(c => c.done).length; }
  function passCount() { return cells.filter(c => c.passed).length; }
  function updateCounter() {
    const done = doneCount(), skip = passCount(), todo = N - done - skip;
    const pd = wrapEl.querySelector('.tp-done'), pt = wrapEl.querySelector('.tp-todo'), ps = wrapEl.querySelector('.tp-skip');
    if (pd) { pd.textContent = done + ' complete'; pd.style.display = done > 0 ? '' : 'none'; }
    if (pt) { pt.textContent = todo + ' to do'; pt.style.display = todo > 0 ? '' : 'none'; }
    if (ps) { ps.textContent = skip + ' skipped'; ps.style.display = skip > 0 ? '' : 'none'; }
  }

  function recalcTargets() {
    tgtSolid = cells.every(c => c.done || c.passed) ? 1 : 0;
    cells.forEach((cell, i) => {
      tgt[i].fillOp = cell.done ? 1.0 : 0;
      tgt[i].strokeOp = cell.done ? 1.0 : 0.25;
      tgt[i].textFade = cell.done ? 1.0 : 0;
      tgt[i].divotFrac = (i < N - 1 && cell.done && cells[i + 1].done) ? 1 : 0;
    });
  }

  function saveLS() {
    const s = {};
    cells.forEach((c, i) => {
      if (c.done) s[tasks[i].id] = 'done';
      else if (c.passed) s[tasks[i].id] = 'passed';
    });
    localStorage.setItem(storageKey, JSON.stringify(s));
  }

  function loadLS() {
    try {
      const s = JSON.parse(localStorage.getItem(storageKey)) || {};
      cells.forEach((c, i) => {
        const v = s[tasks[i].id];
        if (v === true || v === 'done') { c.done = true; c.fillOp = 1; c.strokeOp = 1; c.textFade = 1; }
        else if (v === 'passed') { c.passed = true; }
      });
      cells.forEach((c, i) => { if (i < N - 1 && c.done && cells[i + 1].done) c.divotFrac = 1; });
      if (cells.every(c => c.done || c.passed)) solidFrac = 1;
    } catch {}
  }

  // Color helpers
  function fillColour(fillOp) {
    const [r0,g0,b0,a0] = colors.FILL_DONE;
    const [rs,gs,bs] = colors.FILL_SOLID;
    const r = Math.round(r0 + (rs-r0)*solidFrac);
    const g = Math.round(g0 + (gs-g0)*solidFrac);
    const b = Math.round(b0 + (bs-b0)*solidFrac);
    const a = (a0 + (1-a0)*solidFrac) * fillOp;
    return `rgba(${r},${g},${b},${a.toFixed(3)})`;
  }
  function textColour(alpha) {
    const r = Math.round(_TR + (255-_TR)*solidFrac);
    const g = Math.round(_TG + (255-_TG)*solidFrac);
    const b = Math.round(_TB + (255-_TB)*solidFrac);
    return `rgba(${r},${g},${b},${alpha.toFixed(3)})`;
  }
  function strokeColour(op) {
    const r = Math.round(_SR + (_STR-_SR)*solidFrac);
    const g = Math.round(_SG + (_STG-_SG)*solidFrac);
    const b = Math.round(_SB + (_STB-_SB)*solidFrac);
    return `rgba(${r},${g},${b},${op.toFixed(3)})`;
  }
  function finalTextColour(alpha) {
    const r = Math.round(156 + (255-156)*solidFrac);
    const g = Math.round(122 + (235-122)*solidFrac);
    const b = Math.round(30 + (180-30)*solidFrac);
    return `rgba(${r},${g},${b},${alpha.toFixed(3)})`;
  }

  // Dashed border drawn per-side so dashes stay static during expand/collapse.
  // Each side's dash pattern is anchored independently — vertical sides grow
  // downward with new dashes appearing at the bottom.
  function dashedBorder(y, h, strokeStyle, alpha) {
    const x0=II, y0=y+II, x1=CW-II, y1=y+h-II, r=R-II;
    ctx.setLineDash([6, 4]); ctx.strokeStyle = strokeStyle;
    ctx.lineWidth = SW; ctx.globalAlpha = alpha;
    // Top: left-arc + edge + right-arc (fixed)
    ctx.beginPath();
    ctx.moveTo(x0, y0+r); ctx.quadraticCurveTo(x0, y0, x0+r, y0);
    ctx.lineTo(x1-r, y0); ctx.quadraticCurveTo(x1, y0, x1, y0+r);
    ctx.stroke();
    // Right edge: top→bottom (anchored from top, grows down)
    ctx.beginPath(); ctx.moveTo(x1, y0+r); ctx.lineTo(x1, y1-r); ctx.stroke();
    // Bottom: right-arc + edge + left-arc (fixed length, moves down)
    ctx.beginPath();
    ctx.moveTo(x1, y1-r); ctx.quadraticCurveTo(x1, y1, x1-r, y1);
    ctx.lineTo(x0+r, y1); ctx.quadraticCurveTo(x0, y1, x0, y1-r);
    ctx.stroke();
    // Left edge: top→bottom (anchored from top, grows down)
    ctx.beginPath(); ctx.moveTo(x0, y0+r); ctx.lineTo(x0, y1-r); ctx.stroke();
    ctx.globalAlpha = 1; ctx.setLineDash([]);
  }

  // Paths — rrPath accepts variable height
  function rrPath(y, h) {
    h = h || CH;
    const x0=II, y0=y+II, x1=CW-II, y1=y+h-II, r=R-II;
    const p = new Path2D();
    p.moveTo(x0+r, y0);
    p.lineTo(x1-r, y0); p.quadraticCurveTo(x1, y0, x1, y0+r);
    p.lineTo(x1, y1-r); p.quadraticCurveTo(x1, y1, x1-r, y1);
    p.lineTo(x0+r, y1); p.quadraticCurveTo(x0, y1, x0, y1-r);
    p.lineTo(x0, y0+r); p.quadraticCurveTo(x0, y0, x0+r, y0);
    p.closePath(); return p;
  }

  function mergedPathV(ytop, ybot, joins) {
    const DF = 18, DC = 8;
    const lx=II, rx=CW-II, ty=ytop+II, by=ybot-II, r=R-II;
    const p = new Path2D();
    p.moveTo(lx+r, ty);
    p.lineTo(rx-r, ty); p.quadraticCurveTo(rx, ty, rx, ty+r);
    joins.forEach(({ jy, frac }) => {
      const f = DF*frac, c = DC*frac;
      p.lineTo(rx, jy-c); p.quadraticCurveTo(rx-f, jy, rx, jy+c);
    });
    p.lineTo(rx, by-r); p.quadraticCurveTo(rx, by, rx-r, by);
    p.lineTo(lx+r, by); p.quadraticCurveTo(lx, by, lx, by-r);
    [...joins].reverse().forEach(({ jy, frac }) => {
      const f = DF*frac, c = DC*frac;
      p.lineTo(lx, jy+c); p.quadraticCurveTo(lx+f, jy, lx, jy-c);
    });
    p.lineTo(lx, ty+r); p.quadraticCurveTo(lx, ty, lx+r, ty);
    p.closePath(); return p;
  }

  function drawBorderAnim(homeY, progress, isDone, cellIdx) {
    const h = cellH(cellIdx);
    const x0 = II, y0 = homeY + II, x1 = CW - II, y1 = homeY + h - II;
    const r = R - II;
    const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
    const halfW = cx - x0 - r, arcL = (Math.PI / 2) * r, halfH = cy - y0 - r;
    const arm = halfW + arcL + halfH;
    const dist = progress * arm;
    ctx.lineCap = 'round';
    function traceArm(segs) {
      let rem = dist; ctx.beginPath(); let on = false;
      for (const s of segs) {
        if (rem <= 0) break;
        if (s.type === 'line') {
          const len = Math.hypot(s.ex - s.sx, s.ey - s.sy);
          const t = Math.min(rem / len, 1);
          if (!on) { ctx.moveTo(s.sx, s.sy); on = true; }
          ctx.lineTo(s.sx + (s.ex - s.sx) * t, s.sy + (s.ey - s.sy) * t);
          rem -= len;
        } else {
          const aLen = Math.abs(s.ea - s.sa) * r;
          const t = Math.min(rem / aLen, 1);
          if (!on) { ctx.moveTo(s.cx + r * Math.cos(s.sa), s.cy + r * Math.sin(s.sa)); on = true; }
          ctx.arc(s.cx, s.cy, r, s.sa, s.sa + (s.ea - s.sa) * t, s.ccw);
          rem -= aLen;
        }
      }
      ctx.stroke();
    }
    const arms = [
      [{ type:'line', sx:cx, sy:y0, ex:x1-r, ey:y0 },
       { type:'arc', cx:x1-r, cy:y0+r, sa:-Math.PI/2, ea:0, ccw:false },
       { type:'line', sx:x1, sy:y0+r, ex:x1, ey:cy }],
      [{ type:'line', sx:cx, sy:y0, ex:x0+r, ey:y0 },
       { type:'arc', cx:x0+r, cy:y0+r, sa:-Math.PI/2, ea:-Math.PI, ccw:true },
       { type:'line', sx:x0, sy:y0+r, ex:x0, ey:cy }],
      [{ type:'line', sx:cx, sy:y1, ex:x1-r, ey:y1 },
       { type:'arc', cx:x1-r, cy:y1-r, sa:Math.PI/2, ea:0, ccw:true },
       { type:'line', sx:x1, sy:y1-r, ex:x1, ey:cy }],
      [{ type:'line', sx:cx, sy:y1, ex:x0+r, ey:y1 },
       { type:'arc', cx:x0+r, cy:y1-r, sa:Math.PI/2, ea:Math.PI, ccw:false },
       { type:'line', sx:x0, sy:y1-r, ex:x0, ey:cy }],
    ];
    const borderStroke = (cellIdx === N - 1) ? FINAL_STROKE : colors.STROKE;
    if (isDone) {
      ctx.strokeStyle = '#ECEAE3'; ctx.globalAlpha = 1; ctx.lineWidth = SW + 2;
      arms.forEach(a => traceArm(a));
      ctx.strokeStyle = borderStroke; ctx.globalAlpha = 0.25; ctx.lineWidth = SW;
      arms.forEach(a => traceArm(a));
    } else {
      ctx.strokeStyle = borderStroke; ctx.globalAlpha = 1; ctx.lineWidth = SW;
      arms.forEach(a => traceArm(a));
    }
    ctx.globalAlpha = 1;
  }

  function fitText(text, maxW) {
    if (ctx.measureText(text).width <= maxW) return text;
    while (text.length > 0 && ctx.measureText(text + '\u2026').width > maxW) text = text.slice(0, -1);
    return text.trimEnd() + '\u2026';
  }

  // Wrap text into up to maxLines lines that fit within maxW
  function wrapText(text, maxW, maxLines) {
    if (ctx.measureText(text).width <= maxW) return [text];
    const words = text.split(/\s+/);
    const lines = [];
    let line = '';
    for (const word of words) {
      const test = line ? line + ' ' + word : word;
      if (ctx.measureText(test).width > maxW && line) {
        lines.push(line);
        if (lines.length >= maxLines) { lines[lines.length - 1] = fitText(lines[lines.length - 1] + ' ' + words.slice(words.indexOf(word)).join(' '), maxW); return lines; }
        line = word;
      } else {
        line = test;
      }
    }
    if (line) {
      if (lines.length >= maxLines) lines[lines.length - 1] = fitText(lines[lines.length - 1] + ' ' + line, maxW);
      else lines.push(line);
    }
    return lines;
  }

  function draw() {
    const th = totalH();
    ctx.clearRect(0, 0, CW, th);

    // Undone and passed cells — use cellH for variable height
    cells.forEach((cell, idx) => {
      if (cell.done) return;
      const h = cellH(idx);
      const p = rrPath(cell.homeY, h);
      const isFinal = idx === N - 1;
      const st = isFinal ? FINAL_STROKE : colors.STROKE;
      if (cell.passed) {
        const pr = Math.round(123 + (88-123)*solidFrac);
        const pg = Math.round(139 + (115-139)*solidFrac);
        const pb = Math.round(111 + (72-111)*solidFrac);
        const pa = 0.12 + (0.88 - 0.12)*solidFrac;
        ctx.fillStyle = `rgba(${pr},${pg},${pb},${pa.toFixed(3)})`;
        ctx.fill(p);
        ctx.strokeStyle = PASS_STROKE; ctx.lineWidth = SW;
        ctx.globalAlpha = 0.55 + 0.45*solidFrac; ctx.stroke(p); ctx.globalAlpha = 1;
      } else if (isLocked(idx)) {
        ctx.fillStyle = isFinal ? 'rgba(196,154,60,0.12)' : 'rgba(202,224,245,0.25)';
        ctx.fill(p);
        dashedBorder(cell.homeY, h, st, 0.1);
      } else if (idx === selectedIdx) {
        ctx.fillStyle = isFinal ? 'rgba(196,154,60,0.25)' : 'rgba(202,224,245,0.85)';
        ctx.fill(p);
        dashedBorder(cell.homeY, h, st, 0.6);
      } else {
        ctx.fillStyle = isFinal ? 'rgba(196,154,60,0.18)' : `rgba(${colors.FILL_UNDONE.join(',')})`;
        ctx.fill(p);
        dashedBorder(cell.homeY, h, st, cell.strokeOp);
      }
    });

    // Done runs — merged path uses cellH for variable heights
    let i = 0;
    while (i < N) {
      if (!cells[i].done) { i++; continue; }
      let j = i;
      while (j < N && cells[j].done) j++;
      const ytop = cells[i].homeY;
      const ybot = cells[j-1].homeY + cellH(j-1);
      const joins = [];
      for (let k = i+1; k < j; k++) {
        joins.push({
          jy: (cells[k-1].homeY + cellH(k-1) + cells[k].homeY) / 2,
          frac: cells[k-1].divotFrac
        });
      }
      const path = (j-i === 1) ? rrPath(cells[i].homeY, cellH(i)) : mergedPathV(ytop, ybot, joins);
      let avgFill = 0, avgStroke = 0;
      for (let k = i; k < j; k++) { avgFill += cells[k].fillOp; avgStroke += cells[k].strokeOp; }
      avgFill /= (j-i); avgStroke /= (j-i);
      ctx.fillStyle = fillColour(avgFill); ctx.fill(path);
      ctx.strokeStyle = strokeColour(avgStroke); ctx.lineWidth = SW; ctx.stroke(path);
      i = j;
    }

    // Text — always drawn at the top of each cell (fixed CH area)
    cells.forEach((cell, idx) => {
      const t = tasks[idx], y = cell.homeY;
      const selBoost = (idx === selectedIdx) ? 1.6 : 1.0;
      const isFinal = idx === N - 1;
      ctx.save();
      const locked = isLocked(idx);
      // Helper: draw sub text with wrapping (up to 2 lines), returns line count
      function drawSub(text, fillStyle, yBase) {
        ctx.font = '12px JetBrains Mono, monospace';
        ctx.fillStyle = fillStyle;
        const lines = wrapText(text, CW - 32, 2);
        lines.forEach((ln, li) => ctx.fillText(ln, 16, yBase + li * 15));
        // Track text bottom for detail panel positioning
        cell.textBtm = (yBase - y) + (lines.length - 1) * 15 + 12;
      }

      // Task number aligned right
      function drawNum(alpha) {
        ctx.font = '600 11px JetBrains Mono, monospace';
        ctx.fillStyle = isFinal ? finalTextColour(alpha) : textColour(alpha);
        ctx.textAlign = 'right';
        ctx.fillText(String(idx + 1), CW - 14, y + 18);
        ctx.textAlign = 'left';
      }



      if (cell.passed) {
        const pr = Math.round(123 + (255-123)*solidFrac);
        const pg = Math.round(139 + (255-139)*solidFrac);
        const pb = Math.round(111 + (255-111)*solidFrac);
        drawNum(0.3 + 0.3*solidFrac);
        ctx.font = solidFrac > 0.5 ? 'italic 400 19px Nunito, sans-serif' : '400 19px Nunito, sans-serif';
        ctx.fillStyle = `rgba(${pr},${pg},${pb},${(0.55 + 0.4*solidFrac).toFixed(3)})`;
        ctx.fillText((solidFrac > 0.5 ? t.done : t.label) + ' \u00b7 Skipped', 16, y + 30);
        drawSub(t.sub, `rgba(${pr},${pg},${pb},${(0.5 + 0.35*solidFrac).toFixed(3)})`, y + 48);
      } else if (locked) {
        const tc = isFinal ? finalTextColour : textColour;
        drawNum(0.15);
        ctx.font = '400 19px Nunito, sans-serif';
        ctx.fillStyle = tc(0.22); ctx.fillText(t.label, 16, y + 30);
        drawSub(t.sub, tc(0.16), y + 48);
      } else {
        const tc = isFinal ? finalTextColour : textColour;
        const tf = cell.textFade;
        const undoneA = (1 - tf) * 0.6, doneA = tf * 0.95;
        if (undoneA > 0.005) {
          drawNum(Math.min(undoneA * 0.6 * selBoost, 0.5));
          ctx.font = '400 19px Nunito, sans-serif';
          ctx.fillStyle = tc(Math.min(undoneA * selBoost, 1));
          ctx.fillText(t.label, 16, y + 30);
          drawSub(t.sub, tc(Math.min(undoneA * 0.85 * selBoost, 1)), y + 48);
        }
        if (doneA > 0.005) {
          drawNum(doneA * 0.4);
          ctx.font = 'italic 400 19px Nunito, sans-serif';
          ctx.fillStyle = tc(doneA); ctx.fillText(t.done, 16, y + 30);
          drawSub(t.sub, tc(doneA * 0.8), y + 48);
        }
      }
      ctx.restore();
    });

    // Hold border — uses cellH for full cell height
    if (pressIdx >= 0 && holdProg > 0 && !holdDone) {
      drawBorderAnim(cells[pressIdx].homeY, holdProg, cells[pressIdx].done, pressIdx);
    }
  }

  // Animation
  const S_FILL = 0.055, S_STROKE = 0.07, S_DIVOT = 0.06, S_TEXT = 0.045, S_SOLID = 0.04, S_EXPAND = 0.14;
  function tick() {
    let dirty = false;
    cells.forEach((cell, i) => {
      function step(key, speed) {
        const d = tgt[i][key] - cell[key];
        if (Math.abs(d) > 0.001) { cell[key] += d * speed; dirty = true; }
        else cell[key] = tgt[i][key];
      }
      step('fillOp', S_FILL); step('strokeOp', S_STROKE);
      step('divotFrac', S_DIVOT); step('textFade', S_TEXT);
    });
    const ds = tgtSolid - solidFrac;
    if (Math.abs(ds) > 0.001) { solidFrac += ds * S_SOLID; dirty = true; }
    else solidFrac = tgtSolid;
    // Animate expand height
    const de = expandTarget - expandH;
    if (Math.abs(de) > 0.5) { expandH += de * S_EXPAND; dirty = true; }
    else { expandH = expandTarget; if (expandH === 0) expandIdx = -1; }
    // Relayout every frame while expanding/collapsing
    computeLayout(); resizeCanvas();
    if (expandIdx >= 0) {
      detailPanel.style.top = (cells[expandIdx].homeY + baseCellH(expandIdx)) + 'px';
    }
    draw();
    raf = dirty ? requestAnimationFrame(tick) : null;
  }
  function kick() { if (!raf) raf = requestAnimationFrame(tick); }

  // Detail panel elements
  const detailPanel = wrapEl.querySelector('.task-detail-panel');
  const elSection = wrapEl.querySelector('.td-section');
  const elUnlock = wrapEl.querySelector('.td-unlock');
  const elBullets = wrapEl.querySelector('.td-bullets');
  const elDeliv = wrapEl.querySelector('.td-deliverable');
  const btnPass = wrapEl.querySelector('.td-pass');
  const btnDoc = wrapEl.querySelector('.td-doc');
  const btnCloseTask = wrapEl.querySelector('.td-close');

  function refreshDetailButtons(idx) {
    const isDone = cells[idx].done;
    const isPassed = cells[idx].passed;
    const locked = isLocked(idx);
    const deps = pendingDeps(idx);
    elUnlock.textContent = deps.length > 0
      ? 'COMPLETE ' + deps.map(d => String(d + 1)).join(' + ') + ' FIRST'
      : '';
    if (locked && !isDone && !isPassed) {
      btnPass.style.display = 'none';
    } else if (isDone) {
      btnPass.style.display = 'none';
    } else if (isPassed) {
      btnPass.textContent = 'unskip'; btnPass.classList.add('is-passed'); btnPass.style.display = '';
    } else {
      btnPass.textContent = 'skip'; btnPass.classList.remove('is-passed'); btnPass.style.display = '';
    }
  }

  function relayout() {
    computeLayout();
    resizeCanvas();
    if (expandIdx >= 0) {
      detailPanel.style.top = (cells[expandIdx].homeY + baseCellH(expandIdx)) + 'px';
    }
    draw();
    recalcPanelSection(panelId);
  }

  function showDetail(idx) {
    if (idx === selectedIdx) { hideDetail(); return; }
    selectedIdx = idx;
    expandIdx = idx;
    expandH = 0; // start from zero for animation
    const t = tasks[idx];

    // Populate content
    elSection.textContent = t.sec;
    elSection.style.color = colors.ACCENT_HEX;
    const deps = pendingDeps(idx);
    elUnlock.textContent = deps.length > 0
      ? 'COMPLETE ' + deps.map(d => String(d + 1)).join(' + ') + ' FIRST'
      : '';
    elBullets.innerHTML = t.bullets.map(b => '<li>' + b + '</li>').join('');
    elBullets.style.setProperty('--dot-color', colors.MID_HEX);
    elDeliv.textContent = '\u2714 ' + t.deliverable;
    elDeliv.style.color = colors.ACCENT_HEX;
    if (btnDoc) { btnDoc.href = t.url || '#'; btnDoc.style.display = t.url ? '' : 'none'; }
    refreshDetailButtons(idx);

    // Measure panel height: show invisibly, measure, then animate open
    detailPanel.style.visibility = 'hidden';
    detailPanel.style.top = '0';
    detailPanel.classList.add('open');
    expandTarget = detailPanel.offsetHeight + 8;
    detailPanel.style.visibility = '';

    // Start expand animation
    kick();

    setTimeout(() => detailPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 250);
  }

  function hideDetail() {
    detailPanel.classList.remove('open');
    expandTarget = 0;
    selectedIdx = -1;
    // expandIdx stays so cellH still applies during collapse animation
    // it gets cleared when expandH reaches 0 in tick
    kick();
  }

  // Cascade uncomplete: undo any downstream tasks that depend on idx
  function cascadeUndo(idx) {
    for (let k = 0; k < N; k++) {
      const reqs = tasks[k].requires;
      if (!reqs || !reqs.includes(idx)) continue;
      if (cells[k].done || cells[k].passed) {
        cells[k].done = false;
        cells[k].passed = false;
        cascadeUndo(k); // recurse for deeper dependants
      }
    }
  }

  function toggleDone(idx) {
    if (cells[idx].done) {
      cells[idx].done = false;
      cascadeUndo(idx);
    } else {
      cells[idx].done = true; cells[idx].passed = false;
    }
    saveLS(); updateCounter(); recalcTargets(); kick();
    if (selectedIdx >= 0) {
      refreshDetailButtons(selectedIdx);
    }
  }

  function togglePass(idx) {
    if (cells[idx].passed) {
      cells[idx].passed = false;
      cascadeUndo(idx);
    } else {
      cells[idx].passed = true; cells[idx].done = false;
    }
    saveLS(); updateCounter(); recalcTargets(); kick();
    if (selectedIdx >= 0) refreshDetailButtons(selectedIdx);
  }

  btnPass.addEventListener('click', (e) => {
    e.stopPropagation();
    if (selectedIdx >= 0) { togglePass(selectedIdx); hideDetail(); draw(); }
  });
  btnCloseTask.addEventListener('click', (e) => { e.stopPropagation(); hideDetail(); });

  // Long press — delayed activation so scrolling still works on mobile
  const HOLD_MS = 500;
  const HOLD_DELAY = 150; // ms before capturing pointer (allows scroll to start)
  let pressIdx = -1, pressStart = 0, holdProg = 0, holdDone = false, holdRaf = null;
  let pressStartX = 0, pressStartY = 0, holdDelayTimer = null, holdPointerId = -1;
  const MOVE_THRESH = 10;

  function hitCell(clientY) {
    const rect = canvas.getBoundingClientRect();
    const my = clientY - rect.top;
    for (let k = 0; k < N; k++) {
      const top = cells[k].homeY;
      if (my >= top && my < top + baseCellH(k)) return k;
    }
    return -1;
  }

  function holdTick() {
    if (pressIdx < 0) return;
    holdProg = Math.min((Date.now() - pressStart) / HOLD_MS, 1);
    draw();
    if (holdProg >= 1 && !holdDone) {
      holdDone = true;
      if (navigator.vibrate) navigator.vibrate(18);
      toggleDone(pressIdx);
      setTimeout(() => { holdProg = 0; pressIdx = -1; draw(); }, 150);
      return;
    }
    if (!holdDone) holdRaf = requestAnimationFrame(holdTick);
  }

  function cancelHold() {
    if (holdDelayTimer) { clearTimeout(holdDelayTimer); holdDelayTimer = null; }
    if (holdRaf) { cancelAnimationFrame(holdRaf); holdRaf = null; }
    pressIdx = -1; holdProg = 0; holdDone = false; holdPointerId = -1; draw();
  }

  // Activate hold after delay — captures pointer and starts the animation
  function activateHold() {
    holdDelayTimer = null;
    if (pressIdx < 0) return;
    try { canvas.setPointerCapture(holdPointerId); } catch(e) {}
    pressStart = Date.now();
    if (!isLocked(pressIdx)) holdRaf = requestAnimationFrame(holdTick);
  }

  canvas.addEventListener('pointerdown', e => {
    // Don't preventDefault — allow native scroll to start
    const idx = hitCell(e.clientY);
    if (idx < 0) { pressIdx = -1; return; }
    pressIdx = idx; pressStart = Date.now();
    pressStartX = e.clientX; pressStartY = e.clientY;
    holdProg = 0; holdDone = false; holdPointerId = e.pointerId;
    // Start hold after a delay — if finger moves (scroll), it gets cancelled
    holdDelayTimer = setTimeout(activateHold, HOLD_DELAY);
  });
  canvas.addEventListener('pointermove', e => {
    if (pressIdx < 0) return;
    const dx = e.clientX - pressStartX, dy = e.clientY - pressStartY;
    if (dx*dx + dy*dy > MOVE_THRESH*MOVE_THRESH) cancelHold();
  });
  canvas.addEventListener('pointerup', e => {
    if (holdDelayTimer) { clearTimeout(holdDelayTimer); holdDelayTimer = null; }
    if (holdRaf) { cancelAnimationFrame(holdRaf); holdRaf = null; }
    const elapsed = Date.now() - pressStart;
    const idx = pressIdx;
    pressIdx = -1; holdProg = 0;
    if (holdDone) { holdDone = false; draw(); return; }
    holdDone = false; holdPointerId = -1; draw();
    if (idx >= 0 && elapsed < 250) { showDetail(idx); }
  });
  canvas.addEventListener('pointercancel', cancelHold);
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // Pre-measure sub text line counts for layout
  function measureTextHeights() {
    ctx.font = '12px JetBrains Mono, monospace';
    cells.forEach((cell, idx) => {
      const lines = wrapText(tasks[idx].sub, CW - 32, 2);
      cell.textBtm = 48 + (lines.length - 1) * 15 + 12; // 48 = sub yBase relative to cell top
    });
  }

  // Init
  loadLS(); recalcTargets();
  // Need initial canvas size for text measurement
  canvas.width = CW * DPR; canvas.height = 100 * DPR;
  canvas.style.width = CW + 'px'; canvas.style.height = '100px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  measureTextHeights();
  computeLayout(); resizeCanvas();
  updateCounter(); draw();
  // Re-measure after fonts load (JetBrains Mono may change text widths)
  document.fonts.ready.then(() => {
    measureTextHeights(); computeLayout(); resizeCanvas(); draw();
  });

  self.destroy = function() {
    if (raf) cancelAnimationFrame(raf);
    if (holdRaf) cancelAnimationFrame(holdRaf);
  };
}

function applyTaskStates(panelId) {
  // Init or re-init the canvas for this panel's task group
  initTaskCanvas(panelId);
}

function initTaskCanvas(panelId) {
  const wrap = document.querySelector(`#panel-${panelId} .task-canvas-wrap`);
  if (!wrap) return;
  const cls = wrap.dataset.cls;
  const taskSet = TASK_SETS[cls];
  if (!taskSet || !taskSet.tasks || taskSet.tasks.length === 0) return;

  // Destroy previous instance if exists
  if (taskCanvases[panelId]) {
    taskCanvases[panelId].destroy();
    delete taskCanvases[panelId];
  }

  // Clear any previous canvas
  const slot = wrap.querySelector('.tc-canvas-slot');
  if (slot) slot.innerHTML = '';

  const accent = CLASS_ACCENTS[cls] || [140, 140, 140];
  const colors = deriveColors(accent);
  const storageKey = `dates-tasks-${cls}`;

  taskCanvases[panelId] = new TaskCanvas(wrap, taskSet.tasks, storageKey, colors, panelId);
}

function renderHeader() {
  const classItems = activeFilter ? ITEMS.filter(it => it.cls === activeFilter) : ITEMS;
  const upDeadlines = classItems.filter(it => it.date >= TODAY_STR && (it.type === 'deadline' || it.type === 'assignment' || it.type === 'assessment')).length;
  const miss = classItems.filter(it => it.status === 'Missing').length;
  const done = classItems.filter(it => it.status === 'Turned in').length;

  document.getElementById('headerBlock').innerHTML = `
    <p class="date-line">${fmtDateLong(TODAY_STR).toUpperCase()}</p>
    <p class="page-title">All Dates</p>
    <hr class="header-sep">
    <div class="status-pills">
      ${miss > 0 ? `<span class="pill pill-urgent${statusFilter === 'missing' ? ' active' : ''}" data-sf="missing">${miss} missing</span>` : ''}
      <span class="pill pill-upcoming${statusFilter === 'upcoming' ? ' active' : ''}" data-sf="upcoming">${upDeadlines} upcoming</span>
      ${done > 0 ? `<span class="pill pill-done${statusFilter === 'done' ? ' active' : ''}" data-sf="done">${done} turned in</span>` : ''}
    </div>
  `;
}

function renderFilterBar() {
  let html = `<button class="filter-btn${!activeFilter ? ' active' : ''}" data-cls="">All</button>`;
  Object.keys(CLASSES).forEach(c => {
    html += `<button class="filter-btn${activeFilter === c ? ' active' : ''}" data-cls="${c}">${c}</button>`;
  });
  document.getElementById('filterBar').innerHTML = html;
}

function applyStatusFilter(items) {
  if (!statusFilter) return items;
  if (statusFilter === 'missing') return items.filter(it => it.status === 'Missing');
  if (statusFilter === 'done') return items.filter(it => it.status === 'Turned in');
  if (statusFilter === 'upcoming') return items.filter(it => it.type === 'deadline' || it.type === 'assignment' || it.type === 'assessment');
  return items;
}

function renderItemCards(items, isPast) {
  let html = '';
  let lastDate = '';
  let idx = 0;

  items.forEach(it => {
    if (it.date !== lastDate) {
      lastDate = it.date;
      const days = daysUntil(it.date);
      const todayCls = isToday(it.date) ? ' is-today' : isPast ? ' is-past' : '';
      const urgency = !isPast ? urgencyLabel(days) : '';
      html += `<div class="date-marker${todayCls}" style="animation-delay:${idx * 40}ms">
        <span>${fmtDate(it.date).toUpperCase()}</span>
        ${urgency ? `<span class="day-name">\u00b7 ${urgency.toUpperCase()}</span>` : ''}
      </div>`;
      idx++;
    }

    const id = itemId(it);
    const pastCls = isPast ? ' is-past' : '';
    const doneCls = it.status === 'Turned in' ? ' is-done' : '';
    const missCls = it.status === 'Missing' ? ' is-missing' : '';
    const todayCard = isToday(it.date) && !isPast ? ' is-today-card' : '';
    const typeCls = (it.type === 'deadline' || it.type === 'assessment') ? ` type-label type-${it.type}` : 'type-label';

    html += `<div class="item-card${pastCls}${doneCls}${missCls}${todayCard}" data-id="${id}" style="animation-delay:${idx * 40}ms">
      <svg class="card-border"><rect x="0" y="0" width="100%" height="100%" rx="18" ry="18"/></svg>
      <div class="item-meta-line">
        <span class="class-pill ${CLASSES[it.cls].css}">${it.cls}</span>
        <span class="${typeCls}">${it.type}</span>
        ${statusBadgeHTML(it.status)}
      </div>
      <div class="item-title">${it.short || it.title}</div>
    </div>`;

    // Detail panel (hidden by default, rendered inline for this card)
    const days = daysUntil(it.date);
    const sourceFmt = fmtSource(it.source);
    const classworkUrl = CLASSES[it.cls].classwork;
    const dateLabel = it.type === 'material' ? 'Posted' : 'Due';
    let timeCtx = `${fmtDate(it.date)}`;
    if (!isPast && days > 0) timeCtx += ` \u00b7 ${days} day${days !== 1 ? 's' : ''} away`;
    else if (days < 0) timeCtx += ` \u00b7 ${Math.abs(days)} day${Math.abs(days) !== 1 ? 's' : ''} ago`;
    else if (days === 0) timeCtx += ' \u00b7 today';

    let srcHtml = '';
    if (sourceFmt) {
      const srcUrl = sourceUrl(it.cls, it.source);
      srcHtml = srcUrl
        ? `<div class="detail-source"><strong>Source:</strong> <a href="${srcUrl}" target="_blank" onclick="event.stopPropagation()">${sourceFmt}</a></div>`
        : `<div class="detail-source"><strong>Source:</strong> ${sourceFmt}</div>`;
    }

    const srcPath = it.source ? sourceUrl(it.cls, it.source) : null;

    // Build canvas task widget if available for this class
    const taskSet = TASK_SETS[it.cls];
    let tasksHtml = '';
    if (taskSet && taskSet.tasks && taskSet.tasks.length > 0) {
      tasksHtml = `<div class="task-canvas-wrap" data-cls="${it.cls}">
        <div class="task-status-pills">
          <span class="task-pill task-pill-done tp-done"></span>
          <span class="task-pill task-pill-todo tp-todo"></span>
          <span class="task-pill task-pill-skip tp-skip"></span>
        </div>
        <div class="tc-canvas-slot"></div>
        <div class="task-detail-panel">
          <div class="task-detail-inner">
            <hr class="task-detail-sep">
            <div class="task-detail-section-row">
              <div class="task-detail-section td-section"></div>
              <div class="task-unlock-hint td-unlock"></div>
            </div>
            <ul class="task-detail-bullets td-bullets"></ul>
            <div class="task-detail-deliverable td-deliverable"></div>
            <div class="task-detail-actions">
              <button class="action-btn btn-pass td-pass">skip</button>
              <button class="btn-close-task td-close">&times;</button>
            </div>
            <div class="task-detail-links">
              <a class="btn-doc td-doc" target="_blank">&#8599; open doc</a>
            </div>
          </div>
        </div>
        <div class="task-hold-hint">hold to complete \u00b7 tap to expand</div>
      </div>`;
    } else if (it.desc) {
      tasksHtml = `<div class="task-no-tasks">${it.desc}</div>`;
    }

    html += `<div class="detail-panel" id="panel-${id}">
      <div class="detail-pointer"></div>
      <div class="detail-inner">
        <div class="detail-head">
          <span class="detail-title">${it.title}</span>
        </div>
        ${it.desc && taskSet ? `<div class="detail-desc">${it.desc}</div>` : ''}
        ${tasksHtml}
        ${srcHtml}
        <div class="detail-actions">
          ${classworkUrl ? `<a class="action-btn btn-classwork" href="${classworkUrl}" target="_blank" onclick="event.stopPropagation()">&#8599; classwork</a>` : ''}
          ${srcPath ? `<a class="action-btn btn-doc" href="${srcPath}" target="_blank" onclick="event.stopPropagation()">&#8599; full analysis</a>` : ''}
          <button class="action-btn btn-close" onclick="event.stopPropagation(); closeDetail()">&times;</button>
        </div>
      </div>
    </div>`;

    idx++;
  });

  return html;
}

function renderAlerts(anomalies) {
  let html = '';
  anomalies.forEach((a, i) => {
    const isWarn = a.type === 'needs_turn_in';
    const cardCls = isWarn ? 'alert-card alert-warn' : 'alert-card';
    const badgeCls = isWarn ? 'badge-turn-in' : 'badge-overdue';
    const aid = 'alert-' + i;

    html += `<div class="${cardCls}" data-alert="${aid}" style="animation-delay:${i * 60}ms">
      <svg class="card-border"><rect x="0" y="0" width="100%" height="100%" rx="18" ry="18"/></svg>
      <div class="item-meta-line">
        <span class="class-pill ${CLASSES[a.cls].css}">${a.cls}</span>
        <span class="alert-badge ${badgeCls}">${a.type === 'needs_turn_in' ? 'needs turn in' : a.status}</span>
      </div>
      <div style="margin-top:8px">
        <div class="alert-title">${a.doc}</div>
        <div class="item-type" style="margin-top:3px">${a.assignment}</div>
      </div>
      <div class="alert-detail" id="alert-detail-${aid}">
        <hr class="alert-sep">
        ${a.pct > 0 ? `<div class="alert-progress"><div class="alert-progress-bar" style="width:${a.pct}%"></div></div>
        <div class="progress-label"><span>Progress:</span> ${a.pct}% ${a.progress.replace('_',' ')}</div>` : ''}
        <div class="alert-sub">${a.summary}</div>
        <div class="next-steps-label">Next steps</div>
        <ul class="alert-steps">${a.next_steps.map(s => `<li>${s}</li>`).join('')}</ul>
        <div class="detail-actions" style="margin-top:14px">
          <a class="action-btn btn-classwork" href="${a.doc_url}" target="_blank" onclick="event.stopPropagation()">&#8599; open doc</a>
          <button class="action-btn btn-close" onclick="event.stopPropagation(); closeAlert('${aid}')">&times;</button>
        </div>
      </div>
    </div>`;
  });
  return html;
}

function closeDetail() {
  if (!expandedId) return;
  const panel = document.getElementById('panel-' + expandedId);
  const card = document.querySelector(`[data-id="${expandedId}"]`);
  if (panel) panel.classList.remove('open');
  if (card) card.classList.remove('is-expanded');
  expandedId = null;
}

function closeAlert(aid) {
  const detail = document.getElementById('alert-detail-' + aid);
  const card = document.querySelector(`[data-alert="${aid}"]`);
  if (detail) { detail.style.maxHeight = detail.scrollHeight + 'px'; requestAnimationFrame(() => { detail.style.maxHeight = '0'; detail.classList.remove('open'); }); }
  if (card) card.classList.remove('is-expanded');
  if (expandedId === aid) expandedId = null;
}

function render() {
  const classFiltered = activeFilter ? ITEMS.filter(it => it.cls === activeFilter) : ITEMS;

  const allFuture = applyStatusFilter(classFiltered.filter(it => it.date >= TODAY_STR)).sort((a,b) => a.date.localeCompare(b.date) || a.cls.localeCompare(b.cls));
  const current = allFuture.filter(it => daysUntil(it.date) <= 14);
  const upcoming = allFuture.filter(it => daysUntil(it.date) > 14);
  const filteredPast = applyStatusFilter(classFiltered.filter(it => it.date < TODAY_STR)).sort((a,b) => b.date.localeCompare(a.date) || a.cls.localeCompare(b.cls));

  renderHeader();
  renderFilterBar();

  let html = '';

  // Alerts
  const filteredAnomalies = activeFilter ? ANOMALIES.filter(a => a.cls === activeFilter) : ANOMALIES;
  if (filteredAnomalies.length > 0 && !statusFilter) {
    html += `<div class="section-label section-alerts" data-section="alerts">
      <span class="section-chevron${!alertsCollapsed ? ' open' : ''}">&#x25B8;</span>
      Alerts <span class="section-count">(${filteredAnomalies.length})</span>
    </div>`;
    html += `<div class="section-body${alertsCollapsed ? ' collapsed' : ''}" id="alertsBody" style="max-height:${alertsCollapsed ? '0' : 'none'}">`;
    html += renderAlerts(filteredAnomalies);
    html += `</div>`;
  }

  // Past
  html += `<div class="section-label section-past" data-section="past">
    <span class="section-chevron${!pastCollapsed ? ' open' : ''}">&#x25B8;</span>
    Past <span class="section-count">(${filteredPast.length})</span>
  </div>`;
  html += `<div class="section-body${pastCollapsed ? ' collapsed' : ''}" id="pastBody" style="max-height:${pastCollapsed ? '0' : 'none'}">`;
  html += filteredPast.length > 0 ? renderItemCards(filteredPast, true) : `<div class="empty-note">${statusFilter ? 'No matching items' : 'No past items'}</div>`;
  html += `</div>`;

  // Current
  html += `<div class="section-label section-current" data-section="current">
    <span class="section-chevron${!currentCollapsed ? ' open' : ''}">&#x25B8;</span>
    Current <span class="section-count">(${current.length})</span>
  </div>`;
  html += `<div class="section-body${currentCollapsed ? ' collapsed' : ''}" id="currentBody" style="max-height:${currentCollapsed ? '0' : 'none'}">`;
  html += current.length > 0 ? renderItemCards(current, false) : `<div class="empty-note">${statusFilter ? 'No matching items' : 'Nothing due in the next 2 weeks'}</div>`;
  html += `</div>`;

  // Upcoming
  html += `<div class="section-label" data-section="upcoming">
    <span class="section-chevron${!upcomingCollapsed ? ' open' : ''}">&#x25B8;</span>
    Upcoming <span class="section-count">(${upcoming.length})</span>
  </div>`;
  html += `<div class="section-body${upcomingCollapsed ? ' collapsed' : ''}" id="upcomingBody" style="max-height:${upcomingCollapsed ? '0' : 'none'}">`;
  html += upcoming.length > 0 ? renderItemCards(upcoming, false) : `<div class="empty-note">${statusFilter ? 'No matching items' : 'No upcoming items'}</div>`;
  html += `</div>`;

  document.getElementById('sections').innerHTML = html;
  document.getElementById('sections').style.width = '100%';
  document.getElementById('sections').style.maxWidth = '380px';
  document.getElementById('sections').style.display = 'flex';
  document.getElementById('sections').style.flexDirection = 'column';
  document.getElementById('sections').style.gap = '0';

  expandedId = null;
  bindEvents();
}

function bindEvents() {
  // Status filter pills
  document.querySelectorAll('.pill[data-sf]').forEach(pill => {
    pill.addEventListener('click', () => {
      statusFilter = statusFilter === pill.dataset.sf ? null : pill.dataset.sf;
      render();
    });
  });

  // Class filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.cls || null;
      render();
    });
  });

  // Section toggles
  document.querySelectorAll('.section-label[data-section]').forEach(label => {
    label.addEventListener('click', () => {
      const section = label.dataset.section;
      const body = document.getElementById(section + 'Body');
      if (!body) return;
      const chevron = label.querySelector('.section-chevron');
      const isCollapsed = body.classList.contains('collapsed');

      if (body.dataset.animating === '1') return;
      body.dataset.animating = '1';

      const children = Array.from(body.querySelectorAll('.item-card, .alert-card, .date-marker, .detail-panel'));
      const total = children.length;

      if (isCollapsed) {
        children.forEach((child, i) => { child.style.animationDelay = (i * 40) + 'ms'; });
        body.classList.remove('collapsed', 'closing');
        body.style.transition = 'none';
        body.style.maxHeight = '0';
        body.offsetHeight;
        body.classList.add('opening');
        body.style.transition = '';
        requestAnimationFrame(() => { body.style.maxHeight = body.scrollHeight + 'px'; });
        if (chevron) chevron.classList.add('open');
        if (section === 'alerts') alertsCollapsed = false;
        else if (section === 'past') pastCollapsed = false;
        else if (section === 'current') currentCollapsed = false;
        else if (section === 'upcoming') upcomingCollapsed = false;
        setTimeout(() => { body.classList.remove('opening'); body.style.maxHeight = body.scrollHeight + 'px'; body.dataset.animating = '0'; }, Math.max(400, total * 40 + 400));
      } else {
        // Close any open detail panel inside this section first
        closeDetail();
        children.forEach((child, i) => { child.style.animationDelay = ((total - 1 - i) * 30) + 'ms'; });
        body.classList.remove('opening');
        body.classList.add('closing');
        if (chevron) chevron.classList.remove('open');
        if (section === 'alerts') alertsCollapsed = true;
        else if (section === 'past') pastCollapsed = true;
        else if (section === 'current') currentCollapsed = true;
        else if (section === 'upcoming') upcomingCollapsed = true;
        body.style.transition = 'none';
        body.style.maxHeight = body.scrollHeight + 'px';
        body.offsetHeight;
        body.style.transition = '';
        requestAnimationFrame(() => { body.style.maxHeight = '0'; });
        setTimeout(() => { body.classList.remove('closing'); body.classList.add('collapsed'); body.dataset.animating = '0'; }, Math.max(500, total * 30 + 500));
      }
    });
  });

  // Item card → floating detail panel
  document.querySelectorAll('.item-card[data-id]').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.detail-panel.open')) return;
      const id = card.dataset.id;
      const panel = document.getElementById('panel-' + id);
      if (!panel) return;

      if (expandedId === id) {
        // Close
        panel.classList.remove('open');
        card.classList.remove('is-expanded');
        expandedId = null;
        // Shrink section smoothly after panel collapses
        setTimeout(() => { recalcSectionHeight(card); }, 300);
      } else {
        // Close previous
        if (expandedId) {
          const prevPanel = document.getElementById('panel-' + expandedId);
          const prevCard = document.querySelector(`[data-id="${expandedId}"]`);
          if (prevPanel) prevPanel.classList.remove('open');
          if (prevCard) prevCard.classList.remove('is-expanded');
        }
        // Open this one — immediately grow section to avoid pop-in reflow
        const body = card.closest('.section-body');
        if (body) { body.style.transition = 'none'; body.style.maxHeight = body.scrollHeight + 1200 + 'px'; body.offsetHeight; body.style.transition = ''; }
        panel.classList.add('open');
        card.classList.add('is-expanded');
        expandedId = id;
        applyTaskStates(id);
        // Refine section height after panel finishes opening
        setTimeout(() => { recalcSectionHeight(card); }, 350);
        setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 380);
      }
    });
  });

  // Alert card expand/collapse
  document.querySelectorAll('.alert-card[data-alert]').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.alert-detail.open')) return;
      const aid = card.dataset.alert;
      const detail = document.getElementById('alert-detail-' + aid);
      if (!detail) return;

      if (expandedId === aid) {
        detail.style.maxHeight = detail.scrollHeight + 'px';
        requestAnimationFrame(() => { detail.style.maxHeight = '0'; detail.classList.remove('open'); });
        card.classList.remove('is-expanded');
        expandedId = null;
      } else {
        // Close previous alert detail
        if (expandedId && expandedId.startsWith('alert-')) {
          closeAlert(expandedId.replace('alert-', ''));
        } else if (expandedId) {
          closeDetail();
        }
        detail.style.maxHeight = '0';
        detail.classList.add('open');
        requestAnimationFrame(() => {
          detail.style.maxHeight = detail.scrollHeight + 'px';
          // Update parent section height
          const body = card.closest('.section-body');
          if (body) setTimeout(() => { body.style.maxHeight = body.scrollHeight + 'px'; }, 50);
          setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 150);
        });
        card.classList.add('is-expanded');
        expandedId = aid;
      }
    });
  });

  // Task canvases are initialized on panel open via applyTaskStates()
}

function recalcSectionHeight(el) {
  const body = el.closest('.section-body');
  if (body && !body.classList.contains('collapsed')) {
    setTimeout(() => { body.style.maxHeight = body.scrollHeight + 'px'; }, 50);
  }
}

// Telegram
if (window.Telegram && window.Telegram.WebApp) {
  const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
}

function fixSectionHeights() {
  document.querySelectorAll('.section-body').forEach(body => {
    if (!body.classList.contains('collapsed')) {
      body.style.maxHeight = body.scrollHeight + 'px';
    }
  });
}

// Init
document.fonts.ready.then(() => { render(); requestAnimationFrame(fixSectionHeights); });
</script>
</body>
