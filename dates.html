    pressIdx = -1; holdProg = 0; holdDone = false; holdPointerId = -1; pressScaleTarget = 1.0; kick();
  }

  // Activate hold after delay — captures pointer and starts the animation
  function activateHold() {
    holdDelayTimer = null;
    if (pressIdx < 0) return;
    try { canvas.setPointerCapture(holdPointerId); } catch(e) {}
    pressStart = Date.now();
    if (!isLocked(pressIdx)) holdRaf = requestAnimationFrame(holdTick);
  }

  canvas.addEventListener('pointerdown', e => {
    // Don't preventDefault — allow native scroll to start
    const idx = hitCell(e.clientY);
    if (idx < 0) { pressIdx = -1; return; }
    pressIdx = idx; pressStart = Date.now();
    pressStartX = e.clientX; pressStartY = e.clientY;
    holdProg = 0; holdDone = false; holdPointerId = e.pointerId;
    // Start hold after a delay — if finger moves (scroll), it gets cancelled
    holdDelayTimer = setTimeout(activateHold, HOLD_DELAY);
    pressScaleIdx = idx; pressScaleTarget = 0.97; kick();
  });
  canvas.addEventListener('pointermove', e => {
    if (pressIdx < 0) return;
    const dx = e.clientX - pressStartX, dy = e.clientY - pressStartY;
    if (dx*dx + dy*dy > MOVE_THRESH*MOVE_THRESH) cancelHold();
  });
  canvas.addEventListener('pointerup', e => {
    if (holdDelayTimer) { clearTimeout(holdDelayTimer); holdDelayTimer = null; }
    if (holdRaf) { cancelAnimationFrame(holdRaf); holdRaf = null; }
    const elapsed = Date.now() - pressStart;
    const idx = pressIdx;
    pressIdx = -1; holdProg = 0; pressScaleTarget = 1.0;
    if (holdDone) { holdDone = false; kick(); return; }
    holdDone = false; holdPointerId = -1; kick();
    if (idx >= 0 && elapsed < 250) {
      // Animate temp cell out when tapping a different canvas cell
      if (tempVisibleIdx >= 0 && idx !== tempVisibleIdx) {
        tgt[tempVisibleIdx].doneH = 0;
        fadingOutTemp = tempVisibleIdx;
        tempVisibleIdx = -1;
      }
      showDetail(idx);
    }
  });
  canvas.addEventListener('pointercancel', cancelHold);
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // Circle pill clicks — open task detail, temporarily reveal hidden tasks
  wrapEl.querySelectorAll('.task-circle').forEach(el => {
    // Press animation on the SVG pill behind this circle
    function findPill(idx) {
      const svg = wrapEl.querySelector('.task-progress-svg');
      if (!svg) return null;
      // Solo pill
      const solo = svg.querySelector(`[data-pill="${idx}"]`);
      if (solo) return solo;
      // Merged blob
      const all = svg.querySelectorAll('[data-pills]');
      for (const p of all) {
        if (p.dataset.pills.split(',').includes(String(idx))) return p;
      }
      return null;
    }
    el.addEventListener('pointerdown', () => {
      const pill = findPill(parseInt(el.dataset.tidx, 10));
      if (pill) { pill.style.transition = 'transform 0.08s ease'; pill.style.transform = 'scale(0.92)'; }
      el.style.transition = 'transform 0.08s ease'; el.style.transform = 'scale(0.85)';
    });
    el.addEventListener('pointerup', () => {
      const pill = findPill(parseInt(el.dataset.tidx, 10));
      if (pill) { pill.style.transition = 'transform 0.15s ease'; pill.style.transform = ''; }
      el.style.transition = 'transform 0.15s ease'; el.style.transform = '';
    });
    el.addEventListener('pointerleave', () => {
      const pill = findPill(parseInt(el.dataset.tidx, 10));
      if (pill) { pill.style.transition = 'transform 0.15s ease'; pill.style.transform = ''; }
      el.style.transition = 'transform 0.15s ease'; el.style.transform = '';
    });
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.tidx, 10);
      if (isNaN(idx) || idx < 0 || idx >= N) return;
      // If already selected, close it
      if (idx === selectedIdx) { hideDetail(); return; }

      const scrollY = window.scrollY;
      const prevTemp = tempVisibleIdx;
      const needsTemp = !isVisible(idx);

      // Animate old temp cell out — shrink to 0, tick cleanup handles removal
      if (prevTemp >= 0 && prevTemp !== idx) {
        tgt[prevTemp].doneH = 0;
        fadingOutTemp = prevTemp;
        tempVisibleIdx = -1;
      }

      // Set new temp if needed
      if (needsTemp) {
        tempVisibleIdx = idx;
        cells[idx].doneH = 1;
        tgt[idx].doneH = CH;
      } else {
        tempVisibleIdx = -1;
      }

      // Show detail immediately (swap), let showDetail handle the panel transition
      showDetail(idx);
      computeLayout(); resizeCanvas();
      window.scrollTo(0, scrollY);
      kick();
    });
  });

  // Pre-measure sub text line counts for layout
  function measureTextHeights() {
    ctx.font = '12px JetBrains Mono, monospace';
    cells.forEach((cell, idx) => {
      const lines = wrapText(tasks[idx].sub, CW - 32, 2);
      cell.textBtm = 52 + (lines.length - 1) * 15 + 12; // 52 = sub yBase relative to cell top
    });
  }

  // Init
  loadLS(); recalcTargets();
  // Need initial canvas size for text measurement
  canvas.width = CW * DPR; canvas.height = 100 * DPR;
  canvas.style.width = CW + 'px'; canvas.style.height = '100px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  measureTextHeights();
  computeLayout(); resizeCanvas();
  updateCounter(); draw();
  // SVG needs layout — defer until circles are rendered
  requestAnimationFrame(() => drawProgressSvg());
  // Re-measure after fonts load (JetBrains Mono may change text widths)
  document.fonts.ready.then(() => {
    measureTextHeights(); computeLayout(); resizeCanvas(); draw();
  });

  self.destroy = function() {
    if (raf) cancelAnimationFrame(raf);
    if (holdRaf) cancelAnimationFrame(holdRaf);
    if (holdDelayTimer) clearTimeout(holdDelayTimer);
    // Reset detail panel so it doesn't bleed into next init
    selectedIdx = -1; expandIdx = -1; expandH = 0; expandTarget = 0; collapseIdx = -1; collapseH = 0;
    detailPanel.classList.remove('open');
  };
}

function applyTaskStates(panelId) {
  // Init or re-init the canvas for this panel's task group
  initTaskCanvas(panelId);
}

function initTaskCanvas(panelId) {
  const wrap = document.querySelector(`#panel-${panelId} .task-canvas-wrap`);
  if (!wrap) return;
  const taskkey = wrap.dataset.taskkey;
  const taskSet = TASK_SETS[taskkey];
  if (!taskSet || !taskSet.tasks || taskSet.tasks.length === 0) return;

  // Destroy previous instance if exists
  if (taskCanvases[panelId]) {
    taskCanvases[panelId].destroy();
    delete taskCanvases[panelId];
  }

  // Clear any previous canvas
  const slot = wrap.querySelector('.tc-canvas-slot');
  if (slot) slot.innerHTML = '';

  const colors = TASK_COLORS;
  const storageKey = `dates-tasks-${taskkey}`;

  taskCanvases[panelId] = new TaskCanvas(wrap, taskSet.tasks, storageKey, colors, panelId);
}

function renderHeader() {
  let pillsHtml = '<div class="class-filter-row">';
  for (const cls of Object.keys(CLASSES)) {
    const css = CLASSES[cls].css;
    const isActive = activeClassFilters.has(cls);
    pillsHtml += `<span class="class-filter-pill ${css}${isActive ? ' active' : ''}" data-cls="${cls}">${cls}</span>`;
  }
  pillsHtml += '</div>';

  document.getElementById('headerBlock').innerHTML = `
    <p class="date-line">UPDATED ${fmtDateLong(typeof SCRAPE_DATE !== 'undefined' ? SCRAPE_DATE : BUILD_DATE).toUpperCase()}</p>
    ${pillsHtml}
  `;

  // Bind click handlers
  document.querySelectorAll('.class-filter-pill').forEach(el => {
    el.addEventListener('click', () => {
      const cls = el.dataset.cls;
      if (activeClassFilters.has(cls)) {
        activeClassFilters.delete(cls);
      } else {
        activeClassFilters.add(cls);
      }
      render();
    });
  });
}

function isTasksComplete(key) {
  const taskSet = TASK_SETS[key];
  if (!taskSet || !taskSet.tasks || taskSet.tasks.length === 0) return false;
  let state = {};
  try { state = JSON.parse(localStorage.getItem(`dates-tasks-${key}`)) || {}; } catch(e) {}
  return taskSet.tasks.every(t => {
    const v = state[t.id];
    return v === true || v === 'done' || v === 'passed';
  });
}

function renderMiniProgress(key) {
  const taskSet = TASK_SETS[key];
  if (!taskSet || !taskSet.tasks || taskSet.tasks.length === 0) return '';
  const tasks = taskSet.tasks;
  const N = tasks.length;

  // Read state from localStorage (same key as TaskCanvas)
  let state = {};
  try { state = JSON.parse(localStorage.getItem(`dates-tasks-${key}`)) || {}; } catch(e) {}

  // Build cell states — requires uses numeric indices (same as TaskCanvas)
  const cells = tasks.map((t, i) => {
    const v = state[t.id];
    return { done: v === true || v === 'done', passed: v === 'passed' };
  });
  // Compute locked/visible using same logic as TaskCanvas
  const cellsFull = cells.map((c, i) => {
    const reqs = tasks[i].requires || [];
    const locked = reqs.length > 0 && reqs.some(r => r !== i && !cells[r].done && !cells[r].passed);
    let visible = c.done || c.passed || !locked;
    if (!visible) {
      // Next-visible: locked but all pending deps are themselves unlocked
      const pending = reqs.filter(r => r !== i && !cells[r].done && !cells[r].passed);
      visible = pending.length > 0 && pending.every(r => {
        const dreqs = tasks[r].requires || [];
        return dreqs.length === 0 || !dreqs.some(dr => dr !== r && !cells[dr].done && !cells[dr].passed);
      });
    }
    return { ...c, locked, visible };
  });

  const PH = 8, PR = PH / 2;
  const gap = 3;
  const pillW = 12;
  const totalW = N * pillW + (N - 1) * gap;

  let paths = '';
  let i = 0;
  while (i < N) {
    if (cellsFull[i].done) {
      let j = i;
      while (j < N && cellsFull[j].done) j++;
      const lx = i * (pillW + gap);
      const rx = (j - 1) * (pillW + gap) + pillW;
      paths += `<rect x="${lx}" y="0" width="${rx - lx}" height="${PH}" rx="${PR}" ry="${PR}" fill="rgba(70,145,130,0.85)"/>`;
      i = j;
    } else {
      const x = i * (pillW + gap);
      let fill;
      if (cellsFull[i].passed) {
        fill = 'rgba(170,140,30,0.45)';       // Gold — skipped
      } else if (!cellsFull[i].locked) {
        fill = 'rgba(185,85,105,0.8)';        // Pink — unlocked/active
      } else if (cellsFull[i].visible) {
        fill = 'rgba(192,110,125,0.35)';      // Light pink — next-locked
      } else {
        fill = 'rgba(190,185,175,0.4)';       // Grey — hidden
      }
      paths += `<rect x="${x}" y="0" width="${pillW}" height="${PH}" rx="${PR}" ry="${PR}" fill="${fill}"/>`;
      i++;
    }
  }

  const allComplete = cellsFull.every(c => c.done || c.passed);
  return `<div class="mini-progress" data-taskkey="${key}" data-complete="${allComplete ? '1' : '0'}"><svg class="mini-progress-svg" width="${totalW}" height="${PH}" viewBox="0 0 ${totalW} ${PH}">${paths}</svg></div>`;
}

function refreshMiniProgress() {
  document.querySelectorAll('.mini-progress[data-taskkey]').forEach(el => {
    const key = el.dataset.taskkey;
    const html = renderMiniProgress(key);
    if (html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      const newEl = tmp.firstElementChild;
      const card = el.closest('.item-card');
      el.replaceWith(newEl);
      // Toggle solid border when all tasks complete
      if (card) {
        const wasDone = card.classList.contains('tasks-complete');
        if (newEl.dataset.complete === '1') card.classList.add('tasks-complete');
        else card.classList.remove('tasks-complete');
        if (wasDone !== card.classList.contains('tasks-complete') && !card.classList.contains('is-expanded')) {
          drawCardBorder(card);
        }
      }
    }
  });
}

function renderItemCards(items, isPast) {
  let html = '';
  let lastDate = '';
  let idx = 0;

  items.forEach(it => {
    if (it.date !== lastDate) {
      lastDate = it.date;
      const days = daysUntil(it.date);
      const todayCls = isToday(it.date) ? ' is-today' : isPast ? ' is-past' : '';
      const urgency = !isPast ? urgencyLabel(days) : '';
      html += `<div class="date-marker${todayCls}" style="animation-delay:${idx * 40}ms">
        <span>${fmtDate(it.date).toUpperCase()}</span>
        ${urgency ? `<span class="day-name">\u00b7 ${urgency.toUpperCase()}</span>` : ''}
      </div>`;
      idx++;
    }

    const id = itemId(it);
    const pastCls = isPast ? ' is-past' : '';
    const doneCls = it.status === 'Turned in' ? ' is-done' : '';
    const missCls = it.status === 'Missing' ? ' is-missing' : '';
    const todayCard = isToday(it.date) && !isPast ? ' is-today-card' : '';
    const typeCls = (it.type === 'deadline' || it.type === 'assessment') ? ` type-label type-${it.type}` : 'type-label';

    const clsCss = CLASSES[it.cls].css;
    const tasksCompCls = isTasksComplete(it.key) ? ' tasks-complete' : '';
    html += `<div class="item-card ${clsCss}${pastCls}${doneCls}${missCls}${todayCard}${tasksCompCls}" data-id="${id}" style="animation-delay:${idx * 40}ms">
      <div class="item-meta-line">
        <span class="class-pill ${CLASSES[it.cls].css}">${it.cls}</span>
        <span class="${typeCls}">${it.type}</span>
        ${statusBadgeHTML(it.status)}
      </div>
      <div class="item-title">${it.short || it.title}</div>
      ${renderMiniProgress(it.key)}
    </div>`;

    // Detail panel (hidden by default, rendered inline for this card)
    const days = daysUntil(it.date);
    const sourceFmt = fmtSource(it.source);
    const classworkUrl = CLASSES[it.cls].classwork;
    const dateLabel = it.type === 'material' ? 'Posted' : 'Due';
    let timeCtx = `${fmtDate(it.date)}`;
    if (!isPast && days > 0) timeCtx += ` \u00b7 ${days} day${days !== 1 ? 's' : ''} away`;
    else if (days < 0) timeCtx += ` \u00b7 ${Math.abs(days)} day${Math.abs(days) !== 1 ? 's' : ''} ago`;
    else if (days === 0) timeCtx += ' \u00b7 today';

    let srcHtml = '';
    if (sourceFmt) {
      const srcUrl = sourceUrl(it.cls, it.source);
      srcHtml = srcUrl
        ? `<div class="detail-source"><strong>Source:</strong> <a href="${srcUrl}" target="_blank" onclick="event.stopPropagation()">${sourceFmt}</a></div>`
        : `<div class="detail-source"><strong>Source:</strong> ${sourceFmt}</div>`;
    }

    const srcPath = it.source ? sourceUrl(it.cls, it.source) : null;

    // Build canvas task widget if available for this item
    const taskSet = TASK_SETS[it.key];
    let tasksHtml = '';
    if (taskSet && taskSet.tasks && taskSet.tasks.length > 0) {
      const circleCount = taskSet.tasks.length;
      let circlesHtml = '';
      for (let ci = 0; ci < circleCount; ci++) {
        circlesHtml += `<span class="task-circle" data-tidx="${ci}">${ci + 1}</span>`;
      }
      tasksHtml = `<div class="task-canvas-wrap" data-taskkey="${it.key}">
        <div class="task-progress-row">
          <svg class="task-progress-svg"></svg>
          <div class="task-progress-circles">${circlesHtml}</div>
        </div>
        <div class="tc-canvas-slot"></div>
        <div class="task-detail-panel">
          <div class="task-detail-inner">
            <hr class="task-detail-sep">
            <div class="task-detail-desc td-desc"></div>
            <div class="task-unlock-hint td-unlock"></div>
            <ul class="task-detail-bullets td-bullets"></ul>
            <div class="task-detail-deliverable td-deliverable"></div>
            <div class="task-detail-actions">
              <button class="action-btn btn-pass td-pass">skip</button>
              <button class="btn-close-task td-close">&times;</button>
            </div>
            <div class="task-detail-links">
              <a class="btn-doc td-doc" target="_blank">&#8599; open doc</a>
            </div>
          </div>
        </div>
        <div class="task-hold-hint">hold to complete \u00b7 tap to expand</div>
      </div>`;
    }

    html += `<div class="detail-panel" id="panel-${id}">
      <div class="detail-pointer"></div>
      <div class="detail-inner">
        ${(it.detail || it.desc) ? `<div class="detail-desc">${it.detail || it.desc}</div>` : ''}
        ${srcPath ? `<div class="detail-links"><a class="action-btn btn-doc" href="${srcPath}" target="_blank" onclick="event.stopPropagation()">&#8599; full analysis</a></div>` : ''}
        ${tasksHtml}
        ${srcHtml}
        <div class="detail-actions">
          ${classworkUrl ? `<a class="action-btn btn-classwork" href="${classworkUrl}" target="_blank" onclick="event.stopPropagation()">&#8599; classwork</a>` : ''}
          <button class="action-btn btn-close" onclick="event.stopPropagation(); closeDetail()">&times;</button>
        </div>
      </div>
    </div>`;

    idx++;
  });

  return html;
}

function renderAlerts(anomalies) {
  let html = '';
  anomalies.forEach((a, i) => {
    const isWarn = a.type === 'needs_turn_in';
    const cardCls = isWarn ? 'alert-card alert-warn' : 'alert-card';
    const badgeCls = isWarn ? 'badge-turn-in' : 'badge-overdue';
    const aid = 'alert-' + i;

    html += `<div class="${cardCls}" data-alert="${aid}" style="animation-delay:${i * 60}ms">
      <svg class="card-border" overflow="visible"><rect x="0" y="0" width="100%" height="100%" rx="19" ry="19"/></svg>
      <div class="item-meta-line">
        <span class="class-pill ${CLASSES[a.cls].css}">${a.cls}</span>
        <span class="alert-badge ${badgeCls}">${a.type === 'needs_turn_in' ? 'needs turn in' : a.status}</span>
      </div>
      <div style="margin-top:8px">
        <div class="alert-title">${a.doc}</div>
        <div class="item-type" style="margin-top:3px">${a.assignment}</div>
      </div>
      <div class="alert-detail" id="alert-detail-${aid}">
        <hr class="alert-sep">
        ${a.pct > 0 ? `<div class="alert-progress"><div class="alert-progress-bar" style="width:${a.pct}%"></div></div>
        <div class="progress-label"><span>Progress:</span> ${a.pct}% ${a.progress.replace('_',' ')}</div>` : ''}
        <div class="alert-sub">${a.summary}</div>
        <div class="next-steps-label">Next steps</div>
        <ul class="alert-steps">${a.next_steps.map(s => `<li>${s}</li>`).join('')}</ul>
        <div class="detail-actions" style="margin-top:14px">
          <a class="action-btn btn-classwork" href="${a.doc_url}" target="_blank" onclick="event.stopPropagation()">&#8599; open doc</a>
          <button class="action-btn btn-close" onclick="event.stopPropagation(); closeAlert('${aid}')">&times;</button>
        </div>
      </div>
    </div>`;
  });
  return html;
}

function closeDetail() {
  if (!expandedId) return;
  const panel = document.getElementById('panel-' + expandedId);
  const card = document.querySelector(`[data-id="${expandedId}"]`);
  if (panel) panel.classList.remove('open');
  expandedId = null;
  if (card) {

    card.style.transition = 'margin-bottom 0.3s ease, transform 0.15s ease';
    card.style.marginBottom = '10px';
    setTimeout(() => {
      card.style.transition = 'none';
      card.classList.remove('is-expanded');
      card.style.marginBottom = '';
      stopCardBorderAnim(card);
      drawCardBorder(card);
      card.offsetHeight;
      // Restore with transform transition so :active bounce-back animates
      card.style.transition = 'transform 0.15s ease';
      requestAnimationFrame(() => { card.style.transition = ''; });
    }, 320);
    // Recalc parent container height
    const body = card.closest('.section-body') || card.closest('.tab-frame-content') || card.closest('.current-content');
    if (body) setTimeout(() => { body.style.maxHeight = body.scrollHeight + 'px'; }, 350);
  }
}

// --- Unified card border system ---
// One persistent SVG per card, four-path dashes (same technique as task canvas).
// Expanded: SVG grows to include detail panel with dual fills + RAF animation.
// Closed: static SVG at card size, no fills needed (card has its own CSS bg).

let cardBorderRaf = null;
let cardBorderAnimCard = null; // which card is currently animating

function getCardStroke(card) {
  const cl = card.classList;
  const isPast = cl.contains('is-past');
  const isDone = cl.contains('tasks-complete');
  if (cl.contains('cp-12ftx'))  return isPast ? 'rgba(184,80,30,0.04)' : isDone ? 'rgba(184,80,30,0.18)' : 'rgba(184,80,30,0.1)';
  if (cl.contains('cp-enw223')) return isPast ? 'rgba(80,120,160,0.04)' : isDone ? 'rgba(80,120,160,0.18)' : 'rgba(80,120,160,0.1)';
  if (cl.contains('cp-flm223')) return isPast ? 'rgba(140,60,120,0.04)' : isDone ? 'rgba(140,60,120,0.18)' : 'rgba(140,60,120,0.1)';
  if (cl.contains('cp-mus223')) return isPast ? 'rgba(60,130,100,0.04)' : isDone ? 'rgba(60,130,100,0.18)' : 'rgba(60,130,100,0.1)';
  if (cl.contains('cp-mat223')) return isPast ? 'rgba(100,90,160,0.04)' : isDone ? 'rgba(100,90,160,0.18)' : 'rgba(100,90,160,0.1)';
  if (cl.contains('cp-fcm112')) return isPast ? 'rgba(160,120,50,0.04)' : isDone ? 'rgba(160,120,50,0.18)' : 'rgba(160,120,50,0.1)';
  if (cl.contains('is-done')) return 'rgba(43,95,138,0.4)';
  if (cl.contains('is-missing')) return 'rgba(180,60,50,0.15)';
  if (cl.contains('is-today-card')) return 'rgba(184,80,30,0.12)';
  if (isPast) return 'rgba(43,95,138,0.035)';
  return 'rgba(43,95,138,0.08)';
}

function getCardDash(card) {
  return (card.classList.contains('tasks-complete') || card.classList.contains('is-done')) ? 'none' : '6 4';
}

function getExpandFillColor(card) {
  const cl = card.classList;
  // Pre-composited solid colors: rgba on page bg #ECEAE3 (236,234,227)
  const onPage = { default: 'rgb(225,230,230)', '12ftx': 'rgb(232,222,211)', 'enw223': 'rgb(224,225,222)', 'flm223': 'rgb(228,220,219)', 'mus223': 'rgb(222,226,217)', 'mat223': 'rgb(225,223,222)', 'fcm112': 'rgb(230,225,213)' };
  const onFrame = { default: 'rgb(234,238,235)', '12ftx': 'rgb(241,230,221)', 'enw223': 'rgb(232,233,232)', 'flm223': 'rgb(237,228,229)', 'mus223': 'rgb(230,234,227)', 'mat223': 'rgb(233,231,232)', 'fcm112': 'rgb(238,233,223)' };
  const inFrame = !!(card.closest('.tab-frame-content') || card.closest('.current-content'));
  const map = inFrame ? onFrame : onPage;
  for (const key of ['12ftx','enw223','flm223','mus223','mat223','fcm112']) {
    if (cl.contains('cp-' + key)) return map[key];
  }
  return map.default;
}

function renderBorderPaths(W, H, strokeColor, dashArray, S, R) {
  const i = S / 2;
  const x0 = i, y0 = i, x1 = W - i, y1 = H - i;
  const r = R;
  const topD = `M${x0},${y0+r} Q${x0},${y0} ${x0+r},${y0} L${x1-r},${y0} Q${x1},${y0} ${x1},${y0+r}`;
  const rightD = `M${x1},${y0+r} L${x1},${y1-r}`;
  const btmD = `M${x1},${y1-r} Q${x1},${y1} ${x1-r},${y1} L${x0+r},${y1} Q${x0},${y1} ${x0},${y1-r}`;
  const leftD = `M${x0},${y0+r} L${x0},${y1-r}`;
  const da = dashArray === 'none' ? '' : `stroke-dasharray="${dashArray}"`;
  const attr = `fill="none" stroke="${strokeColor}" stroke-width="${S}" ${da}`;
  return `<path d="${topD}" ${attr}/><path d="${rightD}" ${attr}/><path d="${btmD}" ${attr}/><path d="${leftD}" ${attr}/>`;
}

function drawCardBorder(card) {
  let svg = card.querySelector('.card-border-svg');
  if (!svg) {
    svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.classList.add('card-border-svg');
    card.appendChild(svg);
  }
  const R = 19, S = 1.8;
  const W = card.offsetWidth + 2;
  const H = card.offsetHeight + 2;
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.innerHTML = renderBorderPaths(W, H, getCardStroke(card), getCardDash(card), S, R);
}

function drawAllCardBorders() {
  document.querySelectorAll('.item-card[data-id]').forEach(card => {
    if (!card.classList.contains('is-expanded')) drawCardBorder(card);
  });
}

function startCardBorderAnim(card, panel) {
  const R = 19, S = 1.8;
  let svg = card.querySelector('.card-border-svg');
  if (!svg) {
    svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.classList.add('card-border-svg');
    card.appendChild(svg);
  }
  const strokeColor = getCardStroke(card);
  const dashArray = getCardDash(card);
  const cardFill = getExpandFillColor(card);
  const detailFill = 'rgb(253,251,246)';
  const uid = card.dataset.id || '0';

  function update() {
    if (!card.querySelector('.card-border-svg')) { cardBorderRaf = null; return; }
    const cardH = card.offsetHeight;
    const panelH = panel.offsetHeight;
    const W = card.offsetWidth + 2;
    const totalH = cardH + panelH + 2;
    const splitY = cardH + 1;
    const i = S / 2;
    svg.setAttribute('width', W);
    svg.setAttribute('height', totalH);
    svg.innerHTML = `
      <defs>
        <clipPath id="clip-top-${uid}"><rect x="0" y="0" width="${W}" height="${splitY}"/></clipPath>
        <clipPath id="clip-btm-${uid}"><rect x="0" y="${splitY}" width="${W}" height="${totalH - splitY}"/></clipPath>
      </defs>
      <rect x="${i}" y="${i}" width="${W-S}" height="${totalH-S}" rx="${R}" ry="${R}"
            fill="${cardFill}" clip-path="url(#clip-top-${uid})"/>
      <rect x="${i}" y="${i}" width="${W-S}" height="${totalH-S}" rx="${R}" ry="${R}"
            fill="${detailFill}" clip-path="url(#clip-btm-${uid})"/>
      ${renderBorderPaths(W, totalH, strokeColor, dashArray, S, R)}
    `;
    cardBorderRaf = requestAnimationFrame(update);
  }

  if (cardBorderRaf) cancelAnimationFrame(cardBorderRaf);
  cardBorderAnimCard = card;
  update();
}

function stopCardBorderAnim(card) {
  if (cardBorderRaf && cardBorderAnimCard === card) {
    cancelAnimationFrame(cardBorderRaf);
    cardBorderRaf = null;
    cardBorderAnimCard = null;
  }
}

function closeAlert(aid) {
  const detail = document.getElementById('alert-detail-' + aid);
  const card = document.querySelector(`[data-alert="${aid}"]`);
  if (detail) { detail.style.maxHeight = detail.scrollHeight + 'px'; requestAnimationFrame(() => { detail.style.maxHeight = '0'; detail.classList.remove('open'); }); }
  if (card) card.classList.remove('is-expanded');
  if (expandedId === aid) expandedId = null;
}

function render() {
  const filtered = filteredItems(ITEMS);
  const allFuture = filtered.filter(it => it.date >= TODAY_STR).sort((a,b) => a.date.localeCompare(b.date) || a.cls.localeCompare(b.cls));
  const current = allFuture.filter(it => daysUntil(it.date) <= 14);
  const upcoming = allFuture.filter(it => daysUntil(it.date) > 14);
  const pastItems = filtered.filter(it => it.date < TODAY_STR).sort((a,b) => b.date.localeCompare(a.date) || a.cls.localeCompare(b.cls));

  renderHeader();

  // Auto-open Future tab if nothing is current
  if (current.length === 0 && upcoming.length > 0 && activeTab === null) {
    activeTab = 'upcoming';
  }

  let html = '';

  // Alerts
  if (ANOMALIES.length > 0) {
    html += `<div class="section-label section-alerts" data-section="alerts">
      <span class="section-chevron${!alertsCollapsed ? ' open' : ''}">&#x25B8;</span>
      Alerts <span class="section-count">(${ANOMALIES.length})</span>
    </div>`;
    html += `<div class="section-body${alertsCollapsed ? ' collapsed' : ''}" id="alertsBody" style="max-height:${alertsCollapsed ? '0' : 'none'}">`;
    html += renderAlerts(ANOMALIES);
    html += `</div>`;
  }

  // Current — simple pill-shaped container with centred label
  html += `<div class="current-frame">
    <div class="current-header">
      <span class="current-title">Current</span>
    </div>
    <div class="current-content">
      ${current.length > 0 ? renderItemCards(current, false) : '<div class="current-empty">Nothing Due</div>'}
    </div>
  </div>`;

  // Tab pills
  html += `<div class="tab-row">
    <button class="tab-btn${activeTab === 'upcoming' ? ' active' : ''}" data-tab="upcoming">Future</button>
    <button class="tab-btn${activeTab === 'past' ? ' active' : ''}" data-tab="past">Past</button>
  </div>`;

  // Full-width frame — upcoming (left pill → from-left)
  html += `<div class="tab-frame from-left${activeTab === 'upcoming' ? ' open' : ''}" id="upcomingTab">`;
  html += `<svg class="tab-frame-svg"></svg>`;
  html += `<div class="tab-frame-content">`;
  html += upcoming.length > 0 ? renderItemCards(upcoming, false) : `<div class="empty-note">No upcoming items</div>`;
  html += `</div></div>`;

  // Full-width frame — past (right pill → from-right)
  html += `<div class="tab-frame from-right${activeTab === 'past' ? ' open' : ''}" id="pastTab">`;
  html += `<svg class="tab-frame-svg"></svg>`;
  html += `<div class="tab-frame-content">`;
  html += pastItems.length > 0 ? renderItemCards(pastItems, true) : `<div class="empty-note">No past items</div>`;
  html += `</div></div>`;


  document.getElementById('sections').innerHTML = html;
  document.getElementById('sections').style.width = '100%';
  document.getElementById('sections').style.maxWidth = '380px';
  document.getElementById('sections').style.display = 'flex';
  document.getElementById('sections').style.flexDirection = 'column';
  document.getElementById('sections').style.gap = '0';

  expandedId = null;
  bindEvents();
  // Defer drawing until layout is fully settled
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      drawTabConnectors();
      drawAllCardBorders();
    });
  });
}

let tabBorderRaf = null;

function drawTabConnectorForFrame(frame) {
  const PR = 14, R = 18, BR = 14, S = 1.5;
  const color = 'rgba(58,48,40,0.2)';
  const frameBg = 'rgba(245,243,238,0.95)';

  const svg = frame.querySelector('.tab-frame-svg');
  if (!svg) return;
  // Find the active button that owns this frame
  let activeBtn;
  if (frame.id === 'currentTab') activeBtn = document.querySelector('.tab-btn[data-tab="current"].active');
  else if (frame.id === 'upcomingTab') activeBtn = document.querySelector('.tab-btn[data-tab="upcoming"].active');
  else if (frame.id === 'pastTab') activeBtn = document.querySelector('.tab-btn[data-tab="past"].active');
  else activeBtn = document.querySelector('.tab-btn.active');
  if (!activeBtn) return;
  const pillH = activeBtn.offsetHeight;
  const pillW = activeBtn.offsetWidth;
  const W = frame.offsetWidth;
  const FH = frame.offsetHeight;
  const TH = pillH + FH;
  if (W === 0 || TH === 0) return;

  const isLeft = frame.classList.contains('from-left');
  const UP = 5; // shift frame outline upward into pill area
  const pH = pillH - UP; // effective junction height
  let path;
  if (isLeft) {
    const cx = pillW;
    path = `M ${PR} 0 L ${cx - PR} 0 A ${PR} ${PR} 0 0 1 ${cx} ${PR} L ${cx} ${pH} A ${R} ${R} 0 0 0 ${cx + R} ${pH + R} L ${W - R} ${pH + R} A ${R} ${R} 0 0 1 ${W} ${pH + R + R} L ${W} ${TH - BR} A ${BR} ${BR} 0 0 1 ${W - BR} ${TH} L ${BR} ${TH} A ${BR} ${BR} 0 0 1 0 ${TH - BR} L 0 ${PR} A ${PR} ${PR} 0 0 1 ${PR} 0 Z`;
  } else {
    const cx = W - pillW;
    path = `M ${W - PR} 0 A ${PR} ${PR} 0 0 1 ${W} ${PR} L ${W} ${TH - BR} A ${BR} ${BR} 0 0 1 ${W - BR} ${TH} L ${BR} ${TH} A ${BR} ${BR} 0 0 1 0 ${TH - BR} L 0 ${pH + R + R} A ${R} ${R} 0 0 1 ${R} ${pH + R} L ${cx - R} ${pH + R} A ${R} ${R} 0 0 0 ${cx} ${pH} L ${cx} ${PR} A ${PR} ${PR} 0 0 1 ${cx + PR} 0 Z`;
  }
  svg.style.top = -pillH + 'px';
  svg.setAttribute('width', W);
  svg.setAttribute('height', TH);
  svg.innerHTML = `<path d="${path}" fill="${frameBg}" stroke="${color}" stroke-width="${S}"/>`;
}

function drawTabConnectors() {
  document.querySelectorAll('.tab-frame.open').forEach(drawTabConnectorForFrame);
}

function startTabBorderAnim(frame) {
  stopTabBorderAnim();
  function tick() {
    drawTabConnectorForFrame(frame);
    tabBorderRaf = requestAnimationFrame(tick);
  }
  tabBorderRaf = requestAnimationFrame(tick);
}

function stopTabBorderAnim() {
  if (tabBorderRaf) { cancelAnimationFrame(tabBorderRaf); tabBorderRaf = null; }
}

function bindEvents() {
  // Tab switching — click toggles pill open/closed
  function openTabFrame(frame) {
    const content = frame.querySelector('.tab-frame-content');
    const children = Array.from(content.querySelectorAll('.item-card, .date-marker'));
    children.forEach((child, i) => { child.style.animationDelay = (i * 30) + 'ms'; });
    frame.classList.remove('closing');
    frame.classList.add('opening', 'open');
    // Start content collapsed, animate to full height
    content.style.transition = 'none';
    content.style.maxHeight = '0';
    content.offsetHeight; // force reflow
    content.style.transition = '';
    requestAnimationFrame(() => {
      content.style.maxHeight = content.scrollHeight + 'px';
      startTabBorderAnim(frame);
      frame.classList.add('svg-ready');
      const dur = Math.max(350, children.length * 30 + 250);
      // Redraw card borders at key moments during animation, not every frame
      const cardRedrawTimes = [50, 150, 250, dur];
      cardRedrawTimes.forEach(t => {
        setTimeout(() => {
          content.querySelectorAll('.item-card[data-id]').forEach(card => {
            if (!card.classList.contains('is-expanded')) drawCardBorder(card);
          });
        }, t);
      });
      setTimeout(() => {
        stopTabBorderAnim();
        frame.classList.remove('opening', 'svg-ready');
        content.style.maxHeight = '';
        content.style.overflow = '';
        drawTabConnectors();
        drawAllCardBorders();
      }, dur);
    });
  }

  function closeTabFrame(frame, cb) {
    const content = frame.querySelector('.tab-frame-content');
    frame.classList.remove('opening', 'svg-ready');
    frame.classList.add('closing');
    content.style.transition = 'none';
    content.style.maxHeight = content.scrollHeight + 'px';
    content.offsetHeight; // force reflow
    content.style.transition = '';
    startTabBorderAnim(frame);
    requestAnimationFrame(() => { content.style.maxHeight = '0'; });
    function onEnd(e) {
      if (e.propertyName !== 'max-height') return;
      content.removeEventListener('transitionend', onEnd);
      stopTabBorderAnim();
      frame.classList.remove('closing', 'open', 'svg-fade');
      content.style.maxHeight = '';
      content.style.transition = '';
      // Snap pill border back instantly — no fade, no second stage
      if (cb) {
        const btn = frame.id === 'currentTab' ? document.querySelector('.tab-btn[data-tab="current"]')
                  : frame.id === 'upcomingTab' ? document.querySelector('.tab-btn[data-tab="upcoming"]')
                  : document.querySelector('.tab-btn[data-tab="past"]');
        if (btn) {
          btn.style.transition = 'none';
          cb();
          btn.offsetHeight; // force reflow
          btn.style.transition = '';
        } else { cb(); }
      }
    }
    content.addEventListener('transitionend', onEnd);
  }

  function getFrameForTab(tab) {
    if (tab === 'upcoming') return document.getElementById('upcomingTab');
    if (tab === 'past') return document.getElementById('pastTab');
    return null;
  }

  function pushTabDown(btn) {
    const tab = btn.dataset.tab;
    const frame = getFrameForTab(tab);
    const withFrame = frame && frame.classList.contains('open');
    if (withFrame) {
      const bRect = btn.getBoundingClientRect();
      const fRect = frame.getBoundingClientRect();
      const pillCx = bRect.left + bRect.width / 2;
      const pillCy = bRect.top + bRect.height / 2;
      btn.style.transformOrigin = '50% 50%';
      frame.style.transformOrigin = (pillCx - fRect.left) + 'px ' + (pillCy - fRect.top) + 'px';
    }
    const els = withFrame ? [btn, frame] : [btn];
    els.forEach(el => {
      el.style.transition = 'transform 0.08s ease';
      el.style.transform = 'scale(0.975)';
    });
  }

  function pushTabUp(btn) {
    const tab = btn.dataset.tab;
    const frame = getFrameForTab(tab);
    [btn, frame].forEach(el => {
      if (!el) return;
      el.style.transition = 'transform 0.25s cubic-bezier(0.18, 0.89, 0.32, 1.15)';
      el.style.transform = '';
    });
    setTimeout(() => {
      [btn, frame].forEach(el => {
        if (!el) return;
        el.style.transition = '';
        el.style.transformOrigin = '';
      });
    }, 280);
  }

  document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
    if (btn.classList.contains('no-collapse')) return; // Current — skip all interaction
    btn.addEventListener('pointerdown', () => pushTabDown(btn));
    btn.addEventListener('pointerup', () => pushTabUp(btn));
    btn.addEventListener('pointerleave', () => pushTabUp(btn));
    btn.addEventListener('pointercancel', () => pushTabUp(btn));
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      closeDetail();
      const frame = getFrameForTab(tab);

      // Future/Past — mutual exclusive pair
      if (activeTab === tab) {
        activeTab = null;
        closeTabFrame(frame, () => {
          btn.classList.remove('active');
        });
      } else {
        const oldBtn = activeTab ? document.querySelector('.tab-btn[data-tab="' + activeTab + '"].active') : null;
        const oldFrame = activeTab ? getFrameForTab(activeTab) : null;
        const doOpen = () => {
          if (oldBtn) oldBtn.classList.remove('active');
          btn.classList.add('active');
          activeTab = tab;
          openTabFrame(frame);
        };
        if (oldFrame && oldFrame.classList.contains('open')) {
          closeTabFrame(oldFrame, doOpen);
        } else {
          doOpen();
        }
      }
    });
  });

  // Alerts section toggle
  document.querySelectorAll('.section-label[data-section="alerts"]').forEach(label => {
    label.addEventListener('click', () => {
      const body = document.getElementById('alertsBody');
      if (!body) return;
      const chevron = label.querySelector('.section-chevron');
      const isCollapsed = body.classList.contains('collapsed');

      if (body.dataset.animating === '1') return;
      body.dataset.animating = '1';

      const children = Array.from(body.querySelectorAll('.alert-card, .date-marker'));
      const total = children.length;

      if (isCollapsed) {
        children.forEach((child, i) => { child.style.animationDelay = (i * 40) + 'ms'; });
        body.classList.remove('collapsed', 'closing');
        body.style.transition = 'none';
        body.style.maxHeight = '0';
        body.offsetHeight;
        body.classList.add('opening');
        body.style.transition = '';
        requestAnimationFrame(() => { body.style.maxHeight = body.scrollHeight + 'px'; });
        if (chevron) chevron.classList.add('open');
        alertsCollapsed = false;
        setTimeout(() => { body.classList.remove('opening'); body.style.maxHeight = body.scrollHeight + 'px'; body.dataset.animating = '0'; }, Math.max(400, total * 40 + 400));
      } else {
        closeDetail();
        children.forEach((child, i) => { child.style.animationDelay = ((total - 1 - i) * 30) + 'ms'; });
        body.classList.remove('opening');
        body.classList.add('closing');
        if (chevron) chevron.classList.remove('open');
        alertsCollapsed = true;
        body.style.transition = 'none';
        body.style.maxHeight = body.scrollHeight + 'px';
        body.offsetHeight;
        body.style.transition = '';
        requestAnimationFrame(() => { body.style.maxHeight = '0'; });
        setTimeout(() => { body.classList.remove('closing'); body.classList.add('collapsed'); body.dataset.animating = '0'; }, Math.max(500, total * 30 + 500));
      }
    });
  });

  // Item card → floating detail panel
  document.querySelectorAll('.item-card[data-id]').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.detail-panel.open')) return;
      const id = card.dataset.id;
      const panel = document.getElementById('panel-' + id);
      if (!panel) return;

      if (expandedId === id) {
        // Close — border keeps animating as panel shrinks
        panel.classList.remove('open');
        expandedId = null;
    
        card.style.transition = 'margin-bottom 0.3s ease, transform 0.15s ease';
        card.style.marginBottom = '10px';
        setTimeout(() => {
          card.style.transition = 'none';
          card.classList.remove('is-expanded');
          card.style.marginBottom = '';
          stopCardBorderAnim(card);
          drawCardBorder(card);
          card.offsetHeight;
          card.style.transition = 'transform 0.15s ease';
          requestAnimationFrame(() => { card.style.transition = ''; });
          recalcSectionHeight(card);
        }, 320);
      } else {
        // Close previous
        if (expandedId) {
          const prevPanel = document.getElementById('panel-' + expandedId);
          const prevCard = document.querySelector(`[data-id="${expandedId}"]`);
          if (prevPanel) prevPanel.classList.remove('open');
          if (prevCard) {

            prevCard.style.transition = 'margin-bottom 0.3s ease, transform 0.15s ease';
            prevCard.style.marginBottom = '10px';
            setTimeout(() => {
              prevCard.style.transition = 'none';
              prevCard.classList.remove('is-expanded');
              prevCard.style.marginBottom = '';
              stopCardBorderAnim(prevCard);
              drawCardBorder(prevCard);
              prevCard.offsetHeight;
              prevCard.style.transition = 'transform 0.15s ease';
              requestAnimationFrame(() => { prevCard.style.transition = ''; });
            }, 320);
          }
        }
        // Open this one — immediately grow section to avoid pop-in reflow
        const body = card.closest('.section-body') || card.closest('.tab-frame-content') || card.closest('.current-content');
        if (body) { body.style.transition = 'none'; body.style.maxHeight = body.scrollHeight + 1200 + 'px'; body.offsetHeight; body.style.transition = ''; }
        panel.classList.add('open');
        card.classList.add('is-expanded');
        expandedId = id;
        applyTaskStates(id);
        // Start animating border — RAF loop tracks panel size
        startCardBorderAnim(card, panel);
        setTimeout(() => { recalcSectionHeight(card); }, 350);
        setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 380);
      }
    });
  });

  // Alert card expand/collapse
  document.querySelectorAll('.alert-card[data-alert]').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.alert-detail.open')) return;
      const aid = card.dataset.alert;
      const detail = document.getElementById('alert-detail-' + aid);
      if (!detail) return;

      if (expandedId === aid) {
        detail.style.maxHeight = detail.scrollHeight + 'px';
        requestAnimationFrame(() => { detail.style.maxHeight = '0'; detail.classList.remove('open'); });
        card.classList.remove('is-expanded');
        expandedId = null;
      } else {
        // Close previous alert detail
        if (expandedId && expandedId.startsWith('alert-')) {
          closeAlert(expandedId.replace('alert-', ''));
        } else if (expandedId) {
          closeDetail();
        }
        detail.style.maxHeight = '0';
        detail.classList.add('open');
        requestAnimationFrame(() => {
          detail.style.maxHeight = detail.scrollHeight + 'px';
          // Update parent section/tab-frame-content height
          const body = card.closest('.section-body') || card.closest('.tab-frame-content') || card.closest('.current-content');
          if (body) setTimeout(() => { body.style.maxHeight = body.scrollHeight + 'px'; }, 50);
          setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 150);
        });
        card.classList.add('is-expanded');
        expandedId = aid;
      }
    });
  });

  // Task canvases are initialized on panel open via applyTaskStates()
}

function recalcSectionHeight(el) {
  const body = el.closest('.section-body') || el.closest('.tab-frame-content') || el.closest('.current-content');
  if (body && !body.classList.contains('collapsed')) {
    setTimeout(() => { body.style.maxHeight = body.scrollHeight + 'px'; }, 50);
  }
}

// Telegram
if (window.Telegram && window.Telegram.WebApp) {
  const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
}

function fixSectionHeights() {
  document.querySelectorAll('.section-body').forEach(body => {
    if (!body.classList.contains('collapsed')) {
      body.style.maxHeight = body.scrollHeight + 'px';
    }
  });
}

// Init
document.fonts.ready.then(() => { render(); requestAnimationFrame(fixSectionHeights); });
</script>
</body>
