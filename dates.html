    const PH = 22; // pill height
    const PR = PH / 2; // end-cap radius (fully rounded ends)
    const DIVOT = 0; // divot depth inward (0 = smooth)
    const DIVOT_W = 0; // divot half-width
    const CY = H / 2;

    let paths = '';
    const unlocked = cells.map((c, i) => !c.done && !c.passed && !isLocked(i));

    // Individual pill path helper
    function pillPath(x, y, w, h, r) {
      const hw = w / 2;
      return `M ${x - hw + r} ${y - h/2}` +
        ` L ${x + hw - r} ${y - h/2}` +
        ` A ${r} ${r} 0 0 1 ${x + hw - r} ${y + h/2}` +
        ` L ${x - hw + r} ${y + h/2}` +
        ` A ${r} ${r} 0 0 1 ${x - hw + r} ${y - h/2} Z`;
    }

    // Build runs
    let i = 0;
    while (i < N) {
      if (cells[i].done) {
        let j = i;
        while (j < N && cells[j].done) j++;
        if (j - i === 1) {
          // Solo done pill
          paths += `<path data-pill="${i}" d="${pillPath(cx[i], CY, PW, PH, PR)}" fill="rgba(90,155,145,0.75)" stroke="rgba(60,130,118,0.85)" stroke-width="1.5" style="transform-origin:${cx[i]}px ${CY}px"/>`;
        } else {
          // Merged blob: from left edge of first pill to right edge of last
          const lx = cx[i] - PW / 2; // left edge
          const rx = cx[j - 1] + PW / 2; // right edge
          const ty = CY - PH / 2, by = CY + PH / 2;
          let d = `M ${lx + PR} ${ty}`;
          // Top edge with divots between each pair
          for (let k = i; k < j - 1; k++) {
            const mid = (cx[k] + cx[k + 1]) / 2;
            d += ` L ${mid - DIVOT_W} ${ty}`;
            d += ` Q ${mid} ${ty + DIVOT} ${mid + DIVOT_W} ${ty}`;
          }
          d += ` L ${rx - PR} ${ty}`;
          // Right cap
          d += ` A ${PR} ${PR} 0 0 1 ${rx - PR} ${by}`;
          // Bottom edge with divots (right to left)
          for (let k = j - 2; k >= i; k--) {
            const mid = (cx[k] + cx[k + 1]) / 2;
            d += ` L ${mid + DIVOT_W} ${by}`;
            d += ` Q ${mid} ${by - DIVOT} ${mid - DIVOT_W} ${by}`;
          }
          d += ` L ${lx + PR} ${by}`;
          // Left cap
          d += ` A ${PR} ${PR} 0 0 1 ${lx + PR} ${ty} Z`;
          const mergedIds = Array.from({length: j - i}, (_, k) => i + k).join(',');
          const mergedCx = (cx[i] + cx[j - 1]) / 2;
          paths += `<path data-pills="${mergedIds}" d="${d}" fill="rgba(90,155,145,0.75)" stroke="rgba(60,130,118,0.85)" stroke-width="1.5" style="transform-origin:${mergedCx}px ${CY}px"/>`;
        }
        i = j;
      } else {
        let fill, stroke;
        if (cells[i].passed) {
          fill = 'rgba(180,150,40,0.2)'; stroke = 'rgba(180,150,40,0.5)';
        } else if (unlocked[i]) {
          fill = 'rgba(215,160,168,0.55)'; stroke = 'rgba(192,110,120,0.65)';
        } else if (isVisible(i)) {
          // Next-locked — lighter pink
          fill = 'rgba(215,160,168,0.18)'; stroke = 'rgba(192,110,120,0.25)';
        } else {
          fill = 'rgba(236,234,227,0.4)'; stroke = 'rgba(160,150,140,0.15)';
        }
        paths += `<path data-pill="${i}" d="${pillPath(cx[i], CY, PW, PH, PR)}" fill="${fill}" stroke="${stroke}" stroke-width="1.5" style="transform-origin:${cx[i]}px ${CY}px"/>`;
        i++;
      }
    }
    svg.innerHTML = paths;
  }

  function recalcTargets() {
    tgtSolid = cells.every(c => c.done || c.passed) ? 1 : 0;
    cells.forEach((cell, i) => {
      const compact = cell.done || cell.passed;
      tgt[i].fillOp = compact ? 1.0 : 0;
      tgt[i].strokeOp = compact ? 1.0 : 0.25;
      tgt[i].textFade = cell.done ? 1.0 : 0;
      tgt[i].doneH = compact ? DONE_CH : CH;
      tgt[i].divotFrac = (i < N - 1 && cell.done && cells[i + 1].done) ? 1 : 0;
    });
  }

  function saveLS() {
    const s = {};
    cells.forEach((c, i) => {
      if (c.done) s[tasks[i].id] = 'done';
      else if (c.passed) s[tasks[i].id] = 'passed';
    });
    localStorage.setItem(storageKey, JSON.stringify(s));
    refreshMiniProgress();
  }

  function loadLS() {
    try {
      const s = JSON.parse(localStorage.getItem(storageKey)) || {};
      cells.forEach((c, i) => {
        const v = s[tasks[i].id];
        if (v === true || v === 'done') { c.done = true; c.fillOp = 1; c.strokeOp = 1; c.textFade = 1; c.doneH = DONE_CH; }
        else if (v === 'passed') { c.passed = true; c.fillOp = 1; c.strokeOp = 1; c.doneH = DONE_CH; }
      });
      cells.forEach((c, i) => { if (i < N - 1 && c.done && cells[i + 1].done) c.divotFrac = 1; });
      if (cells.every(c => c.done || c.passed)) solidFrac = 1;
    } catch {}
  }

  // Color helpers
  function fillColour(fillOp) {
    const [r0,g0,b0,a0] = colors.FILL_DONE;
    const [rs,gs,bs] = colors.FILL_SOLID;
    const r = Math.round(r0 + (rs-r0)*solidFrac);
    const g = Math.round(g0 + (gs-g0)*solidFrac);
    const b = Math.round(b0 + (bs-b0)*solidFrac);
    const a = (a0 + (1-a0)*solidFrac) * fillOp;
    return `rgba(${r},${g},${b},${a.toFixed(3)})`;
  }
  function textColour(alpha) {
    const r = Math.round(_TR + (255-_TR)*solidFrac);
    const g = Math.round(_TG + (255-_TG)*solidFrac);
    const b = Math.round(_TB + (255-_TB)*solidFrac);
    return `rgba(${r},${g},${b},${alpha.toFixed(3)})`;
  }
  function strokeColour(op) {
    const r = Math.round(_SR + (_STR-_SR)*solidFrac);
    const g = Math.round(_SG + (_STG-_SG)*solidFrac);
    const b = Math.round(_SB + (_STB-_SB)*solidFrac);
    return `rgba(${r},${g},${b},${op.toFixed(3)})`;
  }
  function finalTextColour(alpha) {
    const r = Math.round(156 + (255-156)*solidFrac);
    const g = Math.round(122 + (235-122)*solidFrac);
    const b = Math.round(30 + (180-30)*solidFrac);
    return `rgba(${r},${g},${b},${alpha.toFixed(3)})`;
  }

  // Dashed border drawn per-side so dashes stay static during expand/collapse.
  // Each side's dash pattern is anchored independently — vertical sides grow
  // downward with new dashes appearing at the bottom.
  function dashedBorder(y, h, strokeStyle, alpha) {
    const x0=II, y0=y+II, x1=CW-II, y1=y+h-II, r=R-II;
    ctx.setLineDash([6, 4]); ctx.strokeStyle = strokeStyle;
    ctx.lineWidth = SW; ctx.globalAlpha = alpha;
    // Top: left-arc + edge + right-arc (fixed)
    ctx.beginPath();
    ctx.moveTo(x0, y0+r); ctx.quadraticCurveTo(x0, y0, x0+r, y0);
    ctx.lineTo(x1-r, y0); ctx.quadraticCurveTo(x1, y0, x1, y0+r);
    ctx.stroke();
    // Right edge: top→bottom (anchored from top, grows down)
    ctx.beginPath(); ctx.moveTo(x1, y0+r); ctx.lineTo(x1, y1-r); ctx.stroke();
    // Bottom: right-arc + edge + left-arc (fixed length, moves down)
    ctx.beginPath();
    ctx.moveTo(x1, y1-r); ctx.quadraticCurveTo(x1, y1, x1-r, y1);
    ctx.lineTo(x0+r, y1); ctx.quadraticCurveTo(x0, y1, x0, y1-r);
    ctx.stroke();
    // Left edge: top→bottom (anchored from top, grows down)
    ctx.beginPath(); ctx.moveTo(x0, y0+r); ctx.lineTo(x0, y1-r); ctx.stroke();
    ctx.globalAlpha = 1; ctx.setLineDash([]);
  }

  // Paths — rrPath accepts variable height and optional radius
  function rrPath(y, h, rOverride) {
    h = h || CH;
    const x0=II, y0=y+II, x1=CW-II, y1=y+h-II, r=Math.min((rOverride || R)-II, (h-SW)/2);
    const p = new Path2D();
    p.moveTo(x0+r, y0);
    p.lineTo(x1-r, y0); p.quadraticCurveTo(x1, y0, x1, y0+r);
    p.lineTo(x1, y1-r); p.quadraticCurveTo(x1, y1, x1-r, y1);
    p.lineTo(x0+r, y1); p.quadraticCurveTo(x0, y1, x0, y1-r);
    p.lineTo(x0, y0+r); p.quadraticCurveTo(x0, y0, x0+r, y0);
    p.closePath(); return p;
  }

  function mergedPathV(ytop, ybot, joins) {
    const DF = 18, DC = 8;
    const lx=II, rx=CW-II, ty=ytop+II, by=ybot-II, r=R-II;
    const p = new Path2D();
    p.moveTo(lx+r, ty);
    p.lineTo(rx-r, ty); p.quadraticCurveTo(rx, ty, rx, ty+r);
    joins.forEach(({ jy, frac }) => {
      const f = DF*frac, c = DC*frac;
      p.lineTo(rx, jy-c); p.quadraticCurveTo(rx-f, jy, rx, jy+c);
    });
    p.lineTo(rx, by-r); p.quadraticCurveTo(rx, by, rx-r, by);
    p.lineTo(lx+r, by); p.quadraticCurveTo(lx, by, lx, by-r);
    [...joins].reverse().forEach(({ jy, frac }) => {
      const f = DF*frac, c = DC*frac;
      p.lineTo(lx, jy+c); p.quadraticCurveTo(lx+f, jy, lx, jy-c);
    });
    p.lineTo(lx, ty+r); p.quadraticCurveTo(lx, ty, lx+r, ty);
    p.closePath(); return p;
  }

  function drawBorderAnim(homeY, progress, isDone, cellIdx) {
    const h = cellH(cellIdx);
    const x0 = II, y0 = homeY + II, x1 = CW - II, y1 = homeY + h - II;
    const r = R - II;
    const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
    const halfW = cx - x0 - r, arcL = (Math.PI / 2) * r, halfH = cy - y0 - r;
    const arm = halfW + arcL + halfH;
    const dist = progress * arm;
    ctx.lineCap = 'round';
    function traceArm(segs) {
      let rem = dist; ctx.beginPath(); let on = false;
      for (const s of segs) {
        if (rem <= 0) break;
        if (s.type === 'line') {
          const len = Math.hypot(s.ex - s.sx, s.ey - s.sy);
          const t = Math.min(rem / len, 1);
          if (!on) { ctx.moveTo(s.sx, s.sy); on = true; }
          ctx.lineTo(s.sx + (s.ex - s.sx) * t, s.sy + (s.ey - s.sy) * t);
          rem -= len;
        } else {
          const aLen = Math.abs(s.ea - s.sa) * r;
          const t = Math.min(rem / aLen, 1);
          if (!on) { ctx.moveTo(s.cx + r * Math.cos(s.sa), s.cy + r * Math.sin(s.sa)); on = true; }
          ctx.arc(s.cx, s.cy, r, s.sa, s.sa + (s.ea - s.sa) * t, s.ccw);
          rem -= aLen;
        }
      }
      ctx.stroke();
    }
    const arms = [
      [{ type:'line', sx:cx, sy:y0, ex:x1-r, ey:y0 },
       { type:'arc', cx:x1-r, cy:y0+r, sa:-Math.PI/2, ea:0, ccw:false },
       { type:'line', sx:x1, sy:y0+r, ex:x1, ey:cy }],
      [{ type:'line', sx:cx, sy:y0, ex:x0+r, ey:y0 },
       { type:'arc', cx:x0+r, cy:y0+r, sa:-Math.PI/2, ea:-Math.PI, ccw:true },
       { type:'line', sx:x0, sy:y0+r, ex:x0, ey:cy }],
      [{ type:'line', sx:cx, sy:y1, ex:x1-r, ey:y1 },
       { type:'arc', cx:x1-r, cy:y1-r, sa:Math.PI/2, ea:0, ccw:true },
       { type:'line', sx:x1, sy:y1-r, ex:x1, ey:cy }],
      [{ type:'line', sx:cx, sy:y1, ex:x0+r, ey:y1 },
       { type:'arc', cx:x0+r, cy:y1-r, sa:Math.PI/2, ea:Math.PI, ccw:false },
       { type:'line', sx:x0, sy:y1-r, ex:x0, ey:cy }],
    ];
    const isPassed = cells[cellIdx].passed;
    const borderStroke = isDone ? (isPassed ? PASS_STROKE : '#5A9B91') : colors.STROKE;
    if (isDone) {
      ctx.strokeStyle = borderStroke; ctx.globalAlpha = 0.7; ctx.lineWidth = SW;
      arms.forEach(a => traceArm(a));
    } else {
      ctx.strokeStyle = borderStroke; ctx.globalAlpha = 1; ctx.lineWidth = SW;
      arms.forEach(a => traceArm(a));
    }
    ctx.globalAlpha = 1;
  }

  function fitText(text, maxW) {
    if (ctx.measureText(text).width <= maxW) return text;
    while (text.length > 0 && ctx.measureText(text + '\u2026').width > maxW) text = text.slice(0, -1);
    return text.trimEnd() + '\u2026';
  }

  // Wrap text into up to maxLines lines that fit within maxW
  function wrapText(text, maxW, maxLines) {
    if (ctx.measureText(text).width <= maxW) return [text];
    const words = text.split(/\s+/);
    const lines = [];
    let line = '';
    for (const word of words) {
      const test = line ? line + ' ' + word : word;
      if (ctx.measureText(test).width > maxW && line) {
        lines.push(line);
        if (lines.length >= maxLines) { lines[lines.length - 1] = fitText(lines[lines.length - 1] + ' ' + words.slice(words.indexOf(word)).join(' '), maxW); return lines; }
        line = word;
      } else {
        line = test;
      }
    }
    if (line) {
      if (lines.length >= maxLines) lines[lines.length - 1] = fitText(lines[lines.length - 1] + ' ' + line, maxW);
      else lines.push(line);
    }
    return lines;
  }

  function draw() {
    const th = totalH();
    ctx.clearRect(0, 0, CW, th);

    // Undone cells — use cellH for variable height
    cells.forEach((cell, idx) => {
      if (cell.done || cell.passed || !isVisible(idx)) return;
      const h = cellH(idx);
      // Press scale effect (animated)
      const isScaling = (idx === pressScaleIdx && pressScale < 0.999);
      if (isScaling) {
        const cx = CW / 2, cy = cell.homeY + h / 2;
        ctx.save(); ctx.translate(cx, cy); ctx.scale(pressScale, pressScale); ctx.translate(-cx, -cy);
      }
      const p = rrPath(cell.homeY, h);
      const isFinal = idx === N - 1;
      const st = colors.STROKE;
      if (idx === tempVisibleIdx && isLocked(idx)) {
        // Temp-revealed via pill — grey
        ctx.fillStyle = 'rgba(180,175,168,0.2)';
        ctx.fill(p);
        dashedBorder(cell.homeY, h, 'rgba(160,150,140,0.4)', 0.15);
      } else if (isLocked(idx)) {
        ctx.fillStyle = 'rgba(232,200,206,0.3)';
        ctx.fill(p);
        dashedBorder(cell.homeY, h, st, 0.1);
      } else if (idx === selectedIdx) {
        ctx.fillStyle = `rgba(${colors.FILL_UNDONE.join(',')})`;
        ctx.fill(p);
        ctx.strokeStyle = st; ctx.lineWidth = SW; ctx.globalAlpha = 0.6; ctx.stroke(p); ctx.globalAlpha = 1;
      } else {
        ctx.fillStyle = `rgba(${colors.FILL_UNDONE.join(',')})`;
        ctx.fill(p);
        ctx.strokeStyle = st; ctx.lineWidth = SW; ctx.globalAlpha = cell.strokeOp; ctx.stroke(p); ctx.globalAlpha = 1;
      }
      if (isScaling) ctx.restore();
    });

    // Done cells — individual teal rounded rects (shrink to thin when compact)
    cells.forEach((cell, idx) => {
      if (!cell.done || !isVisible(idx)) return;
      const h = cellH(idx);
      const isScaling = (idx === pressScaleIdx && pressScale < 0.999);
      if (isScaling) {
        const cx = CW / 2, cy = cell.homeY + h / 2;
        ctx.save(); ctx.translate(cx, cy); ctx.scale(pressScale, pressScale); ctx.translate(-cx, -cy);
      }
      const growFrac = Math.min((cell.doneH - DONE_CH) / (CH - DONE_CH), 1);
      const cr = DONE_R + (R - DONE_R) * growFrac;
      const p = rrPath(cell.homeY, h, cr);
      ctx.fillStyle = `rgba(90,155,145,${(0.06 * cell.fillOp).toFixed(3)})`;
      ctx.fill(p);
      ctx.strokeStyle = `rgba(90,155,145,${(0.15 * cell.strokeOp).toFixed(3)})`;
      ctx.lineWidth = 1.2; ctx.stroke(p);
      if (isScaling) ctx.restore();
    });

    // Passed/skipped cells — amber rounded rects (shrink like done)
    cells.forEach((cell, idx) => {
      if (!cell.passed || !isVisible(idx)) return;
      const h = cellH(idx);
      const isScaling = (idx === pressScaleIdx && pressScale < 0.999);
      if (isScaling) {
        const cx = CW / 2, cy = cell.homeY + h / 2;
        ctx.save(); ctx.translate(cx, cy); ctx.scale(pressScale, pressScale); ctx.translate(-cx, -cy);
      }
      const growFrac = Math.min((cell.doneH - DONE_CH) / (CH - DONE_CH), 1);
      const cr = DONE_R + (R - DONE_R) * growFrac;
      const p = rrPath(cell.homeY, h, cr);
      ctx.fillStyle = `rgba(196,164,60,${(0.06 * cell.fillOp).toFixed(3)})`;
      ctx.fill(p);
      ctx.strokeStyle = `rgba(196,164,60,${(0.15 * cell.strokeOp).toFixed(3)})`;
      ctx.lineWidth = 1.2; ctx.stroke(p);
      if (isScaling) ctx.restore();
    });

    // Text — always drawn at the top of each cell (fixed CH area)
    cells.forEach((cell, idx) => {
      if (!isVisible(idx)) return;
      const t = tasks[idx], y = cell.homeY;
      const selBoost = (idx === selectedIdx) ? 1.6 : 1.0;
      const isFinal = idx === N - 1;
      ctx.save();
      // Press scale effect for text (animated)
      if (idx === pressScaleIdx && pressScale < 0.999) {
        const h = cellH(idx), cx = CW / 2, cy = y + h / 2;
        ctx.translate(cx, cy); ctx.scale(pressScale, pressScale); ctx.translate(-cx, -cy);
      }
      const locked = isLocked(idx);
      // Helper: draw sub text with wrapping (up to 2 lines), returns line count
      function drawSub(text, fillStyle, yBase) {
        ctx.font = '12px JetBrains Mono, monospace';
        ctx.fillStyle = fillStyle;
        const lines = wrapText(text, CW - 32, 2);
        lines.forEach((ln, li) => ctx.fillText(ln, 16, yBase + li * 15));
        // Track text bottom for detail panel positioning
        cell.textBtm = (yBase - y) + (lines.length - 1) * 15 + 12;
      }

      // Task number aligned right
      function drawNum(alpha) {
        ctx.font = '600 11px JetBrains Mono, monospace';
        ctx.fillStyle = textColour(alpha);
        ctx.textAlign = 'right';
        ctx.fillText(String(idx + 1), CW - 14, y + 27);
        ctx.textAlign = 'left';
      }



      if (cell.passed) {
        const skipA = cell.fillOp; // animates 0→1
        const dh = cell.doneH;
        const skipLabel = t.label;
        const skipSub = t.sub;
        const gf = Math.min((dh - DONE_CH) / (CH - DONE_CH), 1);
        const compactCY = y + dh / 2 + 5;
        const lblY = compactCY + (y + 28 - compactCY) * gf;
        const numY = compactCY + (y + 27 - compactCY) * gf;
        const numA = skipA * (0.3 + 0.2 * gf);
        const lblA = skipA * (0.4 + 0.45 * gf);
        const subA = skipA * (0.6 * gf);
        ctx.font = '600 11px JetBrains Mono, monospace';
        ctx.fillStyle = `rgba(160,130,40,${numA.toFixed(3)})`;
        ctx.textAlign = 'right';
        ctx.fillText(String(idx + 1), CW - 14, numY);
        ctx.textAlign = 'left';
        const fs = (15 + gf).toFixed(1);
        ctx.font = `italic 400 ${fs}px Nunito, sans-serif`;
        ctx.fillStyle = `rgba(160,130,40,${lblA.toFixed(3)})`;
        ctx.fillText('\u2022  ' + skipLabel, gf > 0.5 ? 16 : 14, lblY);
        if (gf > 0.15) {
          drawSub(skipSub, `rgba(160,130,40,${subA.toFixed(3)})`, y + 52);
        }
      } else if (locked) {
        const isTemp = idx === tempVisibleIdx;
        const tc = isTemp ? (a) => `rgba(120,115,108,${a.toFixed(3)})` : textColour;
        drawNum(isTemp ? 0.25 : 0.15);
        ctx.font = '400 19px Nunito, sans-serif';
        ctx.fillStyle = tc(isTemp ? 0.4 : 0.22); ctx.fillText(t.label, 16, y + 30);
        drawSub(t.sub, tc(isTemp ? 0.3 : 0.16), y + 52);
      } else {
        const tc = textColour;
        const tf = cell.textFade;
        const undoneA = (1 - tf) * 0.85, doneA = tf * 0.95;
        if (undoneA > 0.005) {
          drawNum(Math.min(undoneA * 0.6 * selBoost, 0.6));
          ctx.font = '400 19px Nunito, sans-serif';
          ctx.fillStyle = tc(Math.min(undoneA * selBoost, 1));
          ctx.fillText(t.label, 16, y + 30);
          drawSub(t.sub, tc(Math.min(undoneA * 0.9 * selBoost, 1)), y + 52);
        }
        if (doneA > 0.005) {
          const dh = cell.doneH;
          const gf = Math.min((dh - DONE_CH) / (CH - DONE_CH), 1);
          // Interpolate Y: compact center → expanded fixed
          const compactCY = y + dh / 2 + 5;
          const lblY = compactCY + (y + 28 - compactCY) * gf;
          const numY = compactCY + (y + 27 - compactCY) * gf;
          // Interpolate alpha: faded compact → visible expanded
          const numA2 = doneA * (0.3 + 0.2 * gf);
          const lblA2 = doneA * (0.4 + 0.45 * gf);
          const subA2 = doneA * (0.6 * gf);
          ctx.font = '600 11px JetBrains Mono, monospace';
          ctx.fillStyle = `rgba(60,130,118,${numA2.toFixed(3)})`;
          ctx.textAlign = 'right';
          ctx.fillText(String(idx + 1), CW - 14, numY);
          ctx.textAlign = 'left';
          const fs2 = (15 + gf).toFixed(1);
          ctx.font = `italic 400 ${fs2}px Nunito, sans-serif`;
          ctx.fillStyle = `rgba(60,130,118,${lblA2.toFixed(3)})`;
          ctx.fillText('\u2713  ' + t.done, gf > 0.5 ? 16 : 14, lblY);
          if (gf > 0.15) {
            drawSub(t.sub, `rgba(60,130,118,${subA2.toFixed(3)})`, y + 52);
          }
        }
      }
      ctx.restore();
    });

    // Hold border — uses cellH for full cell height, matches pressScale transform
    if (pressIdx >= 0 && holdProg > 0 && !holdDone) {
      const cell = cells[pressIdx];
      const h = cellH(pressIdx);
      if (pressScale < 0.999) {
        const cx2 = CW / 2, cy2 = cell.homeY + h / 2;
        ctx.save();
        ctx.translate(cx2, cy2); ctx.scale(pressScale, pressScale); ctx.translate(-cx2, -cy2);
      }
      drawBorderAnim(cell.homeY, holdProg, cell.done || cell.passed, pressIdx);
      if (pressScale < 0.999) ctx.restore();
    }
  }

  // Animation
  const S_FILL = 0.09, S_STROKE = 0.1, S_DIVOT = 0.12, S_TEXT = 0.08, S_SOLID = 0.08, S_EXPAND = 0.14;
  function tick() {
    let dirty = false;
    cells.forEach((cell, i) => {
      function step(key, speed) {
        const d = tgt[i][key] - cell[key];
        if (Math.abs(d) > 0.001) { cell[key] += d * speed; dirty = true; }
        else cell[key] = tgt[i][key];
      }
      step('fillOp', S_FILL); step('strokeOp', S_STROKE);
      step('divotFrac', S_DIVOT); step('textFade', S_TEXT);
      // doneH: spring with minimum velocity to avoid slow crawl at end
      {
        const d = tgt[i].doneH - cell.doneH;
        if (Math.abs(d) > 0.5) {
          const move = d * 0.14;
          cell.doneH += Math.abs(move) < 1.5 ? Math.sign(d) * 1.5 : move;
          dirty = true;
        } else cell.doneH = tgt[i].doneH;
      }
      // Clean up fading-out temp cell once it's fully shrunk to 0
      if (i === fadingOutTemp && cell.doneH < 0.5) {
        fadingOutTemp = -1;
        cell.doneH = CH; // reset for future use
      }
    });
    const ds = tgtSolid - solidFrac;
    if (Math.abs(ds) > 0.001) { solidFrac += ds * S_SOLID; dirty = true; }
    else solidFrac = tgtSolid;
    // Animate press scale
    const dp = pressScaleTarget - pressScale;
    if (Math.abs(dp) > 0.001) { pressScale += dp * 0.12; dirty = true; }
    else { pressScale = pressScaleTarget; if (pressScale === 1.0) pressScaleIdx = -1; }
    // Animate expand height
    const de = expandTarget - expandH;
    if (Math.abs(de) > 0.5) { expandH += de * S_EXPAND; dirty = true; }
    else { expandH = expandTarget; if (expandH === 0) expandIdx = -1; }
    // Animate collapse slot — mirror expand progress so total height stays stable
    if (collapseIdx >= 0) {
      const frac = expandTarget > 0 ? Math.min(expandH / expandTarget, 1) : 1;
      collapseH = collapseH0 * (1 - frac);
      if (collapseH < 0.5) { collapseH = 0; collapseIdx = -1; }
      else { dirty = true; }
    }
    // Relayout every frame while expanding/collapsing
    computeLayout(); resizeCanvas();
    if (expandIdx >= 0) {
      detailPanel.style.top = (cells[expandIdx].homeY + baseCellH(expandIdx)) + 'px';
      // expandH is the allocated canvas space; panel can be up to 28px taller (overlap)
      detailPanel.style.maxHeight = (expandH + 28) + 'px';
    } else {
      detailPanel.style.maxHeight = '';
    }
    draw();
    if (dirty) recalcPanelSection(panelId);
    raf = dirty ? requestAnimationFrame(tick) : null;
  }
  function kick() { if (!raf) raf = requestAnimationFrame(tick); }

  // Detail panel elements
  const detailPanel = wrapEl.querySelector('.task-detail-panel');
  const elDesc = wrapEl.querySelector('.td-desc');
  const elUnlock = wrapEl.querySelector('.td-unlock');
  const elBullets = wrapEl.querySelector('.td-bullets');
  const elDeliv = wrapEl.querySelector('.td-deliverable');
  const btnPass = wrapEl.querySelector('.td-pass');
  const btnDoc = wrapEl.querySelector('.td-doc');
  const btnCloseTask = wrapEl.querySelector('.td-close');

  function refreshDetailButtons(idx) {
    const isDone = cells[idx].done;
    const isPassed = cells[idx].passed;
    const locked = isLocked(idx);
    const deps = pendingDeps(idx);
    elUnlock.textContent = deps.length > 0
      ? 'COMPLETE ' + deps.map(d => String(d + 1)).join(' + ') + ' FIRST'
      : '';
    if (locked && !isDone && !isPassed) {
      btnPass.style.display = 'none';
    } else if (isDone) {
      btnPass.style.display = 'none';
    } else if (isPassed) {
      btnPass.textContent = 'unskip'; btnPass.classList.add('is-passed'); btnPass.style.display = '';
    } else {
      btnPass.textContent = 'skip'; btnPass.classList.remove('is-passed'); btnPass.style.display = '';
    }
  }

  function relayout() {
    computeLayout();
    resizeCanvas();
    if (expandIdx >= 0) {
      detailPanel.style.top = (cells[expandIdx].homeY + baseCellH(expandIdx)) + 'px';
    }
    draw();
    recalcPanelSection(panelId);
  }

  function showDetail(idx) {
    if (idx === selectedIdx) { hideDetail(); return; }
    const wasSwitching = selectedIdx >= 0;
    // Shrink previous done/passed cell back
    if (selectedIdx >= 0 && (cells[selectedIdx].done || cells[selectedIdx].passed)) {
      tgt[selectedIdx].doneH = (cells[selectedIdx].done || cells[selectedIdx].passed) ? DONE_CH : CH;
    }
    // When switching: move old expand to collapse slot so both animate simultaneously
    if (wasSwitching && expandIdx >= 0 && expandH > 0) {
      collapseIdx = expandIdx;
      collapseH = expandH;
      collapseH0 = expandH;
    }
    selectedIdx = idx;
    expandIdx = idx;
    expandH = 0; // always start new expand from 0
    const t = tasks[idx];

    // Expand done/passed cells back to full height so detail panel fits
    if (cells[idx].done || cells[idx].passed) {
      tgt[idx].doneH = CH;
    }

    // Populate content
    elDesc.textContent = t.detail || t.sub;
    const deps = pendingDeps(idx);
    elUnlock.textContent = deps.length > 0
      ? 'COMPLETE ' + deps.map(d => String(d + 1)).join(' + ') + ' FIRST'
      : '';
    elBullets.innerHTML = t.bullets.map(b => '<li>' + b + '</li>').join('');
    elBullets.style.setProperty('--dot-color', colors.ACCENT_HEX);
    elDeliv.textContent = '\u2714 ' + t.deliverable;
    elDeliv.style.color = colors.ACCENT_HEX;
    if (btnDoc) {
      btnDoc.href = t.url || '#';
      btnDoc.style.display = t.url ? '' : 'none';
      btnDoc.parentElement.style.display = t.url ? '' : 'none';
    }
    refreshDetailButtons(idx);
    detailPanel.classList.toggle('is-locked', isLocked(idx));

    // Measure panel height: show invisibly, measure, then animate open
    detailPanel.style.visibility = 'hidden';
    detailPanel.style.maxHeight = '';
    detailPanel.style.top = '0';
    detailPanel.classList.add('open');
    expandTarget = detailPanel.offsetHeight - 28;
    detailPanel.style.visibility = '';

    // Start expand animation
    kick();

    // Scroll after expand animation settles (avoid fighting layout shifts)
    setTimeout(() => {
      const rect = detailPanel.getBoundingClientRect();
      const viewH = window.innerHeight;
      // Only scroll if the panel bottom is below the viewport
      if (rect.bottom > viewH - 20) {
        window.scrollBy({ top: rect.bottom - viewH + 40, behavior: 'smooth' });
      } else if (rect.top < 20) {
        window.scrollBy({ top: rect.top - 40, behavior: 'smooth' });
      }
    }, 400);
  }

  function hideDetail() {
    detailPanel.classList.remove('open');
    expandTarget = 0;
    collapseIdx = -1; collapseH = 0;
    const prevIdx = selectedIdx;
    selectedIdx = -1;
    // Shrink done/passed cells back to compact height
    if (prevIdx >= 0 && (cells[prevIdx].done || cells[prevIdx].passed)) {
      tgt[prevIdx].doneH = (cells[prevIdx].done || cells[prevIdx].passed) ? DONE_CH : CH;
    }
    // Clear any in-progress fade-out
    if (fadingOutTemp >= 0) {
      cells[fadingOutTemp].doneH = CH;
      fadingOutTemp = -1;
    }
    // Animate temp-visible cell out — tick cleanup handles removal at doneH ≈ 0
    if (tempVisibleIdx >= 0) {
      tgt[tempVisibleIdx].doneH = 0;
      fadingOutTemp = tempVisibleIdx;
      tempVisibleIdx = -1;
    }
    // expandIdx stays so cellH still applies during collapse animation
    // it gets cleared when expandH reaches 0 in tick
    kick();
  }

  // Cascade uncomplete: undo any downstream tasks that depend on idx
  function cascadeUndo(idx) {
    for (let k = 0; k < N; k++) {
      const reqs = tasks[k].requires;
      if (!reqs || !reqs.includes(idx)) continue;
      if (cells[k].done || cells[k].passed) {
        cells[k].done = false;
        cells[k].passed = false;
        cascadeUndo(k); // recurse for deeper dependants
      }
    }
  }

  function toggleDone(idx) {
    if (cells[idx].done) {
      cells[idx].done = false;
      cascadeUndo(idx);
    } else {
      cells[idx].done = true; cells[idx].passed = false;
      // Close detail panel when completing a task so it can shrink
      if (idx === selectedIdx) hideDetail();
    }
    saveLS(); updateCounter(); recalcTargets(); kick();
    if (selectedIdx >= 0) {
      if (!isVisible(selectedIdx)) hideDetail();
      else refreshDetailButtons(selectedIdx);
    }
  }

  function togglePass(idx) {
    if (cells[idx].passed) {
      cells[idx].passed = false;
      cascadeUndo(idx);
    } else {
      cells[idx].passed = true; cells[idx].done = false;
      if (idx === selectedIdx) hideDetail();
    }
    saveLS(); updateCounter(); recalcTargets(); kick();
    if (selectedIdx >= 0) {
      if (!isVisible(selectedIdx)) hideDetail();
      else {
        refreshDetailButtons(selectedIdx);
        // Remeasure expand target in case cell changed size (e.g. unskip)
        detailPanel.style.maxHeight = '';
        expandTarget = Math.max(expandTarget, detailPanel.offsetHeight - 28);
      }
    }
  }

  btnPass.addEventListener('click', (e) => {
    e.stopPropagation();
    if (selectedIdx >= 0) { togglePass(selectedIdx); hideDetail(); draw(); }
  });
  btnCloseTask.addEventListener('click', (e) => { e.stopPropagation(); hideDetail(); });

  // Long press — delayed activation so scrolling still works on mobile
  const HOLD_MS = 500;
  const HOLD_DELAY = 150; // ms before capturing pointer (allows scroll to start)
  let pressIdx = -1, pressStart = 0, holdProg = 0, holdDone = false, holdRaf = null;
  let pressScale = 1.0, pressScaleTarget = 1.0, pressScaleIdx = -1;
  let pressStartX = 0, pressStartY = 0, holdDelayTimer = null, holdPointerId = -1;
  const MOVE_THRESH = 10;

  function hitCell(clientY) {
    const rect = canvas.getBoundingClientRect();
    const my = clientY - rect.top;
    for (let k = 0; k < N; k++) {
      if (!isVisible(k)) continue;
      const top = cells[k].homeY;
      if (my >= top && my < top + baseCellH(k)) return k;
    }
    return -1;
  }

  function holdTick() {
    if (pressIdx < 0) return;
    holdProg = Math.min((Date.now() - pressStart) / HOLD_MS, 1);
    draw();
    if (holdProg >= 1 && !holdDone) {
      holdDone = true;
      if (navigator.vibrate) navigator.vibrate(18);
      toggleDone(pressIdx);
      setTimeout(() => { holdProg = 0; pressIdx = -1; draw(); }, 150);
      return;
    }
    if (!holdDone) holdRaf = requestAnimationFrame(holdTick);
  }

  function cancelHold() {
    if (holdDelayTimer) { clearTimeout(holdDelayTimer); holdDelayTimer = null; }
    if (holdRaf) { cancelAnimationFrame(holdRaf); holdRaf = null; }
    pressIdx = -1; holdProg = 0; holdDone = false; holdPointerId = -1; pressScaleTarget = 1.0; kick();
  }

  // Activate hold after delay — captures pointer and starts the animation
  function activateHold() {
    holdDelayTimer = null;
    if (pressIdx < 0) return;
    try { canvas.setPointerCapture(holdPointerId); } catch(e) {}
    pressStart = Date.now();
    if (!isLocked(pressIdx)) holdRaf = requestAnimationFrame(holdTick);
  }

  canvas.addEventListener('pointerdown', e => {
    // Don't preventDefault — allow native scroll to start
    const idx = hitCell(e.clientY);
    if (idx < 0) { pressIdx = -1; return; }
    pressIdx = idx; pressStart = Date.now();
    pressStartX = e.clientX; pressStartY = e.clientY;
    holdProg = 0; holdDone = false; holdPointerId = e.pointerId;
    // Start hold after a delay — if finger moves (scroll), it gets cancelled
    holdDelayTimer = setTimeout(activateHold, HOLD_DELAY);
    pressScaleIdx = idx; pressScaleTarget = 0.97; kick();
  });
  canvas.addEventListener('pointermove', e => {
    if (pressIdx < 0) return;
    const dx = e.clientX - pressStartX, dy = e.clientY - pressStartY;
    if (dx*dx + dy*dy > MOVE_THRESH*MOVE_THRESH) cancelHold();
  });
  canvas.addEventListener('pointerup', e => {
    if (holdDelayTimer) { clearTimeout(holdDelayTimer); holdDelayTimer = null; }
    if (holdRaf) { cancelAnimationFrame(holdRaf); holdRaf = null; }
    const elapsed = Date.now() - pressStart;
    const idx = pressIdx;
    pressIdx = -1; holdProg = 0; pressScaleTarget = 1.0;
    if (holdDone) { holdDone = false; kick(); return; }
    holdDone = false; holdPointerId = -1; kick();
    if (idx >= 0 && elapsed < 250) {
      // Animate temp cell out when tapping a different canvas cell
      if (tempVisibleIdx >= 0 && idx !== tempVisibleIdx) {
        tgt[tempVisibleIdx].doneH = 0;
        fadingOutTemp = tempVisibleIdx;
        tempVisibleIdx = -1;
      }
      showDetail(idx);
    }
  });
  canvas.addEventListener('pointercancel', cancelHold);
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // Circle pill clicks — open task detail, temporarily reveal hidden tasks
  wrapEl.querySelectorAll('.task-circle').forEach(el => {
    // Press animation on the SVG pill behind this circle
    function findPill(idx) {
      const svg = wrapEl.querySelector('.task-progress-svg');
      if (!svg) return null;
      // Solo pill
      const solo = svg.querySelector(`[data-pill="${idx}"]`);
      if (solo) return solo;
      // Merged blob
      const all = svg.querySelectorAll('[data-pills]');
      for (const p of all) {
        if (p.dataset.pills.split(',').includes(String(idx))) return p;
      }
      return null;
    }
    el.addEventListener('pointerdown', () => {
      const pill = findPill(parseInt(el.dataset.tidx, 10));
      if (pill) { pill.style.transition = 'transform 0.08s ease'; pill.style.transform = 'scale(0.92)'; }
      el.style.transition = 'transform 0.08s ease'; el.style.transform = 'scale(0.85)';
    });
    el.addEventListener('pointerup', () => {
      const pill = findPill(parseInt(el.dataset.tidx, 10));
      if (pill) { pill.style.transition = 'transform 0.15s ease'; pill.style.transform = ''; }
      el.style.transition = 'transform 0.15s ease'; el.style.transform = '';
    });
    el.addEventListener('pointerleave', () => {
      const pill = findPill(parseInt(el.dataset.tidx, 10));
      if (pill) { pill.style.transition = 'transform 0.15s ease'; pill.style.transform = ''; }
      el.style.transition = 'transform 0.15s ease'; el.style.transform = '';
    });
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.tidx, 10);
      if (isNaN(idx) || idx < 0 || idx >= N) return;
      // If already selected, close it
      if (idx === selectedIdx) { hideDetail(); return; }

      const scrollY = window.scrollY;
      const prevTemp = tempVisibleIdx;
      const needsTemp = !isVisible(idx);

      // Animate old temp cell out — shrink to 0, tick cleanup handles removal
      if (prevTemp >= 0 && prevTemp !== idx) {
        tgt[prevTemp].doneH = 0;
        fadingOutTemp = prevTemp;
        tempVisibleIdx = -1;
      }

      // Set new temp if needed
      if (needsTemp) {
        tempVisibleIdx = idx;
        cells[idx].doneH = 1;
        tgt[idx].doneH = CH;
      } else {
        tempVisibleIdx = -1;
      }

      // Show detail immediately (swap), let showDetail handle the panel transition
      showDetail(idx);
      computeLayout(); resizeCanvas();
      window.scrollTo(0, scrollY);
      kick();
    });
  });

  // Pre-measure sub text line counts for layout
  function measureTextHeights() {
    ctx.font = '12px JetBrains Mono, monospace';
    cells.forEach((cell, idx) => {
      const lines = wrapText(tasks[idx].sub, CW - 32, 2);
      cell.textBtm = 52 + (lines.length - 1) * 15 + 12; // 52 = sub yBase relative to cell top
    });
  }

  // Init
  loadLS(); recalcTargets();
  // Need initial canvas size for text measurement
  canvas.width = CW * DPR; canvas.height = 100 * DPR;
  canvas.style.width = CW + 'px'; canvas.style.height = '100px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  measureTextHeights();
  computeLayout(); resizeCanvas();
  updateCounter(); draw();
  // SVG needs layout — defer until circles are rendered
  requestAnimationFrame(() => drawProgressSvg());
  // Re-measure after fonts load (JetBrains Mono may change text widths)
  document.fonts.ready.then(() => {
    measureTextHeights(); computeLayout(); resizeCanvas(); draw();
  });

  self.destroy = function() {
    if (raf) cancelAnimationFrame(raf);
    if (holdRaf) cancelAnimationFrame(holdRaf);
    if (holdDelayTimer) clearTimeout(holdDelayTimer);
    // Reset detail panel so it doesn't bleed into next init
    selectedIdx = -1; expandIdx = -1; expandH = 0; expandTarget = 0; collapseIdx = -1; collapseH = 0;
    detailPanel.classList.remove('open');
  };
}

function applyTaskStates(panelId) {
  // Init or re-init the canvas for this panel's task group
  initTaskCanvas(panelId);
}

function initTaskCanvas(panelId) {
  const wrap = document.querySelector(`#panel-${panelId} .task-canvas-wrap`);
  if (!wrap) return;
  const cls = wrap.dataset.cls;
  const taskSet = TASK_SETS[cls];
  if (!taskSet || !taskSet.tasks || taskSet.tasks.length === 0) return;

  // Destroy previous instance if exists
  if (taskCanvases[panelId]) {
    taskCanvases[panelId].destroy();
    delete taskCanvases[panelId];
  }

  // Clear any previous canvas
  const slot = wrap.querySelector('.tc-canvas-slot');
  if (slot) slot.innerHTML = '';

  const colors = TASK_COLORS;
  const storageKey = `dates-tasks-${cls}`;

  taskCanvases[panelId] = new TaskCanvas(wrap, taskSet.tasks, storageKey, colors, panelId);
}

function renderHeader() {
  document.getElementById('headerBlock').innerHTML = `
    <p class="date-line">${fmtDateLong(TODAY_STR).toUpperCase()}</p>
    <p class="page-title">What's Due</p>
    <hr class="header-sep">
  `;
}

function isTasksComplete(cls) {
  const taskSet = TASK_SETS[cls];
  if (!taskSet || !taskSet.tasks || taskSet.tasks.length === 0) return false;
  let state = {};
  try { state = JSON.parse(localStorage.getItem(`dates-tasks-${cls}`)) || {}; } catch(e) {}
  return taskSet.tasks.every(t => {
    const v = state[t.id];
    return v === true || v === 'done' || v === 'passed';
  });
}

function renderMiniProgress(cls) {
  const taskSet = TASK_SETS[cls];
  if (!taskSet || !taskSet.tasks || taskSet.tasks.length === 0) return '';
  const tasks = taskSet.tasks;
  const N = tasks.length;

  // Read state from localStorage (same key as TaskCanvas)
  let state = {};
  try { state = JSON.parse(localStorage.getItem(`dates-tasks-${cls}`)) || {}; } catch(e) {}

  // Build cell states — requires uses numeric indices (same as TaskCanvas)
  const cells = tasks.map((t, i) => {
    const v = state[t.id];
    return { done: v === true || v === 'done', passed: v === 'passed' };
  });
  // Compute locked/visible using same logic as TaskCanvas
  const cellsFull = cells.map((c, i) => {
    const reqs = tasks[i].requires || [];
    const locked = reqs.length > 0 && reqs.some(r => r !== i && !cells[r].done && !cells[r].passed);
    let visible = c.done || c.passed || !locked;
    if (!visible) {
      // Next-visible: locked but all pending deps are themselves unlocked
      const pending = reqs.filter(r => r !== i && !cells[r].done && !cells[r].passed);
      visible = pending.length > 0 && pending.every(r => {
        const dreqs = tasks[r].requires || [];
        return dreqs.length === 0 || !dreqs.some(dr => dr !== r && !cells[dr].done && !cells[dr].passed);
      });
    }
    return { ...c, locked, visible };
  });

  const PH = 8, PR = PH / 2;
  const gap = 3;
  const pillW = 12;
  const totalW = N * pillW + (N - 1) * gap;

  let paths = '';
  let i = 0;
  while (i < N) {
    if (cellsFull[i].done) {
      let j = i;
      while (j < N && cellsFull[j].done) j++;
      const lx = i * (pillW + gap);
      const rx = (j - 1) * (pillW + gap) + pillW;
      paths += `<rect x="${lx}" y="0" width="${rx - lx}" height="${PH}" rx="${PR}" ry="${PR}" fill="rgba(70,145,130,0.85)"/>`;
      i = j;
    } else {
      const x = i * (pillW + gap);
      let fill;
      if (cellsFull[i].passed) {
        fill = 'rgba(170,140,30,0.45)';       // Gold — skipped
      } else if (!cellsFull[i].locked) {
        fill = 'rgba(185,85,105,0.8)';        // Pink — unlocked/active
      } else if (cellsFull[i].visible) {
        fill = 'rgba(192,110,125,0.35)';      // Light pink — next-locked
      } else {
        fill = 'rgba(190,185,175,0.4)';       // Grey — hidden
      }
      paths += `<rect x="${x}" y="0" width="${pillW}" height="${PH}" rx="${PR}" ry="${PR}" fill="${fill}"/>`;
      i++;
    }
  }

  const allComplete = cellsFull.every(c => c.done || c.passed);
  return `<div class="mini-progress" data-cls="${cls}" data-complete="${allComplete ? '1' : '0'}"><svg class="mini-progress-svg" width="${totalW}" height="${PH}" viewBox="0 0 ${totalW} ${PH}">${paths}</svg></div>`;
}

function refreshMiniProgress() {
  document.querySelectorAll('.mini-progress[data-cls]').forEach(el => {
    const cls = el.dataset.cls;
    const html = renderMiniProgress(cls);
    if (html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      const newEl = tmp.firstElementChild;
      const card = el.closest('.item-card');
      el.replaceWith(newEl);
      // Toggle solid border when all tasks complete
      if (card) {
        if (newEl.dataset.complete === '1') card.classList.add('tasks-complete');
        else card.classList.remove('tasks-complete');
      }
    }
  });
}

function renderItemCards(items, isPast) {
  let html = '';
  let lastDate = '';
  let idx = 0;

  items.forEach(it => {
    if (it.date !== lastDate) {
      lastDate = it.date;
      const days = daysUntil(it.date);
      const todayCls = isToday(it.date) ? ' is-today' : isPast ? ' is-past' : '';
      const urgency = !isPast ? urgencyLabel(days) : '';
      html += `<div class="date-marker${todayCls}" style="animation-delay:${idx * 40}ms">
        <span>${fmtDate(it.date).toUpperCase()}</span>
        ${urgency ? `<span class="day-name">\u00b7 ${urgency.toUpperCase()}</span>` : ''}
      </div>`;
      idx++;
    }

    const id = itemId(it);
    const pastCls = isPast ? ' is-past' : '';
    const doneCls = it.status === 'Turned in' ? ' is-done' : '';
    const missCls = it.status === 'Missing' ? ' is-missing' : '';
    const todayCard = isToday(it.date) && !isPast ? ' is-today-card' : '';
    const typeCls = (it.type === 'deadline' || it.type === 'assessment') ? ` type-label type-${it.type}` : 'type-label';

    const clsCss = CLASSES[it.cls].css;
    const tasksCompCls = isTasksComplete(it.cls) ? ' tasks-complete' : '';
    html += `<div class="item-card ${clsCss}${pastCls}${doneCls}${missCls}${todayCard}${tasksCompCls}" data-id="${id}" style="animation-delay:${idx * 40}ms">
      <svg class="card-border" overflow="visible"><rect x="0" y="0" width="100%" height="100%" rx="19" ry="19"/></svg>
      <div class="item-meta-line">
        <span class="class-pill ${CLASSES[it.cls].css}">${it.cls}</span>
        <span class="${typeCls}">${it.type}</span>
        ${statusBadgeHTML(it.status)}
      </div>
      <div class="item-title">${it.short || it.title}</div>
      ${renderMiniProgress(it.cls)}
    </div>`;

    // Detail panel (hidden by default, rendered inline for this card)
    const days = daysUntil(it.date);
    const sourceFmt = fmtSource(it.source);
    const classworkUrl = CLASSES[it.cls].classwork;
    const dateLabel = it.type === 'material' ? 'Posted' : 'Due';
    let timeCtx = `${fmtDate(it.date)}`;
    if (!isPast && days > 0) timeCtx += ` \u00b7 ${days} day${days !== 1 ? 's' : ''} away`;
    else if (days < 0) timeCtx += ` \u00b7 ${Math.abs(days)} day${Math.abs(days) !== 1 ? 's' : ''} ago`;
    else if (days === 0) timeCtx += ' \u00b7 today';

    let srcHtml = '';
    if (sourceFmt) {
      const srcUrl = sourceUrl(it.cls, it.source);
      srcHtml = srcUrl
        ? `<div class="detail-source"><strong>Source:</strong> <a href="${srcUrl}" target="_blank" onclick="event.stopPropagation()">${sourceFmt}</a></div>`
        : `<div class="detail-source"><strong>Source:</strong> ${sourceFmt}</div>`;
    }

    const srcPath = it.source ? sourceUrl(it.cls, it.source) : null;

    // Build canvas task widget if available for this class
    const taskSet = TASK_SETS[it.cls];
    let tasksHtml = '';
    if (taskSet && taskSet.tasks && taskSet.tasks.length > 0) {
      const circleCount = taskSet.tasks.length;
      let circlesHtml = '';
      for (let ci = 0; ci < circleCount; ci++) {
        circlesHtml += `<span class="task-circle" data-tidx="${ci}">${ci + 1}</span>`;
      }
      tasksHtml = `<div class="task-canvas-wrap" data-cls="${it.cls}">
        <div class="task-progress-row">
          <svg class="task-progress-svg"></svg>
          <div class="task-progress-circles">${circlesHtml}</div>
        </div>
        <div class="tc-canvas-slot"></div>
        <div class="task-detail-panel">
          <div class="task-detail-inner">
            <hr class="task-detail-sep">
            <div class="task-detail-desc td-desc"></div>
            <div class="task-unlock-hint td-unlock"></div>
            <ul class="task-detail-bullets td-bullets"></ul>
            <div class="task-detail-deliverable td-deliverable"></div>
            <div class="task-detail-actions">
              <button class="action-btn btn-pass td-pass">skip</button>
              <button class="btn-close-task td-close">&times;</button>
            </div>
            <div class="task-detail-links">
              <a class="btn-doc td-doc" target="_blank">&#8599; open doc</a>
            </div>
          </div>
        </div>
        <div class="task-hold-hint">hold to complete \u00b7 tap to expand</div>
      </div>`;
    } else if (it.detail || it.desc) {
      tasksHtml = `<div class="task-no-tasks">${it.detail || it.desc}</div>`;
    }

    html += `<div class="detail-panel" id="panel-${id}">
      <div class="detail-pointer"></div>
      <div class="detail-inner">
        ${(it.detail || it.desc) ? `<div class="detail-desc">${it.detail || it.desc}</div>` : ''}
        ${srcPath ? `<div class="detail-links"><a class="action-btn btn-doc" href="${srcPath}" target="_blank" onclick="event.stopPropagation()">&#8599; full analysis</a></div>` : ''}
        ${tasksHtml}
        ${srcHtml}
        <div class="detail-actions">
          ${classworkUrl ? `<a class="action-btn btn-classwork" href="${classworkUrl}" target="_blank" onclick="event.stopPropagation()">&#8599; classwork</a>` : ''}
          <button class="action-btn btn-close" onclick="event.stopPropagation(); closeDetail()">&times;</button>
        </div>
      </div>
    </div>`;

    idx++;
  });

  return html;
}

function renderAlerts(anomalies) {
  let html = '';
  anomalies.forEach((a, i) => {
    const isWarn = a.type === 'needs_turn_in';
    const cardCls = isWarn ? 'alert-card alert-warn' : 'alert-card';
    const badgeCls = isWarn ? 'badge-turn-in' : 'badge-overdue';
    const aid = 'alert-' + i;

    html += `<div class="${cardCls}" data-alert="${aid}" style="animation-delay:${i * 60}ms">
      <svg class="card-border" overflow="visible"><rect x="0" y="0" width="100%" height="100%" rx="19" ry="19"/></svg>
      <div class="item-meta-line">
        <span class="class-pill ${CLASSES[a.cls].css}">${a.cls}</span>
        <span class="alert-badge ${badgeCls}">${a.type === 'needs_turn_in' ? 'needs turn in' : a.status}</span>
      </div>
      <div style="margin-top:8px">
        <div class="alert-title">${a.doc}</div>
        <div class="item-type" style="margin-top:3px">${a.assignment}</div>
      </div>
      <div class="alert-detail" id="alert-detail-${aid}">
        <hr class="alert-sep">
        ${a.pct > 0 ? `<div class="alert-progress"><div class="alert-progress-bar" style="width:${a.pct}%"></div></div>
        <div class="progress-label"><span>Progress:</span> ${a.pct}% ${a.progress.replace('_',' ')}</div>` : ''}
        <div class="alert-sub">${a.summary}</div>
        <div class="next-steps-label">Next steps</div>
        <ul class="alert-steps">${a.next_steps.map(s => `<li>${s}</li>`).join('')}</ul>
        <div class="detail-actions" style="margin-top:14px">
          <a class="action-btn btn-classwork" href="${a.doc_url}" target="_blank" onclick="event.stopPropagation()">&#8599; open doc</a>
          <button class="action-btn btn-close" onclick="event.stopPropagation(); closeAlert('${aid}')">&times;</button>
        </div>
      </div>
    </div>`;
  });
  return html;
}

function closeDetail() {
  if (!expandedId) return;
  const panel = document.getElementById('panel-' + expandedId);
  const card = document.querySelector(`[data-id="${expandedId}"]`);
  if (panel) panel.classList.remove('open');
  expandedId = null;
  // Keep SVG animating during close transition, then clean up
  if (card) {
    // RAF loop still running — it tracks the shrinking panel
    setTimeout(() => {
      card.classList.remove('is-expanded');
      stopExpandBorder(card);
    }, 320);
  }
}

let expandBorderRaf = null;

function drawExpandBorder(card, panel) {
  // Create SVG if needed
  let svg = card.querySelector('.expand-border-svg');
  if (!svg) {
    svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.classList.add('expand-border-svg');
    card.appendChild(svg);
  }

  const R = 19;
  const S = 1.8;
  // Read the card's actual background before it was made transparent by is-expanded
  // Use the class-based tint color from CSS
  const clsList = card.classList;
  let cardBg = 'rgba(216,226,233,0.55)'; // default
  if (clsList.contains('cp-12ftx'))  cardBg = 'rgba(184,80,30,0.08)';
  else if (clsList.contains('cp-enw223')) cardBg = 'rgba(80,120,160,0.08)';
  else if (clsList.contains('cp-flm223')) cardBg = 'rgba(140,60,120,0.08)';
  else if (clsList.contains('cp-mus223')) cardBg = 'rgba(60,130,100,0.08)';
  else if (clsList.contains('cp-mat223')) cardBg = 'rgba(100,90,160,0.08)';
  else if (clsList.contains('cp-fcm112')) cardBg = 'rgba(160,120,50,0.08)';
  const detailBg = 'rgba(255,252,245,0.92)';

  function update() {
    // Keep running as long as the SVG exists (covers both open and closing animation)
    if (!card.querySelector('.expand-border-svg')) {
      expandBorderRaf = null;
      return;
    }

    const cardH = card.offsetHeight;
    const panelH = panel.offsetHeight;
    const W = card.offsetWidth + 2;
    const totalH = cardH + panelH + 2;
    const splitY = cardH + 1;
    const uid = card.dataset.id || '0';

    svg.setAttribute('width', W);
    svg.setAttribute('height', totalH);
    svg.innerHTML = `
      <defs>
        <clipPath id="clip-top-${uid}"><rect x="0" y="0" width="${W}" height="${splitY}"/></clipPath>
        <clipPath id="clip-btm-${uid}"><rect x="0" y="${splitY}" width="${W}" height="${totalH - splitY}"/></clipPath>
      </defs>
      <rect x="${S/2}" y="${S/2}" width="${W-S}" height="${totalH-S}" rx="${R}" ry="${R}"
            fill="${cardBg}" clip-path="url(#clip-top-${uid})"/>
      <rect x="${S/2}" y="${S/2}" width="${W-S}" height="${totalH-S}" rx="${R}" ry="${R}"
            fill="${detailBg}" clip-path="url(#clip-btm-${uid})"/>
      <rect x="${S/2}" y="${S/2}" width="${W-S}" height="${totalH-S}" rx="${R}" ry="${R}"
            fill="none" stroke="rgba(43,95,138,0.6)" stroke-width="${S}"
            stroke-dasharray="6 4"/>
    `;

    expandBorderRaf = requestAnimationFrame(update);
  }

  // Cancel any previous animation loop
  if (expandBorderRaf) cancelAnimationFrame(expandBorderRaf);
  update();
}

function stopExpandBorder(card) {
  if (expandBorderRaf) { cancelAnimationFrame(expandBorderRaf); expandBorderRaf = null; }
  const svg = card.querySelector('.expand-border-svg');
  if (svg) svg.remove();
}

function closeAlert(aid) {
  const detail = document.getElementById('alert-detail-' + aid);
  const card = document.querySelector(`[data-alert="${aid}"]`);
  if (detail) { detail.style.maxHeight = detail.scrollHeight + 'px'; requestAnimationFrame(() => { detail.style.maxHeight = '0'; detail.classList.remove('open'); }); }
  if (card) card.classList.remove('is-expanded');
  if (expandedId === aid) expandedId = null;
}

function render() {
  const allFuture = ITEMS.filter(it => it.date >= TODAY_STR).sort((a,b) => a.date.localeCompare(b.date) || a.cls.localeCompare(b.cls));
  const current = allFuture.filter(it => daysUntil(it.date) <= 14);
  const upcoming = allFuture.filter(it => daysUntil(it.date) > 14);
  const pastItems = ITEMS.filter(it => it.date < TODAY_STR).sort((a,b) => b.date.localeCompare(a.date) || a.cls.localeCompare(b.cls));

  renderHeader();

  let html = '';

  // Alerts
  if (ANOMALIES.length > 0) {
    html += `<div class="section-label section-alerts" data-section="alerts">
      <span class="section-chevron${!alertsCollapsed ? ' open' : ''}">&#x25B8;</span>
      Alerts <span class="section-count">(${ANOMALIES.length})</span>
    </div>`;
    html += `<div class="section-body${alertsCollapsed ? ' collapsed' : ''}" id="alertsBody" style="max-height:${alertsCollapsed ? '0' : 'none'}">`;
    html += renderAlerts(ANOMALIES);
    html += `</div>`;
  }

  // Current items — no section header, flow directly
  html += `<div class="section-body" id="currentBody" style="max-height:none">`;
  html += current.length > 0 ? renderItemCards(current, false) : `<div class="empty-note">Nothing due in the next 2 weeks</div>`;
  html += `</div>`;

  // Tab pills
  html += `<div class="tab-row">
    <button class="tab-btn${activeTab === 'upcoming' ? ' active' : ''}" data-tab="upcoming">Upcoming</button>
    <button class="tab-btn${activeTab === 'past' ? ' active' : ''}" data-tab="past">Past</button>
  </div>`;

  // Full-width frame — upcoming (left pill → from-left)
  html += `<div class="tab-frame from-left${activeTab === 'upcoming' ? ' open' : ''}" id="upcomingTab">`;
  html += `<svg class="tab-frame-svg"></svg>`;
  html += `<div class="tab-frame-content">`;
  html += upcoming.length > 0 ? renderItemCards(upcoming, false) : `<div class="empty-note">No upcoming items</div>`;
  html += `</div></div>`;

  // Full-width frame — past (right pill → from-right)
  html += `<div class="tab-frame from-right${activeTab === 'past' ? ' open' : ''}" id="pastTab">`;
  html += `<svg class="tab-frame-svg"></svg>`;
  html += `<div class="tab-frame-content">`;
  html += pastItems.length > 0 ? renderItemCards(pastItems, true) : `<div class="empty-note">No past items</div>`;
  html += `</div></div>`;


  document.getElementById('sections').innerHTML = html;
  document.getElementById('sections').style.width = '100%';
  document.getElementById('sections').style.maxWidth = '380px';
  document.getElementById('sections').style.display = 'flex';
  document.getElementById('sections').style.flexDirection = 'column';
  document.getElementById('sections').style.gap = '0';

  expandedId = null;
  bindEvents();
  drawTabConnectors();
}

function drawTabConnectors() {
  // Draw the ENTIRE pill+frame outline as one SVG path — pill top + frame body
  const PR = 14;      // pill top corner radius
  const R = 10;       // chamfer / far-corner radius
  const BR = 14;      // bottom corner radius
  const S = 1.5;      // stroke width
  const color = 'rgba(58,48,40,0.2)';
  const frameBg = 'rgba(245,243,238,0.95)';

  document.querySelectorAll('.tab-frame.open').forEach(frame => {
    const svg = frame.querySelector('.tab-frame-svg');
    if (!svg) return;

    // Measure the active pill
    const activeBtn = document.querySelector('.tab-btn.active');
    if (!activeBtn) return;
    const pillH = activeBtn.offsetHeight;
    const pillW = activeBtn.offsetWidth;

    const W = frame.offsetWidth;
    const FH = frame.offsetHeight;
    const TH = pillH + FH; // total height: pill + frame
    if (W === 0 || TH === 0) return;

    const isLeft = frame.classList.contains('from-left');

    // For isLeft: pill spans x=[0, pillW], chamfer at x=pillW
    // For isRight: pill spans x=[W-pillW, W], chamfer at x=W-pillW
    let path;
    if (isLeft) {
      const cx = pillW; // chamfer x position
      // Clockwise from pill top-left corner:
      // 1. Pill top edge (left to right)
      // 2. Pill top-right corner arc
      // 3. Down pill right side to pill bottom = chamfer level
      // 4. Chamfer arc (concave) curving down to frame top level
      // 5. Horizontal at frame top level to far corner
      // 6. Far corner arc (convex) curving down
      // 7. Down frame right side
      // 8. Bottom-right corner
      // 9. Bottom edge
      // 10. Bottom-left corner
      // 11. Up frame left side + pill left side
      // 12. Pill top-left corner arc → close
      path = `
        M ${PR} 0
        L ${cx - PR} 0
        A ${PR} ${PR} 0 0 1 ${cx} ${PR}
        L ${cx} ${pillH}
        A ${R} ${R} 0 0 0 ${cx + R} ${pillH + R}
        L ${W - R} ${pillH + R}
        A ${R} ${R} 0 0 1 ${W} ${pillH + R + R}
        L ${W} ${TH - BR}
        A ${BR} ${BR} 0 0 1 ${W - BR} ${TH}
        L ${BR} ${TH}
        A ${BR} ${BR} 0 0 1 0 ${TH - BR}
        L 0 ${PR}
        A ${PR} ${PR} 0 0 1 ${PR} 0
        Z`;
    } else {
      const cx = W - pillW; // chamfer x position
      // Counter-clockwise from pill top-right corner:
      path = `
        M ${W - PR} 0
        A ${PR} ${PR} 0 0 1 ${W} ${PR}
        L ${W} ${TH - BR}
        A ${BR} ${BR} 0 0 1 ${W - BR} ${TH}
        L ${BR} ${TH}
        A ${BR} ${BR} 0 0 1 0 ${TH - BR}
        L 0 ${pillH + R + R}
        A ${R} ${R} 0 0 1 ${R} ${pillH + R}
        L ${cx - R} ${pillH + R}
        A ${R} ${R} 0 0 0 ${cx} ${pillH}
        L ${cx} ${PR}
        A ${PR} ${PR} 0 0 1 ${cx + PR} 0
        Z`;
    }

    // Position SVG to extend above the frame into the pill area
    svg.style.top = -pillH + 'px';
    svg.setAttribute('width', W);
    svg.setAttribute('height', TH);
    svg.innerHTML = `<path d="${path}" fill="${frameBg}" stroke="${color}" stroke-width="${S}"/>`;
  });
}

function bindEvents() {
  // Tab switching — click toggles pill open/closed
  document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      closeDetail();
      if (activeTab === tab) {
        // Close
        btn.classList.remove('active');
        document.getElementById(tab === 'upcoming' ? 'upcomingTab' : 'pastTab').classList.remove('open');
        activeTab = null;
      } else {
        // Close any open
        document.querySelectorAll('.tab-btn.active').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-frame.open').forEach(f => f.classList.remove('open'));
        // Open this one
        btn.classList.add('active');
        document.getElementById(tab === 'upcoming' ? 'upcomingTab' : 'pastTab').classList.add('open');
        activeTab = tab;
        drawTabConnectors();
      }
    });
  });

  // Alerts section toggle
  document.querySelectorAll('.section-label[data-section="alerts"]').forEach(label => {
    label.addEventListener('click', () => {
      const body = document.getElementById('alertsBody');
      if (!body) return;
      const chevron = label.querySelector('.section-chevron');
      const isCollapsed = body.classList.contains('collapsed');

      if (body.dataset.animating === '1') return;
      body.dataset.animating = '1';

      const children = Array.from(body.querySelectorAll('.alert-card, .date-marker'));
      const total = children.length;

      if (isCollapsed) {
        children.forEach((child, i) => { child.style.animationDelay = (i * 40) + 'ms'; });
        body.classList.remove('collapsed', 'closing');
        body.style.transition = 'none';
        body.style.maxHeight = '0';
        body.offsetHeight;
        body.classList.add('opening');
        body.style.transition = '';
        requestAnimationFrame(() => { body.style.maxHeight = body.scrollHeight + 'px'; });
        if (chevron) chevron.classList.add('open');
        alertsCollapsed = false;
        setTimeout(() => { body.classList.remove('opening'); body.style.maxHeight = body.scrollHeight + 'px'; body.dataset.animating = '0'; }, Math.max(400, total * 40 + 400));
      } else {
        closeDetail();
        children.forEach((child, i) => { child.style.animationDelay = ((total - 1 - i) * 30) + 'ms'; });
        body.classList.remove('opening');
        body.classList.add('closing');
        if (chevron) chevron.classList.remove('open');
        alertsCollapsed = true;
        body.style.transition = 'none';
        body.style.maxHeight = body.scrollHeight + 'px';
        body.offsetHeight;
        body.style.transition = '';
        requestAnimationFrame(() => { body.style.maxHeight = '0'; });
        setTimeout(() => { body.classList.remove('closing'); body.classList.add('collapsed'); body.dataset.animating = '0'; }, Math.max(500, total * 30 + 500));
      }
    });
  });

  // Item card → floating detail panel
  document.querySelectorAll('.item-card[data-id]').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.detail-panel.open')) return;
      const id = card.dataset.id;
      const panel = document.getElementById('panel-' + id);
      if (!panel) return;

      if (expandedId === id) {
        // Close — keep SVG animating during panel collapse
        panel.classList.remove('open');
        expandedId = null;
        setTimeout(() => {
          card.classList.remove('is-expanded');
          stopExpandBorder(card);
          recalcSectionHeight(card);
        }, 320);
      } else {
        // Close previous
        if (expandedId) {
          const prevPanel = document.getElementById('panel-' + expandedId);
          const prevCard = document.querySelector(`[data-id="${expandedId}"]`);
          if (prevPanel) prevPanel.classList.remove('open');
          if (prevCard) {
            // Let SVG animate during close, then clean up
            setTimeout(() => {
              prevCard.classList.remove('is-expanded');
              stopExpandBorder(prevCard);
            }, 320);
          }
        }
        // Open this one — immediately grow section to avoid pop-in reflow
        const body = card.closest('.section-body') || card.closest('.tab-frame');
        if (body && body.classList.contains('section-body')) { body.style.transition = 'none'; body.style.maxHeight = body.scrollHeight + 1200 + 'px'; body.offsetHeight; body.style.transition = ''; }
        panel.classList.add('open');
        card.classList.add('is-expanded');
        expandedId = id;
        applyTaskStates(id);
        // Start animating border immediately — RAF loop tracks panel size
        drawExpandBorder(card, panel);
        setTimeout(() => { recalcSectionHeight(card); }, 350);
        setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 380);
      }
    });
  });

  // Alert card expand/collapse
  document.querySelectorAll('.alert-card[data-alert]').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.alert-detail.open')) return;
      const aid = card.dataset.alert;
      const detail = document.getElementById('alert-detail-' + aid);
      if (!detail) return;

      if (expandedId === aid) {
        detail.style.maxHeight = detail.scrollHeight + 'px';
        requestAnimationFrame(() => { detail.style.maxHeight = '0'; detail.classList.remove('open'); });
        card.classList.remove('is-expanded');
        expandedId = null;
      } else {
        // Close previous alert detail
        if (expandedId && expandedId.startsWith('alert-')) {
          closeAlert(expandedId.replace('alert-', ''));
        } else if (expandedId) {
          closeDetail();
        }
        detail.style.maxHeight = '0';
        detail.classList.add('open');
        requestAnimationFrame(() => {
          detail.style.maxHeight = detail.scrollHeight + 'px';
          // Update parent section height
          const body = card.closest('.section-body');
          if (body) setTimeout(() => { body.style.maxHeight = body.scrollHeight + 'px'; }, 50);
          setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 150);
        });
        card.classList.add('is-expanded');
        expandedId = aid;
      }
    });
  });

  // Task canvases are initialized on panel open via applyTaskStates()
}

function recalcSectionHeight(el) {
  const body = el.closest('.section-body') || el.closest('.tab-frame');
  if (body && !body.classList.contains('collapsed')) {
    setTimeout(() => { if (body.classList.contains('section-body')) body.style.maxHeight = body.scrollHeight + 'px'; }, 50);
  }
}

// Telegram
if (window.Telegram && window.Telegram.WebApp) {
  const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
}

function fixSectionHeights() {
  document.querySelectorAll('.section-body').forEach(body => {
    if (!body.classList.contains('collapsed')) {
      body.style.maxHeight = body.scrollHeight + 'px';
    }
  });
}

// Init
document.fonts.ready.then(() => { render(); requestAnimationFrame(fixSectionHeights); });
</script>
</body>
