<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>What's Due — Classroom Dashboard</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;600&family=Literata:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { overflow-y: scroll; }

  body {
    background: #ECEAE3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 24px 90px;
    font-family: 'JetBrains Mono', monospace;
    gap: 6px;
    -webkit-user-select: none;
    user-select: none;
  }

  .header {
    text-align: left;
    width: 100%;
    max-width: 380px;
    padding: 0 4px;
  }

  .date-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600; letter-spacing: 0.18em;
    text-transform: uppercase; color: #8C7830;
    margin-bottom: 7px;
  }

  .page-title {
    font-family: 'Nunito', sans-serif;
    font-size: 24px; font-weight: 700; color: #3A3028;
    letter-spacing: 0.01em; line-height: 1.2;
    margin-bottom: 2px;
  }

  .header-sep {
    border: none; border-top: 1.5px solid #C8C0B4;
    margin: 0 0 8px 0;
  }

  /* Tab pills — individual rounded pills, frame extends below */
  .tab-row {
    display: flex; gap: 12px;
    width: 100%; max-width: 380px;
    margin: 32px 0 0;
    position: relative; z-index: 3;
  }
  .tab-btn {
    flex: 1;
    font-family: 'Nunito', sans-serif;
    font-size: 21px; font-weight: 700; letter-spacing: 0.02em;
    color: rgba(160,152,136,0.5);
    background: rgba(200,192,180,0.15);
    border: 1.5px solid rgba(58,48,40,0.2);
    border-radius: 14px;
    padding: 12px 16px; cursor: pointer;
    transition: color 0.2s, background 0.2s, border-color 0.2s, border-radius 0.15s;
    -webkit-tap-highlight-color: transparent;
    text-align: left;
    position: relative;
    z-index: 3;
  }
  .tab-btn:active { opacity: 0.7; }
  .tab-btn.active {
    color: rgba(58,48,40,0.55);
    background: transparent;
    border-color: transparent;
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
    z-index: 3;
  }
  .tab-frame {
    display: none;
    background: transparent;
    border: none;
    padding: 0;
    position: relative;
    width: 100%; max-width: 380px;
  }
  .tab-frame.open { display: block; }
  /* SVG draws the entire pill+frame outline */
  .tab-frame-svg {
    position: absolute;
    left: 0;
    width: 100%;
    pointer-events: none;
    z-index: 2;
    overflow: visible;
  }
  .tab-frame-content {
    position: relative;
    padding: 22px 13.5px 13.5px;
    z-index: 3;
  }

  /* Section headers */
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600; letter-spacing: 0.22em;
    text-transform: uppercase; color: #A09888;
    width: 100%; max-width: 380px;
    padding: 0 4px; margin: 8px 0 0;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px;
    background: #C8C0B4;
  }
  .section-label:active { opacity: 0.7; }
  .section-label .section-count {
    font-weight: 400; opacity: 0.65;
  }
  .section-label .section-chevron {
    font-size: 12px; transition: transform 0.3s ease;
    display: inline-block; margin-left: -4px;
  }
  .section-label .section-chevron.open {
    transform: rotate(90deg);
  }
  .section-label.section-past { color: #BDB5A8; }
  .section-label.section-past::after { background: #D4CFC6; }
  .section-label.section-current { color: #B8501E; }
  .section-label.section-current::after { background: rgba(184,80,30,0.25); }
  .section-label.section-alerts { color: rgb(160,50,40); }
  .section-label.section-alerts::after { background: rgba(180,60,50,0.2); }

  /* Section body */
  .section-body {
    width: 100%; max-width: 380px;
    overflow: hidden;
    padding: 2px; margin: -2px;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .section-body.closing {
    transition: max-height 0.5s cubic-bezier(0.4, 0, 0.6, 1);
  }
  .section-body.collapsed {
    max-height: 0 !important;
  }

  @keyframes cascadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes cascadeOut {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-8px); }
  }
  .section-body.opening > .item-card,
  .section-body.opening > .alert-card,
  .section-body.opening > .date-marker {
    animation: cascadeIn 0.3s ease both;
  }
  .section-body.closing > .item-card,
  .section-body.closing > .alert-card,
  .section-body.closing > .date-marker {
    animation: cascadeOut 0.2s ease both;
  }

  /* Date markers */
  .date-marker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: #8C7830;
    padding: 18px 4px 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-body > .date-marker:first-child,
  .tab-frame-content > .date-marker:first-child {
    padding-top: 4px;
  }
  .date-marker .day-name {
    color: #B8A060; font-weight: 400;
  }
  .date-marker.is-today { color: #B8501E; }
  .date-marker.is-today .day-name { color: #D4845A; }
  .date-marker.is-past { color: #BDB5A8; }
  .date-marker.is-past .day-name { color: #C8C0B4; }

  /* Item cards — enw223 canvas-matched */
  .item-card {
    position: relative;
    background: rgba(216,226,233,0.55);
    background-clip: padding-box;
    border: 1px solid transparent;
    border-radius: 18px;
    padding: 15px;
    margin-bottom: 10px;
    overflow: visible;
    transition: transform 0.15s ease, background 0.2s ease;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .item-card .card-border {
    position: absolute; inset: -1px; width: calc(100% + 2px); height: calc(100% + 2px);
    pointer-events: none; overflow: visible;
  }
  .item-card .card-border rect {
    fill: none; stroke: rgba(43,95,138,0.25);
    stroke-width: 1.8; stroke-dasharray: 6 4;
  }
  .item-card:active { transform: scale(0.985); }
  .item-card.is-expanded {
    background: transparent; background-clip: padding-box;
    margin-bottom: 0;
  }
  .item-card.is-expanded .card-border { display: none; }
  .item-card.is-expanded > *:not(.expand-border-svg) {
    position: relative; z-index: 2;
  }
  .expand-border-svg {
    position: absolute;
    top: -1px; left: -1px;
    pointer-events: none;
    z-index: 0;
  }
  .item-card.is-done {
    background: rgba(64,127,190,0.22);
    background-clip: padding-box;
  }
  .item-card.is-done .card-border rect {
    stroke: rgba(43,95,138,1); stroke-dasharray: none;
  }
  .item-card.is-past { background: rgba(216,226,233,0.3); background-clip: padding-box; }
  .item-card.is-past .card-border rect { stroke: rgba(43,95,138,0.1); }
  .item-card.is-missing .card-border rect { stroke: rgba(180,60,50,0.4); }
  .item-card.is-today-card .card-border rect { stroke: rgba(184,80,30,0.35); }

  /* Per-class card border colors */
  .item-card.cp-12ftx  .card-border rect { stroke: rgba(184,80,30,0.3); }
  .item-card.cp-enw223 .card-border rect { stroke: rgba(80,120,160,0.3); }
  .item-card.cp-flm223 .card-border rect { stroke: rgba(140,60,120,0.3); }
  .item-card.cp-mus223 .card-border rect { stroke: rgba(60,130,100,0.3); }
  .item-card.cp-mat223 .card-border rect { stroke: rgba(100,90,160,0.3); }
  .item-card.cp-fcm112 .card-border rect { stroke: rgba(160,120,50,0.3); }
  .item-card.is-past.cp-12ftx  .card-border rect { stroke: rgba(184,80,30,0.12); }
  .item-card.is-past.cp-enw223 .card-border rect { stroke: rgba(80,120,160,0.12); }
  .item-card.is-past.cp-flm223 .card-border rect { stroke: rgba(140,60,120,0.12); }
  .item-card.is-past.cp-mus223 .card-border rect { stroke: rgba(60,130,100,0.12); }
  .item-card.is-past.cp-mat223 .card-border rect { stroke: rgba(100,90,160,0.12); }
  .item-card.is-past.cp-fcm112 .card-border rect { stroke: rgba(160,120,50,0.12); }

  /* Solid border when all tasks complete */
  .item-card.tasks-complete .card-border rect { stroke-dasharray: none !important; }
  .item-card.tasks-complete.cp-12ftx  .card-border rect { stroke: rgba(184,80,30,0.5); }
  .item-card.tasks-complete.cp-enw223 .card-border rect { stroke: rgba(80,120,160,0.5); }
  .item-card.tasks-complete.cp-flm223 .card-border rect { stroke: rgba(140,60,120,0.5); }
  .item-card.tasks-complete.cp-mus223 .card-border rect { stroke: rgba(60,130,100,0.5); }
  .item-card.tasks-complete.cp-mat223 .card-border rect { stroke: rgba(100,90,160,0.5); }
  .item-card.tasks-complete.cp-fcm112 .card-border rect { stroke: rgba(160,120,50,0.5); }

  .item-meta-line {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 4px;
  }

  .class-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 1px 6px; border-radius: 4px;
    white-space: nowrap; flex-shrink: 0;
  }
  .cp-12ftx  { background: rgba(184,80,30,0.14); color: #9C4A1A; }
  .cp-enw223 { background: rgba(80,120,160,0.14); color: #3A6890; }
  .cp-flm223 { background: rgba(140,60,120,0.14); color: #8C3C78; }
  .cp-mus223 { background: rgba(60,130,100,0.14); color: #2A7A58; }
  .cp-mat223 { background: rgba(100,90,160,0.14); color: #5A50A0; }
  .cp-fcm112 { background: rgba(160,120,50,0.14); color: #8A6820; }

  /* Per-class card tints */
  .item-card.cp-12ftx  { background: rgba(184,80,30,0.08); }
  .item-card.cp-enw223 { background: rgba(80,120,160,0.08); }
  .item-card.cp-flm223 { background: rgba(140,60,120,0.08); }
  .item-card.cp-mus223 { background: rgba(60,130,100,0.08); }
  .item-card.cp-mat223 { background: rgba(100,90,160,0.08); }
  .item-card.cp-fcm112 { background: rgba(160,120,50,0.08); }
  .item-card.is-past.cp-12ftx  { background: rgba(184,80,30,0.04); }
  .item-card.is-past.cp-enw223 { background: rgba(80,120,160,0.04); }
  .item-card.is-past.cp-flm223 { background: rgba(140,60,120,0.04); }
  .item-card.is-past.cp-mus223 { background: rgba(60,130,100,0.04); }
  .item-card.is-past.cp-mat223 { background: rgba(100,90,160,0.04); }
  .item-card.is-past.cp-fcm112 { background: rgba(160,120,50,0.04); }

  .item-title {
    font-family: 'Nunito', sans-serif;
    font-size: 19px; font-weight: 400; color: rgba(43,64,95,0.6);
    line-height: 1.3;
  }
  .mini-progress {
    display: flex; align-items: center; margin-top: 6px;
    height: 8px;
  }
  .mini-progress-svg {
    height: 100%;
  }
  .is-done .item-title { font-style: italic; color: rgba(43,64,95,0.95); }
  .is-past .item-title { color: rgba(43,64,95,0.3); }

  .item-meta-line .type-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 400; letter-spacing: 0.08em;
    text-transform: uppercase; color: #A09888;
  }
  .item-meta-line .type-label.type-deadline { color: #B8501E; }
  .item-meta-line .type-label.type-assessment { color: #8C7830; }

  .status-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 1px 6px; border-radius: 4px;
    margin-left: auto;
  }
  .st-turned-in { background: rgba(55,130,65,0.12); color: rgb(38,91,45); }
  .st-assigned  { background: rgba(140,120,48,0.12); color: #8C7830; }
  .st-missing   { background: rgba(180,60,50,0.18); color: rgb(160,45,35); font-weight: 700; }

  /* Floating detail panel */
  .detail-panel {
    position: relative;
    width: 100%; max-width: 380px;
    opacity: 0; transform: translateY(-6px);
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), max-height 0.3s ease;
    max-height: 0; overflow: hidden;
    margin-top: 0;
  }
  .detail-panel.open {
    opacity: 1; transform: translateY(0);
    pointer-events: auto;
    max-height: 1200px;
    margin-bottom: 10px;
  }

  .detail-pointer {
    display: none;
  }

  .detail-inner {
    background: transparent;
    border: none;
    border-radius: 0 0 18px 18px; padding: 16px 18px;
    position: relative; z-index: 2;
  }

  .detail-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 14px;
  }

  .detail-title {
    font-family: 'Nunito', sans-serif;
    font-size: 18px; font-weight: 700; color: #3A3028; line-height: 1.3;
  }

  .detail-desc {
    font-family: 'Nunito', sans-serif;
    font-size: 17px; font-weight: 400; color: #3A3028; line-height: 1.4;
    margin-bottom: 10px;
  }

  .detail-day {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: #A09888;
    white-space: nowrap; margin-left: 12px; margin-top: 5px;
  }

  .detail-section {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: #2B5F8A;
    margin-bottom: 14px; opacity: 0.7;
  }

  .detail-class-full {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 600; letter-spacing: 0.28em;
    text-transform: uppercase; color: #A09888;
    margin-bottom: 10px;
  }

  .detail-info {
    font-family: 'Nunito', sans-serif;
    font-size: 14px; color: #5A5045;
    line-height: 1.6; margin-bottom: 6px;
  }
  .detail-info strong {
    color: #3A3028; font-weight: 700;
  }

  .detail-source {
    font-family: 'Nunito', sans-serif;
    font-size: 13px; color: #6A6058;
    line-height: 1.5; margin-bottom: 10px;
    display: none;
  }
  .detail-source strong { color: #3A3028; font-weight: 700; }
  .detail-source a {
    color: #6A6058; text-decoration: underline;
    text-decoration-style: dashed; text-underline-offset: 3px;
  }

  /* Task canvas */
  .task-canvas-wrap {
    position: relative; margin: 10px 0 4px;
  }
  .task-canvas-wrap canvas {
    display: block; cursor: pointer; touch-action: pan-y;
    -webkit-user-select: none; user-select: none;
  }

  .task-progress-row {
    position: relative; margin-bottom: 10px;
    height: 26px;
  }
  .task-progress-svg {
    position: absolute; left: 0; top: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  .task-progress-circles {
    position: absolute; left: 0; top: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: space-around;
  }
  .task-circle {
    width: 38px; height: 22px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    color: rgba(160,152,136,0.28);
    flex-shrink: 0;
    position: relative; z-index: 2;
    transition: color 0.35s ease, transform 0.15s ease;
    background: none; border: none;
    cursor: pointer;
  }
  .task-circle.is-done { color: #F5F3EE; }
  .task-circle.is-skip { color: rgb(126,105,28); }
  .task-circle.is-active { color: #C0707A; }
  .task-circle.is-next { color: rgba(192,112,122,0.45); }

  .task-detail-panel {
    position: absolute; left: 14px; right: 14px; z-index: 10;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease 0.08s;
    overflow: hidden;
  }
  .task-detail-panel.open { opacity: 1; pointer-events: auto; }

  .task-detail-inner {
    padding: 6px 2px 4px;
  }
  .task-detail-panel.is-locked .task-detail-inner {
    opacity: 0.45;
  }

  .task-detail-sep {
    border: none; border-top: 1.5px dashed rgba(160,150,140,0.25);
    margin: 14px 0 8px;
  }
  .task-detail-desc {
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 400; color: #5A5048;
    line-height: 1.5; margin-bottom: 6px;
  }
  .task-unlock-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 600; letter-spacing: 0.06em;
    color: rgba(180,60,50,0.55); margin-bottom: 10px;
  }
  .task-unlock-hint:empty { display: none; }
  .task-detail-bullets {
    list-style: none; margin: 8px 0 6px 0; padding: 10px 12px 10px 14px;
    background: rgba(107,140,168,0.15); border-radius: 12px;
  }
  .task-detail-bullets li {
    font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 400; color: #4A4540;
    line-height: 1.55; padding: 4px 0 4px 18px; position: relative;
  }
  .task-detail-bullets li::before {
    content: ""; position: absolute; left: 0; top: 13px;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--dot-color, #95AFC4);
  }
  .task-detail-deliverable { display: none; }
  .task-detail-actions { display: flex; gap: 10px; align-items: center; margin-top: 14px; }
  .task-detail-actions .action-btn { font-size: 11px; padding: 8px 16px; }
  .task-detail-actions .btn-pass {
    background: rgba(196,164,60,0.18); border: none; color: #9A7E1E;
    cursor: pointer; border-radius: 22px; transition: all 0.2s;
  }
  .task-detail-actions .btn-pass.is-passed { background: rgba(196,164,60,0.12); }
  .task-detail-actions .btn-close-task { display: none; }
  .task-detail-links { display: flex; gap: 10px; margin-top: 10px; }

  .task-hold-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase;
    color: #B8B0A4; text-align: center; margin-top: 6px;
  }

  .task-no-tasks {
    font-family: 'Nunito', sans-serif;
    font-size: 13px; color: #A09888; font-style: italic;
    margin: 6px 0;
  }

  .detail-actions {
    display: none;
  }

  .action-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 700; letter-spacing: 0.04em;
    text-transform: uppercase; border-radius: 22px;
    padding: 10px 20px; cursor: pointer;
    transition: all 0.2s ease; border: none;
    -webkit-tap-highlight-color: transparent; white-space: nowrap;
    text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
  }
  .action-btn:active { transform: scale(0.96); }

  .btn-classwork { background: #2B5F8A; color: #BFCFDB; }
  .btn-classwork:hover { background: #346A96; }

  .btn-close {
    display: none;
    background: rgba(160,150,140,0.15); color: #A09888;
    width: 36px; height: 36px; padding: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 400; letter-spacing: 0;
    text-transform: none; margin-left: auto; border-radius: 50%;
  }

  .btn-doc {
    background: none; border: 1.5px dashed rgba(160,150,140,0.35); color: #A09888;
    text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; border-radius: 8px; padding: 6px 14px;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-doc:active { color: #3A3028; border-color: rgba(100,90,80,0.5); }

  .detail-links {
    display: flex; gap: 10px; margin-top: 12px;
  }

  /* Alert cards */
  .alert-card {
    position: relative;
    background: rgba(255,248,240,0.55);
    background-clip: padding-box;
    border: 1px solid transparent;
    border-left: 3px solid rgb(180,60,50);
    border-radius: 18px;
    padding: 15px 15px 15px 14px;
    margin-bottom: 6px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s ease, background 0.2s ease;
    overflow: visible;
  }
  .alert-card .card-border {
    position: absolute; inset: -1px; width: calc(100% + 2px); height: calc(100% + 2px);
    pointer-events: none; overflow: visible;
  }

    "what_to_do": "This lesson is asking you to learn about the horror genre, its history, and its key elements. You will also analyze specific films and discuss important concepts like the \"Final Girl\" trope, representation, and whiteness.\n\n*   Complete the [starter activities](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3bc2159e986_0_5) on [Page 3](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3bc2159e986_0_5).\n*   Participate in [Pair Share](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3aba3f1f7e8_0_240#slide=id.g3aba3f1f7e8_0_240) activities throughout the lessons.\n*   Answer questions on your [whiteboard](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3bc2159e986_0_13#slide=id.g3bc2159e986_0_13) when prompted.\n*   Complete the [Getting to know you questionnaire](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3bc2159e986_0_0#slide=id.g3bc2159e986_0_0) on Google Classroom.\n*   Watch and analyze films like [The Babadook](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3c34d7b39b5_0_24#slide=id.g3c34d7b39b5_0_24), [Hereditary](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3c64ae18e2c_0_0#slide=id.g3c64ae18e2c_0_0), and [Get Out](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3c64ae18e2c_0_25#slide=id.g3c64ae18e2c_0_25).\n*   Complete the [Assessment Task - Horror Film Analysis](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3aba3f1f7e8_0_370#slide=id.g3aba3f1f7e8_0_370) by Term 3, Week 5.\n*   Read and highlight the [article on representation of PoC in slasher films](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g395ab2890f4_0_5#slide=id.g395ab2890f4_0_5).\n*   Complete the [sentence level work](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3cb3b54c8d3_0_88#slide=id.g3cb3b54c8d3_0_88) on whiteness and the \"Final Girl.\"\n*   Discuss and answer questions on the [Good for Her trope](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3aba3f1f7e8_0_1551#slide=id.g3aba3f1f7e8_0_1551) and the changing ideas around sex and survival in horror.",
    "requirements": "*   Understand and identify the [codes and conventions](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3aba3f1f7e8_0_267#slide=id.g3aba3f1f7e8_0_267) of the horror genre.\n*   Analyze how these codes and conventions are used in specific horror films.\n*   Understand the history and evolution of the [Final Girl trope](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g32af8d24156_0_1804#slide=id.g32af8d24156_0_1804).\n*   Discuss the representation of women, whiteness, and other identities in horror films.\n*   Complete the [Horror Film Analysis assessment](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3aba3f1f7e8_0_370#slide=id.g3aba3f1f7e8_0_370) to a high standard.\n*   Follow [class expectations](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3aba3f1f7e8_0_66#slide=id.g3aba3f1f7e8_0_66) regarding participation and conduct.\n*   Meet all [assessment deadlines](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g32af8d24156_0_1023#slide=id.g32af8d24156_0_1023).",
    "tips": "*   Use the [symbols on the slides](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3c34d7b39b5_0_38#slide=id.g3c34d7b39b5_0_38) to understand what to do on each page.\n*   When asked to use your whiteboard, be ready to write quickly and clearly.\n*   Pay attention during [Pair Share](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3aba3f1f7e8_0_240#slide=id.g3aba3f1f7e8_0_240) activities; they help you learn from your classmates.\n*   Take notes in your [workbook or digitally](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3aba3f1f7e8_0_310#slide=id.g3aba3f1f7e8_0_310) during film analysis and discussions.\n*   [Track your deadlines](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g32af8d24156_0_1023#slide=id.g32af8d24156_0_1023) carefully. It's important for managing your schoolwork.\n*   Don't be afraid to [ask for help](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3aba3f1f7e8_0_66#slide=id.g3aba3f1f7e8_0_66). Your teacher is there to support you.\n*   The page about [Conjunctions and Clauses](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g32af8d24156_0_1872#slide=id.g32af8d24156_0_1872) and [Subordinating Conjunctions](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3c0911bc363_0_0#slide=id.g3c0911bc363_0_0) can help you write better sentences for your analysis.\n*   Use the [film recommendations](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g32af8d24156_0_1825#slide=id.g32af8d24156_0_1825) to help you understand the \"Final Girl\" trope better.\n*   When considering \"Whiteness and setting\" on [Page 121](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3cb3b54c8d3_0_60#slide=id.g3cb3b54c8d3_0_60), think about why certain places feel scarier.",

  "L1-[2026]-Investigate-an-Aspect-of-New-Zealand-Music": {

  "Welcome-to-MUS223": {
    "what_to_do": "You will be assessed on four different music standards:\n*   **Solo Performance:** Perform two substantial pieces of music as a featured soloist.\n*   **Group Performance:** Demonstrate ensemble skills by performing a substantial piece of music as a member of a group.\n*   **Composition:** Compose two substantial pieces of music.\n*   **Investigate an Aspect of New Zealand Music:** Investigate an aspect of New Zealand music.",
    "requirements": "*   **Solo Performance:**\n    *   Perform two substantial pieces as a featured soloist.\n    *   Pieces should be 4-5 minutes long, musically and technically complex.\n    *   Demonstrate technical, musical, and presentation skills.\n    *   Live presentation to an audience.\n*   **Group Performance:**\n    *   Perform a substantial piece as a member of a group (3-7 members recommended).\n    *   Contribute to the group's cohesion, balance, intonation, feel, style, and accuracy.\n    *   Demonstrate confidence, consistency, and musical responsiveness.\n    *   Piece should be 4-6 minutes long, with significance and complexity.\n*   **Composition:**\n    *   Compose two substantial pieces of music, each at least two minutes in length.\n    *   Musical ideas should be skilfully developed and structured.\n    *   Demonstrate understanding of idiomatic writing, effective use of scales/modes, and compositional devices.\n    *   Structure ideas into a coherent whole with a clear beginning, middle, and end.\n    *   Ability to create and maintain a sense of style.\n    *   Can be solo or group composition (2-5 students for group).\n*   **Investigate an Aspect of New Zealand Music:**\n    *   Conduct an investigation into an aspect of New Zealand music.\n    *   This could be a musical style, genre, historical period, music industry, advocacy group, funding agency, musician, performing group, or festival/competition.\n    *   Presentation can include written assignments, seminars, documentaries, websites, PowerPoints, or static displays.",
    "tips": "*   **Music Ambassadors:** Consider your skills and ideas for leading clubs or strengthening the music community.\n*   **Solo Performance:**\n    *   Choose pieces that showcase your best skills and that you will enjoy practicing.\n    *   Practice regularly (aim for at least 20 minutes a day).\n    *   Practice performing in front of classmates.\n    *   Bring a copy of your score or a link to a performance of your piece.\n    *   A quality performance is assured, stylistically appropriate, musically expressive, demonstrates interpretive understanding, has appropriate body language, and is introduced by you.\n*   **Group Performance:**\n    *   Make the most of class rehearsal time and organize extra rehearsals if needed.\n    *   Bring a copy of your score or a link to a performance of your piece.\n    *   Quality performance includes enthusiastic interaction, musical responsiveness, awareness of space and audience, self-assurance, fluency, and an appropriate piece.\n*   **Composition:**\n    *   Engage in regular feedback and re-work your compositions.\n    *   Keep good records of your drafts and process.\n    *   Submit both visual representations (e.g., notation, lead sheet) and audio recordings.\n    *   For group composition, ensure your contribution can be verified (e.g., annotations, diary entries).\n*   **Investigate an Aspect of New Zealand Music:**\n    *   Your investigation should include a chronological overview, background profile, significant musical characteristics, and an evaluation of significance.\n    *   Presentation can include elements like performance, music videos, or annotated scores.",
    "html_path": "analysis/Welcome-to-MUS223__Welcome-to-MUS223.html"
  },
  "Info-about-MAT223-for-2026": {
    "what_to_do": "This course, MAT223 Te Ara P\u0101ngarau, is designed to be flexible. You will choose your own learning methods and standards, and work at your own pace. You will also sit assessments when you feel ready. Your teacher will act as a mentor, helping you plan your work, with difficult questions, and providing feedback.",
    "requirements": "*   You need to pass at least **four achievement standards** this year.\n*   Ensure you meet the [prerequisites](https://docs.google.com/presentation/d/1a67JwSK6dIK8SPvKoJSB9lfYW-KItzQ3a3U6Y4s-oig/edit?slide=id.g701e6895cd_0_0) for the courses you want to take in Year 13.\n*   If you haven't met the 'numeracy' requirement of NCEA, talk to your teacher.\n*   Year 12 students should focus on Level 2 standards, but two Level 3 standards are also available.\n*   You can only [resubmit](https://docs.google.com/presentation/d/1a67JwSK6dIK8SPvKoJSB9lfYW-KItzQ3a3U6Y4s-oig/edit?slide=id.g473f99fbc9_0_135) an internal assessment to change a 'Not Achieved' grade to 'Achieved'.",
    "tips": "*   You are in control of your learning and can work at your own pace.\n*   Teachers will act as mentors, guiding you through the course.\n*   It's important to discuss with your teacher if you want to do a standard at a higher level, as it might make getting endorsements harder.\n*   Remember to bring your [laptop](https://www.warehousestationery.co.nz/product/W2684953.html), [headphones](https://www.come-here.co.nz/), pens, pencil, and calculator to every lesson.",
    "html_path": "analysis/Info-about-MAT223-for-2026__Info-about-MAT223-for-2026.html"

<script>
const _now = new Date();
const TODAY = new Date(_now.getFullYear(), _now.getMonth(), _now.getDate());
const TODAY_STR = TODAY.toISOString().slice(0, 10);

// CLASSES, RAW, ANALYSIS, ANOMALIES loaded from dates_data.js

function sourceUrl(cls, source) {
  if (!source || !ANALYSIS[source]) return null;
  return ANALYSIS[source].html_path || null;
}


// Deduplicate
function dedup(items) {
  const key = (it) => it.cls + '|' + it.date;
  const groups = {};
  items.forEach(it => { const k = key(it); if (!groups[k]) groups[k] = []; groups[k].push(it); });
  const result = [];
  Object.values(groups).forEach(g => {
    if (g.length === 1) { result.push(g[0]); return; }
    const dominated = new Set();
    for (let i = 0; i < g.length; i++) {
      for (let j = 0; j < g.length; j++) {
        if (i === j) continue;
        const ti = g[i].title.toLowerCase().replace(/[^a-z0-9]/g, '');
        const tj = g[j].title.toLowerCase().replace(/[^a-z0-9]/g, '');
        if (ti.includes(tj) || tj.includes(ti)) {
          const scoreI = (g[i].status ? 10 : 0) + g[i].title.length;
          const scoreJ = (g[j].status ? 10 : 0) + g[j].title.length;
          dominated.add(scoreI >= scoreJ ? j : i);
        }
      }
    }
    g.forEach((it, idx) => { if (!dominated.has(idx)) result.push(it); });
  });
  return result;
}

const ITEMS = dedup(RAW);

// Format helpers
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAYS_S = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function fmtDate(ds) {
  const [y,m,d] = ds.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return `${DAYS_S[dt.getDay()]} ${d} ${MONTHS[m-1]}`;
}

function fmtDateLong(ds) {
  const [y,m,d] = ds.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return `${DAYS[dt.getDay()]} ${d} ${MONTHS[m-1]} ${y}`;
}

function isToday(ds) { return ds === TODAY_STR; }

function daysUntil(ds) {
  const [y,m,d] = ds.split('-').map(Number);
  return Math.round((new Date(y, m-1, d) - TODAY) / 86400000);
}

function typeIcon(type) {
  switch(type) {
    case 'deadline': return '\u25C9';
    case 'assignment': return '\u25A3';

}

}

function urgencyLabel(days) {
  if (days === 0) return 'today';
  if (days === 1) return 'tomorrow';
  if (days < 7) return `${days} days`;
  if (days === 7) return '1 week';
  if (days < 14) return `${days} days`;
  if (days === 14) return '2 weeks';
  const w = Math.round(days / 7);
  if (days <= 42) return `${w} weeks`;
  const m = Math.round(days / 30);
  if (m === 1) return '1 month';
  if (m < 12) return `${m} months`;
  return '';
}

function TaskCanvas(wrapEl, tasks, storageKey, colors, panelId) {

  const PASS_STROKE = '#C4A43C';

  const N = tasks.length;

  const CW = Math.min(340, wrapEl.offsetWidth || 340);

  const _SR = colors.ACCENT_RGB[0], _SG = colors.ACCENT_RGB[1], _SB = colors.ACCENT_RGB[2];
