<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Current — Classroom Dashboard</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;600&family=Literata:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { overflow-y: scroll; }

  body {
    background: #ECEAE3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 24px 90px;
    font-family: 'JetBrains Mono', monospace;
    gap: 6px;
    -webkit-user-select: none;
    user-select: none;
  }

  .header {
    text-align: center;
    width: 100%;
    max-width: 380px;
    padding: 0 4px;
  }

  .date-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600; letter-spacing: 0.18em;
    text-transform: uppercase; color: #8C7830;
    margin-bottom: 8px;
    text-align: center;
  }
  .class-filter-row {
    display: flex; flex-wrap: nowrap;
    justify-content: space-between;
    margin-bottom: 4px;
    width: 100%;
  }
  .class-filter-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
    padding: 4px 8px; border-radius: 8px;
    cursor: pointer; user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s, transform 0.1s;
    opacity: 0.35;
  }
  .class-filter-pill.active {
    opacity: 1;
  }
  .class-filter-pill:active {
    transform: scale(0.95);
  }


  /* Tab pills — individual rounded pills, frame extends below */
  .tab-row {
    display: flex; gap: 12px;
    width: 100%; max-width: 380px;
    margin: 32px 0 0;
    position: relative; z-index: 3;
  }
  .tab-row:first-child { margin-top: 0; }
  .tab-btn {
    flex: 1;
    width: 100%;
    font-family: 'Nunito', sans-serif;
    font-size: 25px; font-weight: 700; letter-spacing: 0.02em;
    color: rgba(250,248,245,1);
    background: rgba(200,192,180,0.15);
    border: 2px solid rgba(58,48,40,0.2);
    border-radius: 14px;
    padding: 10px 16px; cursor: pointer;
    transition: color 0.2s, background 0.2s, border-color 0.2s, border-radius 0.15s, transform 0.12s ease;
    -webkit-tap-highlight-color: transparent;
    text-align: center;
    position: relative;
    z-index: 3;
    will-change: transform;
  }
  .current-frame {
    width: 100%; max-width: 380px;
    border: 2px solid rgba(58,48,40,0.2);
    border-radius: 14px;
    background: rgba(245,243,238,0.95);
    margin: 0;
    overflow: hidden;
  }
  .current-header {
    text-align: center;
    padding: 12px 16px 10px;
    position: relative;
  }
  .current-title {
    font-family: 'Nunito', sans-serif;
    font-size: 25px; font-weight: 700; letter-spacing: 0.02em;
    color: rgba(58,48,40,0.38);
  }
  .current-header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: calc(50% - 32px);
    height: 2px;
    background: rgba(58,48,40,0.15);
  }
  .current-content {
    padding: 16px 13.5px 13.5px;
  }
  .current-empty {
    font-family: 'Nunito', sans-serif;
    font-size: 22px; font-weight: 600;
    color: rgba(58,48,40,0.2);
    text-align: center;
    padding: 2px 0 12px;
  }
  .tab-btn[data-tab="upcoming"] { background: rgba(160,210,80,0.18); border-color: rgba(140,190,60,0.35); }
  .tab-btn[data-tab="past"] { background: rgba(210,140,50,0.15); border-color: rgba(190,120,30,0.35); }
  .tab-btn.active {
    background: transparent;
    border-color: transparent;
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
    z-index: 3;
  }
  .tab-btn[data-tab="upcoming"].active { color: rgba(140,190,60,0.55); }
  .tab-btn[data-tab="past"].active { color: rgba(190,120,30,0.55); }
  .tab-btn::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 16px;
    right: 16px;
    height: 2px;
    background: rgba(58,48,40,0.15);
    opacity: 0;
    transition: opacity 0.05s ease;
  }
  .tab-btn.active::after {
    opacity: 1;
    transition: opacity 0.15s ease 0.2s;
  }
  .tab-btn[data-tab="upcoming"].active::after { background: rgba(140,190,60,0.15); }
  .tab-btn[data-tab="past"].active::after { background: rgba(190,120,30,0.15); }
  .tab-frame {
    display: none;
    background: transparent;
    border: none;
    padding: 0;
    position: relative;
    width: 100%; max-width: 380px;
    will-change: transform;
    transform-origin: top center;
  }
  .tab-frame.open, .tab-frame.opening, .tab-frame.closing { display: block; }
  /* SVG draws the entire pill+frame outline */
  .tab-frame-svg {
    position: absolute;
    left: 0;
    width: 100%;
    pointer-events: none;
    z-index: 2;
    overflow: visible;
    transition: opacity 0.2s ease;
  }
  .tab-frame.opening .tab-frame-svg { opacity: 0; }
  .tab-frame.opening.svg-ready .tab-frame-svg { opacity: 1; }
  .tab-frame.closing.svg-fade .tab-frame-svg { opacity: 0; }
  .tab-frame-content {
    position: relative;
    padding: 32px 13.5px 13.5px;
    z-index: 3;
    overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .tab-frame.closing .tab-frame-content {
    transition: max-height 0.32s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Section headers */
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600; letter-spacing: 0.22em;
    text-transform: uppercase; color: #A09888;
    width: 100%; max-width: 380px;
    padding: 0 4px; margin: 8px 0 0;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px;
    background: #C8C0B4;
  }
  .section-label:active { opacity: 0.7; }
  .section-label .section-count {
    font-weight: 400; opacity: 0.65;
  }
  .section-label .section-chevron {
    font-size: 12px; transition: transform 0.3s ease;
    display: inline-block; margin-left: -4px;
  }
  .section-label .section-chevron.open {
    transform: rotate(90deg);
  }
  .section-label.section-past { color: #BDB5A8; }
  .section-label.section-past::after { background: #D4CFC6; }
  .section-label.section-current { color: #B8501E; }
  .section-label.section-current::after { background: rgba(184,80,30,0.25); }
  .section-label.section-alerts { color: rgb(160,50,40); }
  .section-label.section-alerts::after { background: rgba(180,60,50,0.2); }

  /* Section body */
  .section-body {
    width: 100%; max-width: 380px;
    overflow: hidden;
    padding: 2px; margin: -2px;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .section-body.closing {
    transition: max-height 0.5s cubic-bezier(0.4, 0, 0.6, 1);
  }
  .section-body.collapsed {
    max-height: 0 !important;
  }

  @keyframes cascadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes cascadeOut {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-8px); }
  }
  .section-body.opening > .item-card,
  .section-body.opening > .alert-card,
  .section-body.opening > .date-marker {
    animation: cascadeIn 0.3s ease both;
  }
  .section-body.closing > .item-card,
  .section-body.closing > .alert-card,
  .section-body.closing > .date-marker {
    animation: cascadeOut 0.2s ease both;
  }
  .tab-frame.opening > .tab-frame-content > .item-card,
  .tab-frame.opening > .tab-frame-content > .date-marker {
    animation: cascadeIn 0.25s ease both;
  }

  /* Date markers */
  .date-marker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: #8C7830;
    padding: 18px 4px 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-body > .date-marker:first-child,
  .tab-frame-content > .date-marker:first-child {
    padding-top: 4px;
  }
  .date-marker .day-name {
    color: #B8A060; font-weight: 400;
  }
  .date-marker.is-today { color: #B8501E; }
  .date-marker.is-today .day-name { color: #D4845A; }
  .date-marker.is-past { color: #BDB5A8; }
  .date-marker.is-past .day-name { color: #C8C0B4; }

  /* Item cards — enw223 canvas-matched */
  .item-card {
    position: relative;
    background: rgba(216,226,233,0.55);
    border-radius: 19px;
    padding: 15px;
    margin-bottom: 10px;
    overflow: visible;
    transition: transform 0.15s ease, background 0.2s ease, border-radius 0.15s ease;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    will-change: transform;
  }
  .card-border-svg {
    position: absolute; top: -1px; left: -1px;
    pointer-events: none; z-index: 0; overflow: visible;
  }
  .item-card:active { transform: scale(0.985); }
  .item-card.is-expanded {
    background: transparent !important;
    margin-bottom: 0;
    border-radius: 0 !important; border-color: transparent !important;
  }
  .item-card.is-expanded > *:not(.card-border-svg) {
    position: relative; z-index: 2;
  }
  .item-card.is-done {
    background: rgba(64,127,190,0.22);
  }
  .item-card.is-past { background: rgba(216,226,233,0.3); }

  .item-meta-line {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 4px;
  }

  .class-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 1px 6px; border-radius: 4px;
    white-space: nowrap; flex-shrink: 0;
  }
  .cp-12ftx  { background: rgba(184,80,30,0.14); color: #9C4A1A; }
  .cp-enw223 { background: rgba(80,120,160,0.14); color: #3A6890; }
  .cp-flm223 { background: rgba(140,60,120,0.14); color: #8C3C78; }
  .cp-mus223 { background: rgba(60,130,100,0.14); color: #2A7A58; }
  .cp-mat223 { background: rgba(100,90,160,0.14); color: #5A50A0; }
  .cp-fcm112 { background: rgba(160,120,50,0.14); color: #8A6820; }

  /* Per-class card tints */
  .item-card.cp-12ftx  { background: rgba(184,80,30,0.08); }
  .item-card.cp-enw223 { background: rgba(80,120,160,0.08); }
  .item-card.cp-flm223 { background: rgba(140,60,120,0.08); }
  .item-card.cp-mus223 { background: rgba(60,130,100,0.08); }
  .item-card.cp-mat223 { background: rgba(100,90,160,0.08); }
  .item-card.cp-fcm112 { background: rgba(160,120,50,0.08); }
  .item-card.is-past.cp-12ftx  { background: rgba(184,80,30,0.04); }
  .item-card.is-past.cp-enw223 { background: rgba(80,120,160,0.04); }
  .item-card.is-past.cp-flm223 { background: rgba(140,60,120,0.04); }
  .item-card.is-past.cp-mus223 { background: rgba(60,130,100,0.04); }
  .item-card.is-past.cp-mat223 { background: rgba(100,90,160,0.04); }
  .item-card.is-past.cp-fcm112 { background: rgba(160,120,50,0.04); }

  .item-title {
    font-family: 'Nunito', sans-serif;
    font-size: 19px; font-weight: 400; color: rgba(43,64,95,0.6);
    line-height: 1.3;
  }
  .mini-progress {
    display: flex; align-items: center; margin-top: 6px;
    height: 8px;
  }
  .mini-progress-svg {
    height: 100%;
  }
  .is-done .item-title { font-style: italic; color: rgba(43,64,95,0.95); }
  .is-past .item-title { color: rgba(43,64,95,0.3); }

  .item-meta-line .type-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 400; letter-spacing: 0.08em;
    text-transform: uppercase; color: #A09888;
  }
  .item-meta-line .type-label.type-deadline { color: #B8501E; }
  .item-meta-line .type-label.type-assessment { color: #8C7830; }

  .status-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 1px 6px; border-radius: 4px;
    margin-left: auto;
  }
  .st-turned-in { background: rgba(55,130,65,0.12); color: rgb(38,91,45); }
  .st-assigned  { background: rgba(140,120,48,0.12); color: #8C7830; }
  .st-missing   { background: rgba(180,60,50,0.18); color: rgb(160,45,35); font-weight: 700; }

  /* Floating detail panel */
  .detail-panel {
    position: relative;
    width: 100%; max-width: 380px;
    opacity: 0; transform: translateY(-6px);
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), max-height 0.3s ease;
    max-height: 0; overflow: hidden;
    margin-top: 0;
  }
  .detail-panel.open {
    opacity: 1; transform: translateY(0);
    pointer-events: auto;
    max-height: 1200px;
  }

  .detail-pointer {
    display: none;
  }

  .detail-inner {
    background: transparent;
    border: none;
    border-radius: 0 0 18px 18px; padding: 16px 18px;
    position: relative; z-index: 2;
  }

  .detail-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 14px;
  }

  .detail-title {
    font-family: 'Nunito', sans-serif;
    font-size: 18px; font-weight: 700; color: #3A3028; line-height: 1.3;
  }

  .detail-desc {
    font-family: 'Nunito', sans-serif;
    font-size: 17px; font-weight: 400; color: #3A3028; line-height: 1.4;
    margin-bottom: 10px;
  }

  .detail-day {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: #A09888;
    white-space: nowrap; margin-left: 12px; margin-top: 5px;
  }

  .detail-section {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: #2B5F8A;
    margin-bottom: 14px; opacity: 0.7;
  }

  .detail-class-full {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 600; letter-spacing: 0.28em;
    text-transform: uppercase; color: #A09888;
    margin-bottom: 10px;
  }

  .detail-info {
    font-family: 'Nunito', sans-serif;
    font-size: 14px; color: #5A5045;
    line-height: 1.6; margin-bottom: 6px;
  }
  .detail-info strong {
    color: #3A3028; font-weight: 700;
  }

  .detail-source {
    font-family: 'Nunito', sans-serif;
    font-size: 13px; color: #6A6058;
    line-height: 1.5; margin-bottom: 10px;
    display: none;
  }
  .detail-source strong { color: #3A3028; font-weight: 700; }
  .detail-source a {
    color: #6A6058; text-decoration: underline;
    text-decoration-style: dashed; text-underline-offset: 3px;
  }

  /* Task canvas */
  .task-canvas-wrap {
    position: relative; margin: 10px 0 4px;
  }
  .task-canvas-wrap canvas {
    display: block; cursor: pointer; touch-action: pan-y;
    -webkit-user-select: none; user-select: none;
  }

  .task-progress-row {
    position: relative; margin-bottom: 10px;
    height: 26px;
  }
  .task-progress-svg {
    position: absolute; left: 0; top: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  .task-progress-circles {
    position: absolute; left: 0; top: 0; height: 100%;
    display: flex; align-items: center; gap: 8px;
  }
  .task-circle {
    width: 38px; height: 22px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    color: rgba(160,152,136,0.28);
    flex-shrink: 0;
    position: relative; z-index: 2;
    transition: color 0.35s ease, transform 0.15s ease;
    background: none; border: none;
    cursor: pointer;
  }
  .task-circle.is-done { color: #F5F3EE; }
  .task-circle.is-skip { color: rgb(126,105,28); }
  .task-circle.is-active { color: #C0707A; }
  .task-circle.is-next { color: rgba(192,112,122,0.45); }

  .task-detail-panel {
    position: absolute; left: 14px; right: 14px; z-index: 10;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease 0.08s;
    overflow: hidden;
  }
  .task-detail-panel.open { opacity: 1; pointer-events: auto; }

  .task-detail-inner {
    padding: 6px 2px 4px;
  }
  .task-detail-panel.is-locked .task-detail-inner {
    opacity: 0.45;
  }

  .task-detail-sep {
    border: none; border-top: 1.5px dashed rgba(160,150,140,0.25);
    margin: 14px 0 8px;
  }
  .task-detail-desc {
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 400; color: #5A5048;
    line-height: 1.5; margin-bottom: 6px;
  }
  .task-unlock-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 600; letter-spacing: 0.06em;
    color: rgba(180,60,50,0.55); margin-bottom: 10px;
  }
  .task-unlock-hint:empty { display: none; }
  .task-detail-bullets {
    list-style: none; margin: 8px 0 6px 0; padding: 10px 12px 10px 14px;
    background: rgba(107,140,168,0.15); border-radius: 12px;
  }
  .task-detail-bullets li {
    font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 400; color: #4A4540;
    line-height: 1.55; padding: 4px 0 4px 18px; position: relative;
  }
  .task-detail-bullets li::before {
    content: ""; position: absolute; left: 0; top: 13px;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--dot-color, #95AFC4);
  }
  .task-detail-deliverable { display: none; }
  .task-detail-actions { display: flex; gap: 10px; align-items: center; margin-top: 14px; }
  .task-detail-actions .action-btn { font-size: 11px; padding: 8px 16px; }
  .task-detail-actions .btn-pass {
    background: rgba(196,164,60,0.18); border: none; color: #9A7E1E;
    cursor: pointer; border-radius: 22px; transition: all 0.2s;
  }
  .task-detail-actions .btn-pass.is-passed { background: rgba(196,164,60,0.12); }
  .task-detail-actions .btn-close-task { display: none; }
  .task-detail-links { display: flex; gap: 10px; margin-top: 10px; }

  .task-hold-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase;
    color: #B8B0A4; text-align: center; margin-top: 6px;
  }

  .task-no-tasks {
    font-family: 'Nunito', sans-serif;
    font-size: 13px; color: #A09888; font-style: italic;
    margin: 6px 0;
  }

  .detail-actions {
    display: none;
  }

  .action-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 700; letter-spacing: 0.04em;
    text-transform: uppercase; border-radius: 22px;
    padding: 10px 20px; cursor: pointer;
    transition: all 0.2s ease; border: none;
    -webkit-tap-highlight-color: transparent; white-space: nowrap;
    text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
  }
  .action-btn:active { transform: scale(0.96); }

  .btn-classwork { background: #2B5F8A; color: #BFCFDB; }
  .btn-classwork:hover { background: #346A96; }

  .btn-close {
    display: none;
    background: rgba(160,150,140,0.15); color: #A09888;
    width: 36px; height: 36px; padding: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 400; letter-spacing: 0;
    text-transform: none; margin-left: auto; border-radius: 50%;
  }

  .btn-doc {
    background: none; border: 1.5px dashed rgba(160,150,140,0.35); color: #A09888;
    text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; border-radius: 8px; padding: 6px 14px;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-doc:active { color: #3A3028; border-color: rgba(100,90,80,0.5); }

  .detail-links {
    display: flex; gap: 10px; margin-top: 12px;
  }

  /* Alert cards */
  .alert-card {
    position: relative;
    background: rgba(255,248,240,0.55);
    background-clip: padding-box;
    border: 1px solid transparent;
    border-left: 3px solid rgb(180,60,50);
    border-radius: 18px;
    padding: 15px 15px 15px 14px;
    margin-bottom: 6px;

  "Coco-Inez-Penn-2026-AS2.3-Representation-Student-Assessment-Instructions-and-cov": {
    "what_to_do": "Your task is to explore how a specific group is represented (as a stereotype) in horror films. You can choose a different group and medium if you get approval from your teacher.\n\nYou will do this by:\n*   Showing how media texts represent the group.\n*   Describing the features of the media texts that create this representation.\n*   Providing specific evidence from the texts.\n*   Explaining the effect of the representation.\n\nThis is a two-part assessment. You need to complete a [visual diary](https://docs.google.com/document/d/1K5-Ro1MzUuKUGHXXzZ3PbAnYQfcIhRoHYsj0-0XyFWU/edit?usp=sharing) and then present your findings either as a [narrated visual sequence](https://docs.google.com/document/d/1K5-Ro1MzUuKUGHXXzZ3PbAnYQfcIhRoHYsj0-0XyFWU/edit?usp=sharing), a [written report](https://docs.google.com/document/d/1K5-Ro1MzUuKUGHXXzZ3PbAnYQfcIhRoHYsj0-0XyFWU/edit?usp=sharing), or by submitting your [visual diary notes](https://docs.google.com/document/d/1K5-Ro1MzUuKUGHXXzZ3PbAnYQfcIhRoHYsj0-0XyFWU/edit?usp=sharing) directly.",
    "requirements": "*   **Achievement:**\n    *   Select at least three media texts that represent your chosen group.\n    *   Describe how the media texts represent the group.\n    *   Describe the features of the media texts that create the representation.\n    *   Describe the effect of the media representation, using evidence.\n*   **Merit:** All Achievement requirements, plus:\n    *   Describe reasoned explanations for the *effect(s)* of the representation.\n    *   Explain reasons for differences between the representation and reality.\n    *   Explain reasons for the stereotypes, messages, or values created.\n*   **Excellence:** All Achieved and Merit requirements, plus:\n    *   Examine the likely consequences of the representation.\n    *   Draw conclusions about the media's presentation of the group, including implications of differences from reality, effectiveness of stereotypes, and issues related to omissions or creator's worldview.\n\nYou **must** answer the first 5 questions (yellow highlighted) for each text to achieve.",
    "tips": "*   Use your [visual diary](https://docs.google.com/document/d/1K5-Ro1MzUuKUGHXXzZ3PbAnYQfcIhRoHYsj0-0XyFWU/edit?usp=sharing) to keep notes, videos, pictures, screenshots, and links.\n*   Focus your notes on the provided questions, but feel free to add your own ideas.\n*   Some questions may overlap; you don't need to answer them identically multiple times.\n*   You do not need to answer all Merit or Excellence questions to achieve those grades, but you must answer all Achieved questions.\n*   For your final presentation, ensure your visuals (screenshots) support your discussion.\n*   Your [visual diary](https://docs.google.com/document/d/1K5-Ro1MzUuKUGHXXzZ3PbAnYQfcIhRoHYsj0-0XyFWU/edit?usp=sharing) is mandatory for everyone.\n*   Consider research from interviews with actors/directors, critic reviews, and statistics.",
    "html_path": "analysis/Coco-Inez-Penn-2026-AS2.3-Representation-Student-A__Coco-Inez-Penn-2026-AS2.3-Representation-Student-Assessment-Instructions-and-cov.html"
  },
  "Film-223-Genre-study-horror-2026-PBT": {
    "what_to_do": "This lesson is asking you to learn about the horror genre, its history, and its key elements. You will also analyze specific films and discuss important concepts like the \"Final Girl\" trope, representation, and whiteness.\n\n*   Complete the [starter activities](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3bc2159e986_0_5) on [Page 3](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3bc2159e986_0_5).\n*   Participate in [Pair Share](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3aba3f1f7e8_0_240#slide=id.g3aba3f1f7e8_0_240) activities throughout the lessons.\n*   Answer questions on your [whiteboard](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3bc2159e986_0_13#slide=id.g3bc2159e986_0_13) when prompted.\n*   Complete the [Getting to know you questionnaire](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3bc2159e986_0_0#slide=id.g3bc2159e986_0_0) on Google Classroom.\n*   Watch and analyze films like [The Babadook](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3c34d7b39b5_0_24#slide=id.g3c34d7b39b5_0_24), [Hereditary](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3c64ae18e2c_0_0#slide=id.g3c64ae18e2c_0_0), and [Get Out](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3c64ae18e2c_0_25#slide=id.g3c64ae18e2c_0_25).\n*   Complete the [Assessment Task - Horror Film Analysis](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3aba3f1f7e8_0_370#slide=id.g3aba3f1f7e8_0_370) by Term 3, Week 5.\n*   Read and highlight the [article on representation of PoC in slasher films](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g395ab2890f4_0_5#slide=id.g395ab2890f4_0_5).\n*   Complete the [sentence level work](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3cb3b54c8d3_0_88#slide=id.g3cb3b54c8d3_0_88) on whiteness and the \"Final Girl.\"\n*   Discuss and answer questions on the [Good for Her trope](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3aba3f1f7e8_0_1551#slide=id.g3aba3f1f7e8_0_1551) and the changing ideas around sex and survival in horror.",
    "requirements": "*   Understand and identify the [codes and conventions](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3aba3f1f7e8_0_267#slide=id.g3aba3f1f7e8_0_267) of the horror genre.\n*   Analyze how these codes and conventions are used in specific horror films.\n*   Understand the history and evolution of the [Final Girl trope](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g32af8d24156_0_1804#slide=id.g32af8d24156_0_1804).\n*   Discuss the representation of women, whiteness, and other identities in horror films.\n*   Complete the [Horror Film Analysis assessment](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3aba3f1f7e8_0_370#slide=id.g3aba3f1f7e8_0_370) to a high standard.\n*   Follow [class expectations](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3aba3f1f7e8_0_66#slide=id.g3aba3f1f7e8_0_66) regarding participation and conduct.\n*   Meet all [assessment deadlines](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g32af8d24156_0_1023#slide=id.g32af8d24156_0_1023).",
    "tips": "*   Use the [symbols on the slides](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3c34d7b39b5_0_38#slide=id.g3c34d7b39b5_0_38) to understand what to do on each page.\n*   When asked to use your whiteboard, be ready to write quickly and clearly.\n*   Pay attention during [Pair Share](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3aba3f1f7e8_0_240#slide=id.g3aba3f1f7e8_0_240) activities; they help you learn from your classmates.\n*   Take notes in your [workbook or digitally](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3aba3f1f7e8_0_310#slide=id.g3aba3f1f7e8_0_310) during film analysis and discussions.\n*   [Track your deadlines](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g32af8d24156_0_1023#slide=id.g32af8d24156_0_1023) carefully. It's important for managing your schoolwork.\n*   Don't be afraid to [ask for help](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3aba3f1f7e8_0_66#slide=id.g3aba3f1f7e8_0_66). Your teacher is there to support you.\n*   The page about [Conjunctions and Clauses](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g32af8d24156_0_1872#slide=id.g32af8d24156_0_1872) and [Subordinating Conjunctions](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3c0911bc363_0_0#slide=id.g3c0911bc363_0_0) can help you write better sentences for your analysis.\n*   Use the [film recommendations](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g32af8d24156_0_1825#slide=id.g32af8d24156_0_1825) to help you understand the \"Final Girl\" trope better.\n*   When considering \"Whiteness and setting\" on [Page 121](https://docs.google.com/presentation/d/1Z3vBJJfuhCPKCPXzjt_K7GmCW1nK4Z-m327c-S2_TV0/edit?slide=id.g3cb3b54c8d3_0_60#slide=id.g3cb3b54c8d3_0_60), think about why certain places feel scarier.",

  "L1-[2026]-Investigate-an-Aspect-of-New-Zealand-Music": {
    "what_to_do": "*   You need to investigate an aspect of New Zealand music.\n*   You will create a presentation to share your findings.\n*   You are responsible for choosing your own research focus.",
    "requirements": "*   Research and analyze an aspect of NZ music.\n*   Present your findings clearly and engagingly.\n*   Show a deep understanding by making connections and evaluating significance.\n*   Use credible sources and reference them correctly.\n*   Explain how your topic adds to the diversity of the NZ music scene.\n*   Provide broad perspectives, including your own interpretation.\n*   Develop and answer a strong research question to guide your investigation.",

  "Welcome-to-MUS223": {
    "what_to_do": "You will be assessed on four different music standards:\n*   **Solo Performance:** Perform two substantial pieces of music as a featured soloist.\n*   **Group Performance:** Demonstrate ensemble skills by performing a substantial piece of music as a member of a group.\n*   **Composition:** Compose two substantial pieces of music.\n*   **Investigate an Aspect of New Zealand Music:** Investigate an aspect of New Zealand music.",
    "requirements": "*   **Solo Performance:**\n    *   Perform two substantial pieces as a featured soloist.\n    *   Pieces should be 4-5 minutes long, musically and technically complex.\n    *   Demonstrate technical, musical, and presentation skills.\n    *   Live presentation to an audience.\n*   **Group Performance:**\n    *   Perform a substantial piece as a member of a group (3-7 members recommended).\n    *   Contribute to the group's cohesion, balance, intonation, feel, style, and accuracy.\n    *   Demonstrate confidence, consistency, and musical responsiveness.\n    *   Piece should be 4-6 minutes long, with significance and complexity.\n*   **Composition:**\n    *   Compose two substantial pieces of music, each at least two minutes in length.\n    *   Musical ideas should be skilfully developed and structured.\n    *   Demonstrate understanding of idiomatic writing, effective use of scales/modes, and compositional devices.\n    *   Structure ideas into a coherent whole with a clear beginning, middle, and end.\n    *   Ability to create and maintain a sense of style.\n    *   Can be solo or group composition (2-5 students for group).\n*   **Investigate an Aspect of New Zealand Music:**\n    *   Conduct an investigation into an aspect of New Zealand music.\n    *   This could be a musical style, genre, historical period, music industry, advocacy group, funding agency, musician, performing group, or festival/competition.\n    *   Presentation can include written assignments, seminars, documentaries, websites, PowerPoints, or static displays.",
    "tips": "*   **Music Ambassadors:** Consider your skills and ideas for leading clubs or strengthening the music community.\n*   **Solo Performance:**\n    *   Choose pieces that showcase your best skills and that you will enjoy practicing.\n    *   Practice regularly (aim for at least 20 minutes a day).\n    *   Practice performing in front of classmates.\n    *   Bring a copy of your score or a link to a performance of your piece.\n    *   A quality performance is assured, stylistically appropriate, musically expressive, demonstrates interpretive understanding, has appropriate body language, and is introduced by you.\n*   **Group Performance:**\n    *   Make the most of class rehearsal time and organize extra rehearsals if needed.\n    *   Bring a copy of your score or a link to a performance of your piece.\n    *   Quality performance includes enthusiastic interaction, musical responsiveness, awareness of space and audience, self-assurance, fluency, and an appropriate piece.\n*   **Composition:**\n    *   Engage in regular feedback and re-work your compositions.\n    *   Keep good records of your drafts and process.\n    *   Submit both visual representations (e.g., notation, lead sheet) and audio recordings.\n    *   For group composition, ensure your contribution can be verified (e.g., annotations, diary entries).\n*   **Investigate an Aspect of New Zealand Music:**\n    *   Your investigation should include a chronological overview, background profile, significant musical characteristics, and an evaluation of significance.\n    *   Presentation can include elements like performance, music videos, or annotated scores.",
    "html_path": "analysis/Welcome-to-MUS223__Welcome-to-MUS223.html"
  },
  "Info-about-MAT223-for-2026": {
    "what_to_do": "This course, MAT223 Te Ara P\u0101ngarau, is designed to be flexible. You will choose your own learning methods and standards, and work at your own pace. You will also sit assessments when you feel ready. Your teacher will act as a mentor, helping you plan your work, with difficult questions, and providing feedback.",
    "requirements": "*   You need to pass at least **four achievement standards** this year.\n*   Ensure you meet the [prerequisites](https://docs.google.com/presentation/d/1a67JwSK6dIK8SPvKoJSB9lfYW-KItzQ3a3U6Y4s-oig/edit?slide=id.g701e6895cd_0_0) for the courses you want to take in Year 13.\n*   If you haven't met the 'numeracy' requirement of NCEA, talk to your teacher.\n*   Year 12 students should focus on Level 2 standards, but two Level 3 standards are also available.\n*   You can only [resubmit](https://docs.google.com/presentation/d/1a67JwSK6dIK8SPvKoJSB9lfYW-KItzQ3a3U6Y4s-oig/edit?slide=id.g473f99fbc9_0_135) an internal assessment to change a 'Not Achieved' grade to 'Achieved'.",
    "tips": "*   You are in control of your learning and can work at your own pace.\n*   Teachers will act as mentors, guiding you through the course.\n*   It's important to discuss with your teacher if you want to do a standard at a higher level, as it might make getting endorsements harder.\n*   Remember to bring your [laptop](https://www.warehousestationery.co.nz/product/W2684953.html), [headphones](https://www.come-here.co.nz/), pens, pencil, and calculator to every lesson.",
    "html_path": "analysis/Info-about-MAT223-for-2026__Info-about-MAT223-for-2026.html"
  }

<script>
// Dev flag: ?reset clears all task progress from localStorage
if (new URLSearchParams(location.search).has('reset')) {
  const cleared = Object.keys(localStorage).filter(k => k.startsWith('dates-tasks-'));
  cleared.forEach(k => localStorage.removeItem(k));
  console.log(`[reset] Cleared ${cleared.length} task progress keys`);
  history.replaceState(null, '', location.pathname);
  location.reload();
}

const _now = new Date();
const TODAY = new Date(_now.getFullYear(), _now.getMonth(), _now.getDate());
const TODAY_STR = TODAY.toISOString().slice(0, 10);

// CLASSES, RAW, ANALYSIS, ANOMALIES loaded from dates_data.js

function sourceUrl(cls, source) {
  if (!source || !ANALYSIS[source]) return null;
  return ANALYSIS[source].html_path || null;
}


// Deduplicate
function dedup(items) {
  const key = (it) => it.cls + '|' + it.date;
  const groups = {};
  items.forEach(it => { const k = key(it); if (!groups[k]) groups[k] = []; groups[k].push(it); });
  const result = [];
  Object.values(groups).forEach(g => {
    if (g.length === 1) { result.push(g[0]); return; }
    const dominated = new Set();
    for (let i = 0; i < g.length; i++) {
      for (let j = 0; j < g.length; j++) {
        if (i === j) continue;
        const ti = g[i].title.toLowerCase().replace(/[^a-z0-9]/g, '');
        const tj = g[j].title.toLowerCase().replace(/[^a-z0-9]/g, '');
        if (ti.includes(tj) || tj.includes(ti)) {
          const scoreI = (g[i].status ? 10 : 0) + g[i].title.length;
          const scoreJ = (g[j].status ? 10 : 0) + g[j].title.length;
          dominated.add(scoreI >= scoreJ ? j : i);
        }
      }
    }
    g.forEach((it, idx) => { if (!dominated.has(idx)) result.push(it); });
  });
  return result;
}

const ITEMS = dedup(RAW);

// Class filter state — empty set means "show all"
let activeClassFilters = new Set();

function filteredItems(items) {
  if (activeClassFilters.size === 0) return items;
  return items.filter(it => activeClassFilters.has(it.cls));
}

// Format helpers
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAYS_S = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function fmtDate(ds) {
  const [y,m,d] = ds.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return `${DAYS_S[dt.getDay()]} ${d} ${MONTHS[m-1]}`;
}

function fmtDateLong(ds) {
  const [y,m,d] = ds.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return `${DAYS[dt.getDay()]} ${d} ${MONTHS[m-1]} ${y}`;
}

function isToday(ds) { return ds === TODAY_STR; }

function daysUntil(ds) {
  const [y,m,d] = ds.split('-').map(Number);
  return Math.round((new Date(y, m-1, d) - TODAY) / 86400000);
}

function typeIcon(type) {
  switch(type) {
    case 'deadline': return '\u25C9';
    case 'assignment': return '\u25A3';
    case 'assessment': return '\u25C6';
    case 'event': return '\u25CB';
    case 'material': return '\u25E6';
    default: return '\u00B7';
  }
}

function statusBadgeHTML(status) {
  if (!status) return '';
  const cls = status === 'Turned in' ? 'st-turned-in' : status === 'Missing' ? 'st-missing' : 'st-assigned';
  return `<span class="status-badge ${cls}">${status}</span>`;
}

function urgencyLabel(days) {
  if (days === 0) return 'today';
  if (days === 1) return 'tomorrow';
  if (days <= 14) return `${days} days`;
  if (days < 21) {
    const extra = days - 14;
    return `2 weeks ${extra} day${extra !== 1 ? 's' : ''}`;
  }
  const w = Math.round(days / 7);
  if (days <= 42) return `${w} weeks`;
  const m = Math.round(days / 30);
  if (m === 1) return '1 month';
  if (m < 12) return `${m} months`;
  return '';
}

function itemId(it) {
  return (it.cls + '-' + it.date + '-' + it.title).replace(/[^a-zA-Z0-9]/g, '_').substring(0, 80);
}

function fmtSource(src) {
  if (!src) return null;
  return src.replace(/[-_]/g, ' ').replace(/\s+/g, ' ').trim();
}

// State
let alertsCollapsed = true;
let activeTab = null; // null = both closed, 'past' or 'upcoming'
let expandedId = null;

// ── Canvas-based task rendering (exact duplicate of task_template.html) ──

// Accent colors per class code — matches classroom_tasks.py CLASS_CONFIG
const CLASS_ACCENTS = {
  '12FTX':  [184, 80, 30],
  'FLM223': [138, 58, 150],
  'ENW223': [43, 95, 138],
  'FCM112': [160, 120, 50],
  'MAT223': [50, 140, 120],
  'MUS223': [180, 70, 70],
};

// Derive full color palette from accent RGB (mirrors derive_colors in classroom_tasks.py)
function deriveColors(accent) {
  const [r, g, b] = accent;
  const mix = (c, t, f) => Math.round(c + (t - c) * f);
  return {
    STROKE: `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`,
    FILL_UNDONE: [mix(r,255,0.82), mix(g,255,0.82), mix(b,255,0.82), 0.55],
    FILL_DONE: [mix(r,255,0.1), mix(g,255,0.2), mix(b,255,0.45), 0.22],
    FILL_SOLID: [r, g, b],
    TEXT_BASE: [r, Math.max(Math.round(g * 0.68), 10), Math.max(Math.round(b * 0.69), 10)],
    STROKE_TARGET: [Math.max(Math.round(r * 0.7), 5), Math.max(Math.round(g * 0.68), 5), Math.max(Math.round(b * 0.72), 5)],
    ACCENT_RGB: [r, g, b],
    ACCENT_HEX: `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`,
    MID_HEX: `#${mix(r,255,0.5).toString(16).padStart(2,'0')}${mix(g,255,0.5).toString(16).padStart(2,'0')}${mix(b,255,0.5).toString(16).padStart(2,'0')}`,
    LIGHT_HEX: `#${mix(r,255,0.7).toString(16).padStart(2,'0')}${mix(g,255,0.7).toString(16).padStart(2,'0')}${mix(b,255,0.7).toString(16).padStart(2,'0')}`,
  };
}

// Unified task canvas palette — cohesive across all classes (dusty pink active)
const TASK_COLORS = {
  STROKE: '#C0707A',
  FILL_UNDONE: [232, 200, 206, 0.6],
  FILL_DONE: [200, 145, 155, 0.25],
  FILL_SOLID: [192, 110, 120],
  TEXT_BASE: [120, 55, 62],
  STROKE_TARGET: [140, 65, 72],
  ACCENT_RGB: [192, 110, 120],
  ACCENT_HEX: '#C0707A',
  MID_HEX: '#D4A0A6',
  LIGHT_HEX: '#E2BCC0',
};

// Active TaskCanvas instances keyed by panelId
const taskCanvases = {};

function recalcPanelSection(panelId) {
  const panel = document.getElementById('panel-' + panelId);
  if (panel) {
    const body = panel.closest('.section-body') || panel.closest('.tab-frame-content') || panel.closest('.current-content');
    if (body) { body.style.transition = 'none'; body.style.maxHeight = body.scrollHeight + 'px'; body.offsetHeight; body.style.transition = ''; }
  }
}

// TaskCanvas: self-contained canvas with inline-expand detail
function TaskCanvas(wrapEl, tasks, storageKey, colors, panelId) {
  const self = this;
  const PASS_STROKE = '#C4A43C';
  const FINAL_STROKE = '#C49A3C';

  const N = tasks.length;
  const CH = 78, DONE_CH = 38, GAP = 6, R = 18, DONE_R = 12, SW = 1.8, II = SW / 2;
  const CW = Math.min(340, wrapEl.offsetWidth || 340);

  const _SR = colors.ACCENT_RGB[0], _SG = colors.ACCENT_RGB[1], _SB = colors.ACCENT_RGB[2];
  const _TR = colors.TEXT_BASE[0], _TG = colors.TEXT_BASE[1], _TB = colors.TEXT_BASE[2];
  const _STR = colors.STROKE_TARGET[0], _STG = colors.STROKE_TARGET[1], _STB = colors.STROKE_TARGET[2];

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const DPR = window.devicePixelRatio || 1;
  wrapEl.querySelector('.tc-canvas-slot').appendChild(canvas);

  let selectedIdx = -1;
  let expandIdx = -1; // which cell currently has expand height (may differ from selectedIdx during collapse)
  let expandH = 0, expandTarget = 0; // animated expand height
  let collapseIdx = -1, collapseH = 0, collapseH0 = 0; // second slot: old task collapsing while new expands

  // textBtm: Y offset from cell top where text ends (for detail panel positioning)
  let cells = Array.from({ length: N }, (_, i) => ({
    done: false, passed: false, homeY: 0, textBtm: CH,
    fillOp: 0, strokeOp: 0.25, divotFrac: 0, textFade: 0, doneH: CH,
  }));
  let solidFrac = 0, tgtSolid = 0;
  let raf = null;
  let tgt = cells.map(() => ({ fillOp: 0, strokeOp: 0.25, divotFrac: 0, textFade: 0, doneH: CH }));

  // Dynamic layout — cell height includes expand area
  // Base cell height accounts for text wrapping
  function baseCellH(idx) {
    const fullH = Math.max(CH, cells[idx].textBtm + 14);
    const dh = cells[idx].doneH;
    // Animate between full height and compact done height
    if (dh < fullH - 1) return Math.round(dh);
    return fullH;
  }
  function cellH(idx) {
    let h = baseCellH(idx);
    if (idx === expandIdx) h += expandH;
    if (idx === collapseIdx) h += collapseH;
    return h;
  }

  function computeLayout() {
    let y = 0, first = true;
    for (let i = 0; i < N; i++) {
      if (!isVisible(i)) { cells[i].homeY = -9999; continue; }
      const h = cellH(i);
      if (h < 0.5) { cells[i].homeY = y; continue; }
      if (!first) {
        // Fade GAP proportionally for shrinking cells
        const gapFrac = i === fadingOutTemp ? Math.min(h / DONE_CH, 1) : 1;
        y += GAP * gapFrac;
      }
      cells[i].homeY = y;
      y += h;
      first = false;
    }
  }

  function totalH() {
    let h = 0, first = true;
    for (let i = 0; i < N; i++) {
      if (!isVisible(i)) continue;
      const ch = cellH(i);
      if (ch < 0.5) continue;
      if (!first) {
        const gapFrac = i === fadingOutTemp ? Math.min(ch / DONE_CH, 1) : 1;
        h += GAP * gapFrac;
      }
      h += ch; first = false;
    }
    return h;
  }

  function resizeCanvas() {
    const th = totalH();
    canvas.width = CW * DPR;
    canvas.height = th * DPR;
    canvas.style.width = CW + 'px';
    canvas.style.height = th + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    wrapEl.style.minHeight = (th + 20) + 'px';
  }

  function isLocked(idx) {
    const reqs = tasks[idx].requires;
    if (!reqs || reqs.length === 0) return false;
    return reqs.some(r => r !== idx && !cells[r].done && !cells[r].passed);
  }
  function pendingDeps(idx) {
    const reqs = tasks[idx].requires;
    if (!reqs) return [];
    return reqs.filter(r => r !== idx && !cells[r].done && !cells[r].passed);
  }
  // Temporarily revealed tasks (via pill click)
  let tempVisibleIdx = -1;
  let fadingOutTemp = -1; // old temp cell still visible during shrink animation

  // Is this task visible? Show: done, passed, unlocked, next-locked, or temp-revealed
  function isVisible(idx) {
    if (idx === tempVisibleIdx) return true;
    if (idx === fadingOutTemp) return true;
    if (cells[idx].done || cells[idx].passed) return true;
    if (!isLocked(idx)) return true; // unlocked
    // Locked — check if all pending deps are unlocked (directly next)
    const deps = pendingDeps(idx);
    return deps.length > 0 && deps.every(d => !isLocked(d));
  }

  function doneCount() { return cells.filter(c => c.done).length; }
  function passCount() { return cells.filter(c => c.passed).length; }
  function updateCounter() {
    const circleEls = wrapEl.querySelectorAll('.task-circle');
    circleEls.forEach((el, i) => {
      el.classList.remove('is-done', 'is-skip', 'is-active', 'is-next');
      if (cells[i].done) el.classList.add('is-done');
      else if (cells[i].passed) el.classList.add('is-skip');
      else if (!isLocked(i)) el.classList.add('is-active');
      else if (isVisible(i)) el.classList.add('is-next');
    });
    // Draw SVG blobs
    drawProgressSvg();
  }

  function drawProgressSvg() {
    const svg = wrapEl.querySelector('.task-progress-svg');
    if (!svg) return;
    const circleEls = wrapEl.querySelectorAll('.task-circle');
    if (circleEls.length === 0) return;
    const row = wrapEl.querySelector('.task-progress-row');
    const rowRect = row.getBoundingClientRect();
    const W = rowRect.width, H = rowRect.height;
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

    // Get center X of each pill relative to the row
    const cx = [];
    circleEls.forEach(el => {
      const r = el.getBoundingClientRect();
      cx.push(r.left + r.width / 2 - rowRect.left);
    });
    const PW = 38; // pill width
    const PH = 22; // pill height
    const PR = PH / 2; // end-cap radius (fully rounded ends)
    const DIVOT = 0; // divot depth inward (0 = smooth)
    const DIVOT_W = 0; // divot half-width
    const CY = H / 2;

    let paths = '';
    const unlocked = cells.map((c, i) => !c.done && !c.passed && !isLocked(i));

    // Individual pill path helper
    function pillPath(x, y, w, h, r) {
      const hw = w / 2;
      return `M ${x - hw + r} ${y - h/2}` +
        ` L ${x + hw - r} ${y - h/2}` +
        ` A ${r} ${r} 0 0 1 ${x + hw - r} ${y + h/2}` +
        ` L ${x - hw + r} ${y + h/2}` +
        ` A ${r} ${r} 0 0 1 ${x - hw + r} ${y - h/2} Z`;
    }

    // Build runs
    let i = 0;
    while (i < N) {
      if (cells[i].done) {
        let j = i;
        while (j < N && cells[j].done) j++;
        if (j - i === 1) {
          // Solo done pill
          paths += `<path data-pill="${i}" d="${pillPath(cx[i], CY, PW, PH, PR)}" fill="rgba(90,155,145,0.75)" stroke="rgba(60,130,118,0.85)" stroke-width="1.5" style="transform-origin:${cx[i]}px ${CY}px"/>`;
        } else {
          // Merged blob: from left edge of first pill to right edge of last
          const lx = cx[i] - PW / 2; // left edge
          const rx = cx[j - 1] + PW / 2; // right edge
          const ty = CY - PH / 2, by = CY + PH / 2;
          let d = `M ${lx + PR} ${ty}`;
          // Top edge with divots between each pair
          for (let k = i; k < j - 1; k++) {
            const mid = (cx[k] + cx[k + 1]) / 2;
            d += ` L ${mid - DIVOT_W} ${ty}`;
            d += ` Q ${mid} ${ty + DIVOT} ${mid + DIVOT_W} ${ty}`;
          }
          d += ` L ${rx - PR} ${ty}`;
          // Right cap
          d += ` A ${PR} ${PR} 0 0 1 ${rx - PR} ${by}`;
          // Bottom edge with divots (right to left)
          for (let k = j - 2; k >= i; k--) {
            const mid = (cx[k] + cx[k + 1]) / 2;
            d += ` L ${mid + DIVOT_W} ${by}`;
            d += ` Q ${mid} ${by - DIVOT} ${mid - DIVOT_W} ${by}`;
          }
          d += ` L ${lx + PR} ${by}`;
          // Left cap
          d += ` A ${PR} ${PR} 0 0 1 ${lx + PR} ${ty} Z`;
          const mergedIds = Array.from({length: j - i}, (_, k) => i + k).join(',');
          const mergedCx = (cx[i] + cx[j - 1]) / 2;
          paths += `<path data-pills="${mergedIds}" d="${d}" fill="rgba(90,155,145,0.75)" stroke="rgba(60,130,118,0.85)" stroke-width="1.5" style="transform-origin:${mergedCx}px ${CY}px"/>`;
        }
        i = j;
      } else {
        let fill, stroke;
        if (cells[i].passed) {
          fill = 'rgba(180,150,40,0.2)'; stroke = 'rgba(180,150,40,0.5)';
        } else if (unlocked[i]) {
          fill = 'rgba(215,160,168,0.55)'; stroke = 'rgba(192,110,120,0.65)';
        } else if (isVisible(i)) {
          // Next-locked — lighter pink
          fill = 'rgba(215,160,168,0.18)'; stroke = 'rgba(192,110,120,0.25)';
        } else {
          fill = 'rgba(236,234,227,0.4)'; stroke = 'rgba(160,150,140,0.15)';
        }
        paths += `<path data-pill="${i}" d="${pillPath(cx[i], CY, PW, PH, PR)}" fill="${fill}" stroke="${stroke}" stroke-width="1.5" style="transform-origin:${cx[i]}px ${CY}px"/>`;
        i++;
      }
    }
    svg.innerHTML = paths;
  }

  function recalcTargets() {
    tgtSolid = cells.every(c => c.done || c.passed) ? 1 : 0;
    cells.forEach((cell, i) => {
      const compact = cell.done || cell.passed;
      tgt[i].fillOp = compact ? 1.0 : 0;
      tgt[i].strokeOp = compact ? 1.0 : 0.25;
      tgt[i].textFade = cell.done ? 1.0 : 0;
      tgt[i].doneH = compact ? DONE_CH : CH;
      tgt[i].divotFrac = (i < N - 1 && cell.done && cells[i + 1].done) ? 1 : 0;
    });
  }

  function saveLS() {
    const s = {};
    cells.forEach((c, i) => {
      if (c.done) s[tasks[i].id] = 'done';
      else if (c.passed) s[tasks[i].id] = 'passed';
    });
    localStorage.setItem(storageKey, JSON.stringify(s));
    refreshMiniProgress();
  }

  function loadLS() {
    try {
      const s = JSON.parse(localStorage.getItem(storageKey)) || {};
      cells.forEach((c, i) => {
        const v = s[tasks[i].id];
        if (v === true || v === 'done') { c.done = true; c.fillOp = 1; c.strokeOp = 1; c.textFade = 1; c.doneH = DONE_CH; }
        else if (v === 'passed') { c.passed = true; c.fillOp = 1; c.strokeOp = 1; c.doneH = DONE_CH; }
      });
      cells.forEach((c, i) => { if (i < N - 1 && c.done && cells[i + 1].done) c.divotFrac = 1; });
      if (cells.every(c => c.done || c.passed)) solidFrac = 1;
    } catch {}
  }

  // Color helpers
  function fillColour(fillOp) {
    const [r0,g0,b0,a0] = colors.FILL_DONE;
    const [rs,gs,bs] = colors.FILL_SOLID;
    const r = Math.round(r0 + (rs-r0)*solidFrac);
    const g = Math.round(g0 + (gs-g0)*solidFrac);
    const b = Math.round(b0 + (bs-b0)*solidFrac);
    const a = (a0 + (1-a0)*solidFrac) * fillOp;
    return `rgba(${r},${g},${b},${a.toFixed(3)})`;
  }
  function textColour(alpha) {
    const r = Math.round(_TR + (255-_TR)*solidFrac);
    const g = Math.round(_TG + (255-_TG)*solidFrac);
    const b = Math.round(_TB + (255-_TB)*solidFrac);
    return `rgba(${r},${g},${b},${alpha.toFixed(3)})`;
  }
  function strokeColour(op) {
    const r = Math.round(_SR + (_STR-_SR)*solidFrac);
    const g = Math.round(_SG + (_STG-_SG)*solidFrac);
    const b = Math.round(_SB + (_STB-_SB)*solidFrac);
    return `rgba(${r},${g},${b},${op.toFixed(3)})`;
  }
  function finalTextColour(alpha) {
    const r = Math.round(156 + (255-156)*solidFrac);
    const g = Math.round(122 + (235-122)*solidFrac);
    const b = Math.round(30 + (180-30)*solidFrac);
    return `rgba(${r},${g},${b},${alpha.toFixed(3)})`;
  }

  // Dashed border drawn per-side so dashes stay static during expand/collapse.
  // Each side's dash pattern is anchored independently — vertical sides grow
  // downward with new dashes appearing at the bottom.
  function dashedBorder(y, h, strokeStyle, alpha) {
    const x0=II, y0=y+II, x1=CW-II, y1=y+h-II, r=R-II;
    ctx.setLineDash([6, 4]); ctx.strokeStyle = strokeStyle;
    ctx.lineWidth = SW; ctx.globalAlpha = alpha;
    // Top: left-arc + edge + right-arc (fixed)
    ctx.beginPath();
    ctx.moveTo(x0, y0+r); ctx.quadraticCurveTo(x0, y0, x0+r, y0);
    ctx.lineTo(x1-r, y0); ctx.quadraticCurveTo(x1, y0, x1, y0+r);
    ctx.stroke();
    // Right edge: top→bottom (anchored from top, grows down)
    ctx.beginPath(); ctx.moveTo(x1, y0+r); ctx.lineTo(x1, y1-r); ctx.stroke();
    // Bottom: right-arc + edge + left-arc (fixed length, moves down)
    ctx.beginPath();
    ctx.moveTo(x1, y1-r); ctx.quadraticCurveTo(x1, y1, x1-r, y1);
    ctx.lineTo(x0+r, y1); ctx.quadraticCurveTo(x0, y1, x0, y1-r);
    ctx.stroke();
    // Left edge: top→bottom (anchored from top, grows down)
    ctx.beginPath(); ctx.moveTo(x0, y0+r); ctx.lineTo(x0, y1-r); ctx.stroke();
    ctx.globalAlpha = 1; ctx.setLineDash([]);
  }

  // Paths — rrPath accepts variable height and optional radius
  function rrPath(y, h, rOverride) {
    h = h || CH;
    const x0=II, y0=y+II, x1=CW-II, y1=y+h-II, r=Math.min((rOverride || R)-II, (h-SW)/2);
    const p = new Path2D();
    p.moveTo(x0+r, y0);
    p.lineTo(x1-r, y0); p.quadraticCurveTo(x1, y0, x1, y0+r);
    p.lineTo(x1, y1-r); p.quadraticCurveTo(x1, y1, x1-r, y1);
    p.lineTo(x0+r, y1); p.quadraticCurveTo(x0, y1, x0, y1-r);
    p.lineTo(x0, y0+r); p.quadraticCurveTo(x0, y0, x0+r, y0);
    p.closePath(); return p;
  }

  function mergedPathV(ytop, ybot, joins) {
    const DF = 18, DC = 8;
    const lx=II, rx=CW-II, ty=ytop+II, by=ybot-II, r=R-II;
    const p = new Path2D();
    p.moveTo(lx+r, ty);
    p.lineTo(rx-r, ty); p.quadraticCurveTo(rx, ty, rx, ty+r);
    joins.forEach(({ jy, frac }) => {
      const f = DF*frac, c = DC*frac;
      p.lineTo(rx, jy-c); p.quadraticCurveTo(rx-f, jy, rx, jy+c);
    });
    p.lineTo(rx, by-r); p.quadraticCurveTo(rx, by, rx-r, by);
    p.lineTo(lx+r, by); p.quadraticCurveTo(lx, by, lx, by-r);
    [...joins].reverse().forEach(({ jy, frac }) => {
      const f = DF*frac, c = DC*frac;
      p.lineTo(lx, jy+c); p.quadraticCurveTo(lx+f, jy, lx, jy-c);
    });
    p.lineTo(lx, ty+r); p.quadraticCurveTo(lx, ty, lx+r, ty);
    p.closePath(); return p;
  }

  function drawBorderAnim(homeY, progress, isDone, cellIdx) {
    const h = cellH(cellIdx);
    const x0 = II, y0 = homeY + II, x1 = CW - II, y1 = homeY + h - II;
    const r = R - II;
    const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
    const halfW = cx - x0 - r, arcL = (Math.PI / 2) * r, halfH = cy - y0 - r;
    const arm = halfW + arcL + halfH;
    const dist = progress * arm;
    ctx.lineCap = 'round';
    function traceArm(segs) {
      let rem = dist; ctx.beginPath(); let on = false;
      for (const s of segs) {
        if (rem <= 0) break;
        if (s.type === 'line') {
          const len = Math.hypot(s.ex - s.sx, s.ey - s.sy);
          const t = Math.min(rem / len, 1);
          if (!on) { ctx.moveTo(s.sx, s.sy); on = true; }
          ctx.lineTo(s.sx + (s.ex - s.sx) * t, s.sy + (s.ey - s.sy) * t);
          rem -= len;
        } else {
          const aLen = Math.abs(s.ea - s.sa) * r;
          const t = Math.min(rem / aLen, 1);
          if (!on) { ctx.moveTo(s.cx + r * Math.cos(s.sa), s.cy + r * Math.sin(s.sa)); on = true; }
          ctx.arc(s.cx, s.cy, r, s.sa, s.sa + (s.ea - s.sa) * t, s.ccw);
          rem -= aLen;
        }
      }
      ctx.stroke();
    }
    const arms = [
      [{ type:'line', sx:cx, sy:y0, ex:x1-r, ey:y0 },
       { type:'arc', cx:x1-r, cy:y0+r, sa:-Math.PI/2, ea:0, ccw:false },
       { type:'line', sx:x1, sy:y0+r, ex:x1, ey:cy }],
      [{ type:'line', sx:cx, sy:y0, ex:x0+r, ey:y0 },
       { type:'arc', cx:x0+r, cy:y0+r, sa:-Math.PI/2, ea:-Math.PI, ccw:true },
       { type:'line', sx:x0, sy:y0+r, ex:x0, ey:cy }],
      [{ type:'line', sx:cx, sy:y1, ex:x1-r, ey:y1 },
       { type:'arc', cx:x1-r, cy:y1-r, sa:Math.PI/2, ea:0, ccw:true },
       { type:'line', sx:x1, sy:y1-r, ex:x1, ey:cy }],
      [{ type:'line', sx:cx, sy:y1, ex:x0+r, ey:y1 },
       { type:'arc', cx:x0+r, cy:y1-r, sa:Math.PI/2, ea:Math.PI, ccw:false },
       { type:'line', sx:x0, sy:y1-r, ex:x0, ey:cy }],
    ];
    const isPassed = cells[cellIdx].passed;
    const borderStroke = isDone ? (isPassed ? PASS_STROKE : '#5A9B91') : colors.STROKE;
    if (isDone) {
      ctx.strokeStyle = borderStroke; ctx.globalAlpha = 0.7; ctx.lineWidth = SW;
      arms.forEach(a => traceArm(a));
    } else {
      ctx.strokeStyle = borderStroke; ctx.globalAlpha = 1; ctx.lineWidth = SW;
      arms.forEach(a => traceArm(a));
    }
    ctx.globalAlpha = 1;
  }

  function fitText(text, maxW) {
    if (ctx.measureText(text).width <= maxW) return text;
    while (text.length > 0 && ctx.measureText(text + '\u2026').width > maxW) text = text.slice(0, -1);
    return text.trimEnd() + '\u2026';
  }

  // Wrap text into up to maxLines lines that fit within maxW
  function wrapText(text, maxW, maxLines) {
    if (ctx.measureText(text).width <= maxW) return [text];
    const words = text.split(/\s+/);
    const lines = [];
    let line = '';
    for (const word of words) {
      const test = line ? line + ' ' + word : word;
      if (ctx.measureText(test).width > maxW && line) {
        lines.push(line);
        if (lines.length >= maxLines) { lines[lines.length - 1] = fitText(lines[lines.length - 1] + ' ' + words.slice(words.indexOf(word)).join(' '), maxW); return lines; }
        line = word;
      } else {
        line = test;
      }
    }
    if (line) {
      if (lines.length >= maxLines) lines[lines.length - 1] = fitText(lines[lines.length - 1] + ' ' + line, maxW);
      else lines.push(line);
    }
    return lines;
  }

  function draw() {
    const th = totalH();
    ctx.clearRect(0, 0, CW, th);

    // Undone cells — use cellH for variable height
    cells.forEach((cell, idx) => {
      if (cell.done || cell.passed || !isVisible(idx)) return;
      const h = cellH(idx);
      // Press scale effect (animated)
      const isScaling = (idx === pressScaleIdx && pressScale < 0.999);
      if (isScaling) {
        const cx = CW / 2, cy = cell.homeY + h / 2;
        ctx.save(); ctx.translate(cx, cy); ctx.scale(pressScale, pressScale); ctx.translate(-cx, -cy);
      }
      const p = rrPath(cell.homeY, h);
      const isFinal = idx === N - 1;
      const st = colors.STROKE;
      if (idx === tempVisibleIdx && isLocked(idx)) {
        // Temp-revealed via pill — grey
        ctx.fillStyle = 'rgba(180,175,168,0.2)';
        ctx.fill(p);
        dashedBorder(cell.homeY, h, 'rgba(160,150,140,0.4)', 0.15);
      } else if (isLocked(idx)) {
        ctx.fillStyle = 'rgba(232,200,206,0.3)';
        ctx.fill(p);
        dashedBorder(cell.homeY, h, st, 0.1);
      } else if (idx === selectedIdx) {
        ctx.fillStyle = `rgba(${colors.FILL_UNDONE.join(',')})`;
        ctx.fill(p);
        ctx.strokeStyle = st; ctx.lineWidth = SW; ctx.globalAlpha = 0.6; ctx.stroke(p); ctx.globalAlpha = 1;
      } else {
        ctx.fillStyle = `rgba(${colors.FILL_UNDONE.join(',')})`;
        ctx.fill(p);
        ctx.strokeStyle = st; ctx.lineWidth = SW; ctx.globalAlpha = cell.strokeOp; ctx.stroke(p); ctx.globalAlpha = 1;
      }
      if (isScaling) ctx.restore();
    });

    // Done cells — individual teal rounded rects (shrink to thin when compact)
    cells.forEach((cell, idx) => {
      if (!cell.done || !isVisible(idx)) return;
      const h = cellH(idx);
      const isScaling = (idx === pressScaleIdx && pressScale < 0.999);
      if (isScaling) {
        const cx = CW / 2, cy = cell.homeY + h / 2;
        ctx.save(); ctx.translate(cx, cy); ctx.scale(pressScale, pressScale); ctx.translate(-cx, -cy);
      }
      const growFrac = Math.min((cell.doneH - DONE_CH) / (CH - DONE_CH), 1);
      const cr = DONE_R + (R - DONE_R) * growFrac;
      const p = rrPath(cell.homeY, h, cr);
      ctx.fillStyle = `rgba(90,155,145,${(0.06 * cell.fillOp).toFixed(3)})`;
      ctx.fill(p);
      ctx.strokeStyle = `rgba(90,155,145,${(0.15 * cell.strokeOp).toFixed(3)})`;
      ctx.lineWidth = 1.2; ctx.stroke(p);
      if (isScaling) ctx.restore();
    });

    // Passed/skipped cells — amber rounded rects (shrink like done)
    cells.forEach((cell, idx) => {
      if (!cell.passed || !isVisible(idx)) return;
      const h = cellH(idx);
      const isScaling = (idx === pressScaleIdx && pressScale < 0.999);
      if (isScaling) {
        const cx = CW / 2, cy = cell.homeY + h / 2;
        ctx.save(); ctx.translate(cx, cy); ctx.scale(pressScale, pressScale); ctx.translate(-cx, -cy);
      }
      const growFrac = Math.min((cell.doneH - DONE_CH) / (CH - DONE_CH), 1);
      const cr = DONE_R + (R - DONE_R) * growFrac;
      const p = rrPath(cell.homeY, h, cr);
      ctx.fillStyle = `rgba(196,164,60,${(0.06 * cell.fillOp).toFixed(3)})`;
      ctx.fill(p);
      ctx.strokeStyle = `rgba(196,164,60,${(0.15 * cell.strokeOp).toFixed(3)})`;
      ctx.lineWidth = 1.2; ctx.stroke(p);
      if (isScaling) ctx.restore();
    });

    // Text — always drawn at the top of each cell (fixed CH area)
    cells.forEach((cell, idx) => {
      if (!isVisible(idx)) return;
      const t = tasks[idx], y = cell.homeY;
      const selBoost = (idx === selectedIdx) ? 1.6 : 1.0;
      const isFinal = idx === N - 1;
      ctx.save();
      // Press scale effect for text (animated)
      if (idx === pressScaleIdx && pressScale < 0.999) {
        const h = cellH(idx), cx = CW / 2, cy = y + h / 2;
        ctx.translate(cx, cy); ctx.scale(pressScale, pressScale); ctx.translate(-cx, -cy);
      }
      const locked = isLocked(idx);
      // Helper: draw sub text with wrapping (up to 2 lines), returns line count
      function drawSub(text, fillStyle, yBase) {
        ctx.font = '12px JetBrains Mono, monospace';
        ctx.fillStyle = fillStyle;
        const lines = wrapText(text, CW - 32, 2);
        lines.forEach((ln, li) => ctx.fillText(ln, 16, yBase + li * 15));
        // Track text bottom for detail panel positioning
        cell.textBtm = (yBase - y) + (lines.length - 1) * 15 + 12;
      }

      // Task number aligned right
      function drawNum(alpha) {
        ctx.font = '600 11px JetBrains Mono, monospace';
        ctx.fillStyle = textColour(alpha);
        ctx.textAlign = 'right';
        ctx.fillText(String(idx + 1), CW - 14, y + 27);
        ctx.textAlign = 'left';
      }



      if (cell.passed) {
        const skipA = cell.fillOp; // animates 0→1
        const dh = cell.doneH;
        const skipLabel = t.label;
        const skipSub = t.sub;
        const gf = Math.min((dh - DONE_CH) / (CH - DONE_CH), 1);
        const compactCY = y + dh / 2 + 5;
        const lblY = compactCY + (y + 28 - compactCY) * gf;
        const numY = compactCY + (y + 27 - compactCY) * gf;
        const numA = skipA * (0.3 + 0.2 * gf);
        const lblA = skipA * (0.4 + 0.45 * gf);
        const subA = skipA * (0.6 * gf);
        ctx.font = '600 11px JetBrains Mono, monospace';
        ctx.fillStyle = `rgba(160,130,40,${numA.toFixed(3)})`;
        ctx.textAlign = 'right';
        ctx.fillText(String(idx + 1), CW - 14, numY);
        ctx.textAlign = 'left';
        const fs = (15 + gf).toFixed(1);
        ctx.font = `italic 400 ${fs}px Nunito, sans-serif`;
        ctx.fillStyle = `rgba(160,130,40,${lblA.toFixed(3)})`;
        ctx.fillText('\u2022  ' + skipLabel, gf > 0.5 ? 16 : 14, lblY);
        if (gf > 0.15) {
          drawSub(skipSub, `rgba(160,130,40,${subA.toFixed(3)})`, y + 52);
        }
      } else if (locked) {
        const isTemp = idx === tempVisibleIdx;
        const tc = isTemp ? (a) => `rgba(120,115,108,${a.toFixed(3)})` : textColour;
        drawNum(isTemp ? 0.25 : 0.15);
        ctx.font = '400 19px Nunito, sans-serif';
        ctx.fillStyle = tc(isTemp ? 0.4 : 0.22); ctx.fillText(t.label, 16, y + 30);
        drawSub(t.sub, tc(isTemp ? 0.3 : 0.16), y + 52);
      } else {
        const tc = textColour;
        const tf = cell.textFade;
        const undoneA = (1 - tf) * 0.85, doneA = tf * 0.95;
        if (undoneA > 0.005) {
          drawNum(Math.min(undoneA * 0.6 * selBoost, 0.6));
          ctx.font = '400 19px Nunito, sans-serif';
          ctx.fillStyle = tc(Math.min(undoneA * selBoost, 1));
          ctx.fillText(t.label, 16, y + 30);
          drawSub(t.sub, tc(Math.min(undoneA * 0.9 * selBoost, 1)), y + 52);
        }
        if (doneA > 0.005) {
          const dh = cell.doneH;
          const gf = Math.min((dh - DONE_CH) / (CH - DONE_CH), 1);
          // Interpolate Y: compact center → expanded fixed
          const compactCY = y + dh / 2 + 5;
          const lblY = compactCY + (y + 28 - compactCY) * gf;
          const numY = compactCY + (y + 27 - compactCY) * gf;
          // Interpolate alpha: faded compact → visible expanded
          const numA2 = doneA * (0.3 + 0.2 * gf);
          const lblA2 = doneA * (0.4 + 0.45 * gf);
          const subA2 = doneA * (0.6 * gf);
          ctx.font = '600 11px JetBrains Mono, monospace';
          ctx.fillStyle = `rgba(60,130,118,${numA2.toFixed(3)})`;
          ctx.textAlign = 'right';
          ctx.fillText(String(idx + 1), CW - 14, numY);
          ctx.textAlign = 'left';
          const fs2 = (15 + gf).toFixed(1);
          ctx.font = `italic 400 ${fs2}px Nunito, sans-serif`;
          ctx.fillStyle = `rgba(60,130,118,${lblA2.toFixed(3)})`;
          ctx.fillText('\u2713  ' + t.done, gf > 0.5 ? 16 : 14, lblY);
          if (gf > 0.15) {
            drawSub(t.sub, `rgba(60,130,118,${subA2.toFixed(3)})`, y + 52);
          }
        }
      }
      ctx.restore();
    });

    // Hold border — uses cellH for full cell height, matches pressScale transform
    if (pressIdx >= 0 && holdProg > 0 && !holdDone) {
      const cell = cells[pressIdx];
      const h = cellH(pressIdx);
      if (pressScale < 0.999) {
        const cx2 = CW / 2, cy2 = cell.homeY + h / 2;
        ctx.save();
        ctx.translate(cx2, cy2); ctx.scale(pressScale, pressScale); ctx.translate(-cx2, -cy2);
      }
      drawBorderAnim(cell.homeY, holdProg, cell.done || cell.passed, pressIdx);
      if (pressScale < 0.999) ctx.restore();
    }
  }

  // Animation
  const S_FILL = 0.09, S_STROKE = 0.1, S_DIVOT = 0.12, S_TEXT = 0.08, S_SOLID = 0.08, S_EXPAND = 0.14;
  function tick() {
    let dirty = false;
    cells.forEach((cell, i) => {
      function step(key, speed) {
        const d = tgt[i][key] - cell[key];
        if (Math.abs(d) > 0.001) { cell[key] += d * speed; dirty = true; }
        else cell[key] = tgt[i][key];
      }
      step('fillOp', S_FILL); step('strokeOp', S_STROKE);
      step('divotFrac', S_DIVOT); step('textFade', S_TEXT);
      // doneH: spring with minimum velocity to avoid slow crawl at end
      {
        const d = tgt[i].doneH - cell.doneH;
        if (Math.abs(d) > 0.5) {
          const move = d * 0.14;
          cell.doneH += Math.abs(move) < 1.5 ? Math.sign(d) * 1.5 : move;
          dirty = true;
        } else cell.doneH = tgt[i].doneH;
      }
      // Clean up fading-out temp cell once it's fully shrunk to 0
      if (i === fadingOutTemp && cell.doneH < 0.5) {
        fadingOutTemp = -1;
        cell.doneH = CH; // reset for future use
      }
    });
    const ds = tgtSolid - solidFrac;
    if (Math.abs(ds) > 0.001) { solidFrac += ds * S_SOLID; dirty = true; }
    else solidFrac = tgtSolid;
    // Animate press scale
    const dp = pressScaleTarget - pressScale;
    if (Math.abs(dp) > 0.001) { pressScale += dp * 0.12; dirty = true; }
    else { pressScale = pressScaleTarget; if (pressScale === 1.0) pressScaleIdx = -1; }
    // Animate expand height
    const de = expandTarget - expandH;
    if (Math.abs(de) > 0.5) { expandH += de * S_EXPAND; dirty = true; }
    else { expandH = expandTarget; if (expandH === 0) expandIdx = -1; }
    // Animate collapse slot — mirror expand progress so total height stays stable
    if (collapseIdx >= 0) {
      const frac = expandTarget > 0 ? Math.min(expandH / expandTarget, 1) : 1;
      collapseH = collapseH0 * (1 - frac);
      if (collapseH < 0.5) { collapseH = 0; collapseIdx = -1; }
      else { dirty = true; }
    }
    // Relayout every frame while expanding/collapsing
    computeLayout(); resizeCanvas();
    if (expandIdx >= 0) {
      detailPanel.style.top = (cells[expandIdx].homeY + baseCellH(expandIdx)) + 'px';
      // expandH is the allocated canvas space; panel can be up to 28px taller (overlap)
      detailPanel.style.maxHeight = (expandH + 28) + 'px';
    } else {
      detailPanel.style.maxHeight = '';
    }
    draw();
    if (dirty) recalcPanelSection(panelId);
    raf = dirty ? requestAnimationFrame(tick) : null;
  }
  function kick() { if (!raf) raf = requestAnimationFrame(tick); }

  // Detail panel elements
  const detailPanel = wrapEl.querySelector('.task-detail-panel');
  const elDesc = wrapEl.querySelector('.td-desc');
  const elUnlock = wrapEl.querySelector('.td-unlock');
  const elBullets = wrapEl.querySelector('.td-bullets');
  const elDeliv = wrapEl.querySelector('.td-deliverable');
  const btnPass = wrapEl.querySelector('.td-pass');
  const btnDoc = wrapEl.querySelector('.td-doc');
  const btnCloseTask = wrapEl.querySelector('.td-close');

  function refreshDetailButtons(idx) {
    const isDone = cells[idx].done;
    const isPassed = cells[idx].passed;
    const locked = isLocked(idx);
    const deps = pendingDeps(idx);
    elUnlock.textContent = deps.length > 0
      ? 'COMPLETE ' + deps.map(d => String(d + 1)).join(' + ') + ' FIRST'
      : '';
    if (locked && !isDone && !isPassed) {
      btnPass.style.display = 'none';
    } else if (isDone) {
      btnPass.style.display = 'none';
    } else if (isPassed) {
      btnPass.textContent = 'unskip'; btnPass.classList.add('is-passed'); btnPass.style.display = '';
    } else {
      btnPass.textContent = 'skip'; btnPass.classList.remove('is-passed'); btnPass.style.display = '';
    }
  }

  function relayout() {
    computeLayout();
    resizeCanvas();
    if (expandIdx >= 0) {
      detailPanel.style.top = (cells[expandIdx].homeY + baseCellH(expandIdx)) + 'px';
    }
    draw();
    recalcPanelSection(panelId);
  }

  function showDetail(idx) {
    if (idx === selectedIdx) { hideDetail(); return; }
    const wasSwitching = selectedIdx >= 0;
    // Shrink previous done/passed cell back
    if (selectedIdx >= 0 && (cells[selectedIdx].done || cells[selectedIdx].passed)) {
      tgt[selectedIdx].doneH = (cells[selectedIdx].done || cells[selectedIdx].passed) ? DONE_CH : CH;
    }
    // When switching: move old expand to collapse slot so both animate simultaneously
    if (wasSwitching && expandIdx >= 0 && expandH > 0) {
      collapseIdx = expandIdx;
      collapseH = expandH;
      collapseH0 = expandH;
    }
    selectedIdx = idx;
    expandIdx = idx;
    expandH = 0; // always start new expand from 0
    const t = tasks[idx];

    // Expand done/passed cells back to full height so detail panel fits
    if (cells[idx].done || cells[idx].passed) {
      tgt[idx].doneH = CH;
    }

    // Populate content
    elDesc.textContent = t.detail || t.sub;
    const deps = pendingDeps(idx);
    elUnlock.textContent = deps.length > 0
      ? 'COMPLETE ' + deps.map(d => String(d + 1)).join(' + ') + ' FIRST'
      : '';
    elBullets.innerHTML = t.bullets.map(b => '<li>' + b + '</li>').join('');
    elBullets.style.setProperty('--dot-color', colors.ACCENT_HEX);
    elDeliv.textContent = '\u2714 ' + t.deliverable;
    elDeliv.style.color = colors.ACCENT_HEX;
    if (btnDoc) {
      btnDoc.href = t.url || '#';
      btnDoc.style.display = t.url ? '' : 'none';
      btnDoc.parentElement.style.display = t.url ? '' : 'none';
    }
    refreshDetailButtons(idx);
    detailPanel.classList.toggle('is-locked', isLocked(idx));

    // Measure panel height: show invisibly, measure, then animate open
    detailPanel.style.visibility = 'hidden';
    detailPanel.style.maxHeight = '';
    detailPanel.style.top = '0';
    detailPanel.classList.add('open');
    expandTarget = detailPanel.offsetHeight - 28;
    detailPanel.style.visibility = '';

    // Start expand animation
    kick();

    // Scroll after expand animation settles (avoid fighting layout shifts)
    setTimeout(() => {
      const rect = detailPanel.getBoundingClientRect();
      const viewH = window.innerHeight;
      // Only scroll if the panel bottom is below the viewport
      if (rect.bottom > viewH - 20) {
        window.scrollBy({ top: rect.bottom - viewH + 40, behavior: 'smooth' });
      } else if (rect.top < 20) {
        window.scrollBy({ top: rect.top - 40, behavior: 'smooth' });
      }
    }, 400);
  }

  function hideDetail() {
    detailPanel.classList.remove('open');
    expandTarget = 0;
    collapseIdx = -1; collapseH = 0;
    const prevIdx = selectedIdx;
    selectedIdx = -1;
    // Shrink done/passed cells back to compact height
    if (prevIdx >= 0 && (cells[prevIdx].done || cells[prevIdx].passed)) {
      tgt[prevIdx].doneH = (cells[prevIdx].done || cells[prevIdx].passed) ? DONE_CH : CH;
    }
    // Clear any in-progress fade-out
    if (fadingOutTemp >= 0) {
      cells[fadingOutTemp].doneH = CH;
      fadingOutTemp = -1;
    }
    // Animate temp-visible cell out — tick cleanup handles removal at doneH ≈ 0
    if (tempVisibleIdx >= 0) {
      tgt[tempVisibleIdx].doneH = 0;
      fadingOutTemp = tempVisibleIdx;
      tempVisibleIdx = -1;
    }
    // expandIdx stays so cellH still applies during collapse animation
    // it gets cleared when expandH reaches 0 in tick
    kick();
  }

  // Cascade uncomplete: undo any downstream tasks that depend on idx
  function cascadeUndo(idx) {
    for (let k = 0; k < N; k++) {
      const reqs = tasks[k].requires;
      if (!reqs || !reqs.includes(idx)) continue;
      if (cells[k].done || cells[k].passed) {
        cells[k].done = false;
        cells[k].passed = false;
        cascadeUndo(k); // recurse for deeper dependants
      }
    }
  }

  function toggleDone(idx) {
    if (cells[idx].done) {
      cells[idx].done = false;
      cascadeUndo(idx);
    } else {
      cells[idx].done = true; cells[idx].passed = false;
      // Close detail panel when completing a task so it can shrink
      if (idx === selectedIdx) hideDetail();
    }
    saveLS(); updateCounter(); recalcTargets(); kick();
    if (selectedIdx >= 0) {
      if (!isVisible(selectedIdx)) hideDetail();
      else refreshDetailButtons(selectedIdx);
    }
  }

  function togglePass(idx) {
    if (cells[idx].passed) {
      cells[idx].passed = false;
      cascadeUndo(idx);
    } else {
      cells[idx].passed = true; cells[idx].done = false;
      if (idx === selectedIdx) hideDetail();
    }
    saveLS(); updateCounter(); recalcTargets(); kick();
    if (selectedIdx >= 0) {
      if (!isVisible(selectedIdx)) hideDetail();
      else {
        refreshDetailButtons(selectedIdx);
        // Remeasure expand target in case cell changed size (e.g. unskip)
        detailPanel.style.maxHeight = '';
        expandTarget = Math.max(expandTarget, detailPanel.offsetHeight - 28);
      }
    }
  }

  btnPass.addEventListener('click', (e) => {
    e.stopPropagation();
    if (selectedIdx >= 0) { togglePass(selectedIdx); hideDetail(); draw(); }
  });
  btnCloseTask.addEventListener('click', (e) => { e.stopPropagation(); hideDetail(); });

  // Long press — delayed activation so scrolling still works on mobile
  const HOLD_MS = 500;
  const HOLD_DELAY = 150; // ms before capturing pointer (allows scroll to start)
  let pressIdx = -1, pressStart = 0, holdProg = 0, holdDone = false, holdRaf = null;
  let pressScale = 1.0, pressScaleTarget = 1.0, pressScaleIdx = -1;
  let pressStartX = 0, pressStartY = 0, holdDelayTimer = null, holdPointerId = -1;
  const MOVE_THRESH = 10;

  function hitCell(clientY) {
    const rect = canvas.getBoundingClientRect();
    const my = clientY - rect.top;
    for (let k = 0; k < N; k++) {
      if (!isVisible(k)) continue;
      const top = cells[k].homeY;
      if (my >= top && my < top + baseCellH(k)) return k;
    }
    return -1;
  }

  function holdTick() {
    if (pressIdx < 0) return;
    holdProg = Math.min((Date.now() - pressStart) / HOLD_MS, 1);
    draw();
    if (holdProg >= 1 && !holdDone) {
      holdDone = true;
      if (navigator.vibrate) navigator.vibrate(18);
      toggleDone(pressIdx);
      setTimeout(() => { holdProg = 0; pressIdx = -1; draw(); }, 150);
      return;
    }
    if (!holdDone) holdRaf = requestAnimationFrame(holdTick);
  }

  function cancelHold() {
    if (holdDelayTimer) { clearTimeout(holdDelayTimer); holdDelayTimer = null; }
    if (holdRaf) { cancelAnimationFrame(holdRaf); holdRaf = null; }
