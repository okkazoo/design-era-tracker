function getCardDash(card) {
  return (card.classList.contains('tasks-complete') || card.classList.contains('is-done')) ? 'none' : '6 4';
}

function getExpandFillColor(card) {
  const cl = card.classList;
  // Pre-composited solid colors: rgba on page bg #ECEAE3 (236,234,227)
  const onPage = { default: 'rgb(225,230,230)', '12ftx': 'rgb(232,222,211)', 'enw223': 'rgb(224,225,222)', 'flm223': 'rgb(228,220,219)', 'mus223': 'rgb(222,226,217)', 'mat223': 'rgb(225,223,222)', 'fcm112': 'rgb(230,225,213)' };
  const onFrame = { default: 'rgb(234,238,235)', '12ftx': 'rgb(241,230,221)', 'enw223': 'rgb(232,233,232)', 'flm223': 'rgb(237,228,229)', 'mus223': 'rgb(230,234,227)', 'mat223': 'rgb(233,231,232)', 'fcm112': 'rgb(238,233,223)' };
  const inFrame = !!(card.closest('.tab-frame-content') || card.closest('.current-content'));
  const map = inFrame ? onFrame : onPage;
  for (const key of ['12ftx','enw223','flm223','mus223','mat223','fcm112']) {
    if (cl.contains('cp-' + key)) return map[key];
  }
  return map.default;
}

function renderBorderPaths(W, H, strokeColor, dashArray, S, R) {
  const i = S / 2;
  const x0 = i, y0 = i, x1 = W - i, y1 = H - i;
  const r = R;
  const topD = `M${x0},${y0+r} Q${x0},${y0} ${x0+r},${y0} L${x1-r},${y0} Q${x1},${y0} ${x1},${y0+r}`;
  const rightD = `M${x1},${y0+r} L${x1},${y1-r}`;
  const btmD = `M${x1},${y1-r} Q${x1},${y1} ${x1-r},${y1} L${x0+r},${y1} Q${x0},${y1} ${x0},${y1-r}`;
  const leftD = `M${x0},${y0+r} L${x0},${y1-r}`;
  const da = dashArray === 'none' ? '' : `stroke-dasharray="${dashArray}"`;
  const attr = `fill="none" stroke="${strokeColor}" stroke-width="${S}" ${da}`;
  return `<path d="${topD}" ${attr}/><path d="${rightD}" ${attr}/><path d="${btmD}" ${attr}/><path d="${leftD}" ${attr}/>`;
}

function drawCardBorder(card) {
  let svg = card.querySelector('.card-border-svg');
  if (!svg) {
    svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.classList.add('card-border-svg');
    card.appendChild(svg);
  }
  const R = 19, S = 1.8;
  const W = card.offsetWidth + 2;
  const H = card.offsetHeight + 2;
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.innerHTML = renderBorderPaths(W, H, getCardStroke(card), getCardDash(card), S, R);
}

function drawAllCardBorders() {
  document.querySelectorAll('.item-card[data-id]').forEach(card => {
    if (!card.classList.contains('is-expanded')) drawCardBorder(card);
  });
}

function startCardBorderAnim(card, panel) {
  const R = 19, S = 1.8;
  let svg = card.querySelector('.card-border-svg');
  if (!svg) {
    svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.classList.add('card-border-svg');
    card.appendChild(svg);
  }
  const strokeColor = getCardStroke(card);
  const dashArray = getCardDash(card);
  const cardFill = getExpandFillColor(card);
  const detailFill = 'rgb(253,251,246)';
  const uid = card.dataset.id || '0';

  function update() {
    if (!card.querySelector('.card-border-svg')) { cardBorderRaf = null; return; }
    const cardH = card.offsetHeight;
    const panelH = panel.offsetHeight;
    const W = card.offsetWidth + 2;
    const totalH = cardH + panelH + 2;
    const splitY = cardH + 1;
    const i = S / 2;
    svg.setAttribute('width', W);
    svg.setAttribute('height', totalH);
    svg.innerHTML = `
      <defs>
        <clipPath id="clip-top-${uid}"><rect x="0" y="0" width="${W}" height="${splitY}"/></clipPath>
        <clipPath id="clip-btm-${uid}"><rect x="0" y="${splitY}" width="${W}" height="${totalH - splitY}"/></clipPath>
      </defs>
      <rect x="${i}" y="${i}" width="${W-S}" height="${totalH-S}" rx="${R}" ry="${R}"
            fill="${cardFill}" clip-path="url(#clip-top-${uid})"/>
      <rect x="${i}" y="${i}" width="${W-S}" height="${totalH-S}" rx="${R}" ry="${R}"
            fill="${detailFill}" clip-path="url(#clip-btm-${uid})"/>
      ${renderBorderPaths(W, totalH, strokeColor, dashArray, S, R)}
    `;
    cardBorderRaf = requestAnimationFrame(update);
  }

  if (cardBorderRaf) cancelAnimationFrame(cardBorderRaf);
  cardBorderAnimCard = card;
  update();
}

function stopCardBorderAnim(card) {
  if (cardBorderRaf && cardBorderAnimCard === card) {
    cancelAnimationFrame(cardBorderRaf);
    cardBorderRaf = null;
    cardBorderAnimCard = null;
  }
}

function closeAlert(aid) {
  const detail = document.getElementById('alert-detail-' + aid);
  const card = document.querySelector(`[data-alert="${aid}"]`);
  if (detail) { detail.style.maxHeight = detail.scrollHeight + 'px'; requestAnimationFrame(() => { detail.style.maxHeight = '0'; detail.classList.remove('open'); }); }
  if (card) card.classList.remove('is-expanded');
  if (expandedId === aid) expandedId = null;
}

function render() {
  const filtered = filteredItems(ITEMS);
  const allFuture = filtered.filter(it => it.date >= TODAY_STR).sort((a,b) => a.date.localeCompare(b.date) || a.cls.localeCompare(b.cls));
  const current = allFuture.filter(it => daysUntil(it.date) <= 14);
  const upcoming = allFuture.filter(it => daysUntil(it.date) > 14);
  const pastItems = filtered.filter(it => it.date < TODAY_STR).sort((a,b) => b.date.localeCompare(a.date) || a.cls.localeCompare(b.cls));

  renderHeader();

  // Auto-open Future tab if nothing is current
  if (current.length === 0 && upcoming.length > 0 && activeTab === null) {
    activeTab = 'upcoming';
  }

  let html = '';

  // Alerts
  if (ANOMALIES.length > 0) {
    html += `<div class="section-label section-alerts" data-section="alerts">
      <span class="section-chevron${!alertsCollapsed ? ' open' : ''}">&#x25B8;</span>
      Alerts <span class="section-count">(${ANOMALIES.length})</span>
    </div>`;
    html += `<div class="section-body${alertsCollapsed ? ' collapsed' : ''}" id="alertsBody" style="max-height:${alertsCollapsed ? '0' : 'none'}">`;
    html += renderAlerts(ANOMALIES);
    html += `</div>`;
  }

  // Current — simple pill-shaped container with centred label
  html += `<div class="current-frame">
    <div class="current-header">
      <span class="current-title">Current</span>
    </div>
    <div class="current-content">
      ${current.length > 0 ? renderItemCards(current, false) : '<div class="current-empty">Nothing Due</div>'}
    </div>
  </div>`;

  // Tab pills
  html += `<div class="tab-row">
    <button class="tab-btn${activeTab === 'upcoming' ? ' active' : ''}" data-tab="upcoming">Future</button>
    <button class="tab-btn${activeTab === 'past' ? ' active' : ''}" data-tab="past">Past</button>
  </div>`;

  // Full-width frame — upcoming (left pill → from-left)
  html += `<div class="tab-frame from-left${activeTab === 'upcoming' ? ' open' : ''}" id="upcomingTab">`;
  html += `<svg class="tab-frame-svg"></svg>`;
  html += `<div class="tab-frame-content">`;
  html += upcoming.length > 0 ? renderItemCards(upcoming, false) : `<div class="empty-note">No upcoming items</div>`;
  html += `</div></div>`;

  // Full-width frame — past (right pill → from-right)
  html += `<div class="tab-frame from-right${activeTab === 'past' ? ' open' : ''}" id="pastTab">`;
  html += `<svg class="tab-frame-svg"></svg>`;
  html += `<div class="tab-frame-content">`;
  html += pastItems.length > 0 ? renderItemCards(pastItems, true) : `<div class="empty-note">No past items</div>`;
  html += `</div></div>`;


  document.getElementById('sections').innerHTML = html;
  document.getElementById('sections').style.width = '100%';
  document.getElementById('sections').style.maxWidth = '380px';
  document.getElementById('sections').style.display = 'flex';
  document.getElementById('sections').style.flexDirection = 'column';
  document.getElementById('sections').style.gap = '0';

  expandedId = null;
  bindEvents();
  // Defer drawing until layout is fully settled
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      drawTabConnectors();
      drawAllCardBorders();
    });
  });
}

let tabBorderRaf = null;

function drawTabConnectorForFrame(frame) {
  const PR = 14, R = 18, BR = 14, S = 1.5;
  const color = 'rgba(58,48,40,0.2)';
  const frameBg = 'rgba(245,243,238,0.95)';

  const svg = frame.querySelector('.tab-frame-svg');
  if (!svg) return;
  // Find the active button that owns this frame
  let activeBtn;
  if (frame.id === 'currentTab') activeBtn = document.querySelector('.tab-btn[data-tab="current"].active');
  else if (frame.id === 'upcomingTab') activeBtn = document.querySelector('.tab-btn[data-tab="upcoming"].active');
  else if (frame.id === 'pastTab') activeBtn = document.querySelector('.tab-btn[data-tab="past"].active');
  else activeBtn = document.querySelector('.tab-btn.active');
  if (!activeBtn) return;
  const pillH = activeBtn.offsetHeight;
  const pillW = activeBtn.offsetWidth;
  const W = frame.offsetWidth;
  const FH = frame.offsetHeight;
  const TH = pillH + FH;
  if (W === 0 || TH === 0) return;

  const isLeft = frame.classList.contains('from-left');
  const UP = 5; // shift frame outline upward into pill area
  const pH = pillH - UP; // effective junction height
  let path;
  if (isLeft) {
    const cx = pillW;
    path = `M ${PR} 0 L ${cx - PR} 0 A ${PR} ${PR} 0 0 1 ${cx} ${PR} L ${cx} ${pH} A ${R} ${R} 0 0 0 ${cx + R} ${pH + R} L ${W - R} ${pH + R} A ${R} ${R} 0 0 1 ${W} ${pH + R + R} L ${W} ${TH - BR} A ${BR} ${BR} 0 0 1 ${W - BR} ${TH} L ${BR} ${TH} A ${BR} ${BR} 0 0 1 0 ${TH - BR} L 0 ${PR} A ${PR} ${PR} 0 0 1 ${PR} 0 Z`;
  } else {
    const cx = W - pillW;
    path = `M ${W - PR} 0 A ${PR} ${PR} 0 0 1 ${W} ${PR} L ${W} ${TH - BR} A ${BR} ${BR} 0 0 1 ${W - BR} ${TH} L ${BR} ${TH} A ${BR} ${BR} 0 0 1 0 ${TH - BR} L 0 ${pH + R + R} A ${R} ${R} 0 0 1 ${R} ${pH + R} L ${cx - R} ${pH + R} A ${R} ${R} 0 0 0 ${cx} ${pH} L ${cx} ${PR} A ${PR} ${PR} 0 0 1 ${cx + PR} 0 Z`;
  }
  svg.style.top = -pillH + 'px';
  svg.setAttribute('width', W);
  svg.setAttribute('height', TH);
  svg.innerHTML = `<path d="${path}" fill="${frameBg}" stroke="${color}" stroke-width="${S}"/>`;
}

function drawTabConnectors() {
  document.querySelectorAll('.tab-frame.open').forEach(drawTabConnectorForFrame);
}

function startTabBorderAnim(frame) {
  stopTabBorderAnim();
  function tick() {
    drawTabConnectorForFrame(frame);
    tabBorderRaf = requestAnimationFrame(tick);
  }
  tabBorderRaf = requestAnimationFrame(tick);
}

function stopTabBorderAnim() {
  if (tabBorderRaf) { cancelAnimationFrame(tabBorderRaf); tabBorderRaf = null; }
}

function bindEvents() {
  // Tab switching — click toggles pill open/closed
  function openTabFrame(frame) {
    const content = frame.querySelector('.tab-frame-content');
    const children = Array.from(content.querySelectorAll('.item-card, .date-marker'));
    children.forEach((child, i) => { child.style.animationDelay = (i * 30) + 'ms'; });
    frame.classList.remove('closing');
    frame.classList.add('opening', 'open');
    // Start content collapsed, animate to full height
    content.style.transition = 'none';
    content.style.maxHeight = '0';
    content.offsetHeight; // force reflow
    content.style.transition = '';
    requestAnimationFrame(() => {
      content.style.maxHeight = content.scrollHeight + 'px';
      startTabBorderAnim(frame);
      frame.classList.add('svg-ready');
      const dur = Math.max(350, children.length * 30 + 250);
      // Redraw card borders at key moments during animation, not every frame
      const cardRedrawTimes = [50, 150, 250, dur];
      cardRedrawTimes.forEach(t => {
        setTimeout(() => {
          content.querySelectorAll('.item-card[data-id]').forEach(card => {
            if (!card.classList.contains('is-expanded')) drawCardBorder(card);
          });
        }, t);
      });
      setTimeout(() => {
        stopTabBorderAnim();
        frame.classList.remove('opening', 'svg-ready');
        content.style.maxHeight = '';
        content.style.overflow = '';
        drawTabConnectors();
        drawAllCardBorders();
      }, dur);
    });
  }

  function closeTabFrame(frame, cb) {
    const content = frame.querySelector('.tab-frame-content');
    frame.classList.remove('opening', 'svg-ready');
    frame.classList.add('closing');
    content.style.transition = 'none';
    content.style.maxHeight = content.scrollHeight + 'px';
    content.offsetHeight; // force reflow
    content.style.transition = '';
    startTabBorderAnim(frame);
    requestAnimationFrame(() => { content.style.maxHeight = '0'; });
    function onEnd(e) {
      if (e.propertyName !== 'max-height') return;
      content.removeEventListener('transitionend', onEnd);
      stopTabBorderAnim();
      frame.classList.remove('closing', 'open', 'svg-fade');
      content.style.maxHeight = '';
      content.style.transition = '';
      // Snap pill border back instantly — no fade, no second stage
      if (cb) {
        const btn = frame.id === 'currentTab' ? document.querySelector('.tab-btn[data-tab="current"]')
                  : frame.id === 'upcomingTab' ? document.querySelector('.tab-btn[data-tab="upcoming"]')
                  : document.querySelector('.tab-btn[data-tab="past"]');
        if (btn) {
          btn.style.transition = 'none';
          cb();
          btn.offsetHeight; // force reflow
          btn.style.transition = '';
        } else { cb(); }
      }
    }
    content.addEventListener('transitionend', onEnd);
  }

  function getFrameForTab(tab) {
    if (tab === 'upcoming') return document.getElementById('upcomingTab');
    if (tab === 'past') return document.getElementById('pastTab');
    return null;
  }

  function pushTabDown(btn) {
    const tab = btn.dataset.tab;
    const frame = getFrameForTab(tab);
    const withFrame = frame && frame.classList.contains('open');
    if (withFrame) {
      const bRect = btn.getBoundingClientRect();
      const fRect = frame.getBoundingClientRect();
      const pillCx = bRect.left + bRect.width / 2;
      const pillCy = bRect.top + bRect.height / 2;
      btn.style.transformOrigin = '50% 50%';
      frame.style.transformOrigin = (pillCx - fRect.left) + 'px ' + (pillCy - fRect.top) + 'px';
    }
    const els = withFrame ? [btn, frame] : [btn];
    els.forEach(el => {
      el.style.transition = 'transform 0.08s ease';
      el.style.transform = 'scale(0.975)';
    });
  }

  function pushTabUp(btn) {
    const tab = btn.dataset.tab;
    const frame = getFrameForTab(tab);
    [btn, frame].forEach(el => {
      if (!el) return;
      el.style.transition = 'transform 0.25s cubic-bezier(0.18, 0.89, 0.32, 1.15)';
      el.style.transform = '';
    });
    setTimeout(() => {
      [btn, frame].forEach(el => {
        if (!el) return;
        el.style.transition = '';
        el.style.transformOrigin = '';
      });
    }, 280);
  }

  document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
    if (btn.classList.contains('no-collapse')) return; // Current — skip all interaction
    btn.addEventListener('pointerdown', () => pushTabDown(btn));
    btn.addEventListener('pointerup', () => pushTabUp(btn));
    btn.addEventListener('pointerleave', () => pushTabUp(btn));
    btn.addEventListener('pointercancel', () => pushTabUp(btn));
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      closeDetail();
      const frame = getFrameForTab(tab);

      // Future/Past — mutual exclusive pair
      if (activeTab === tab) {
        activeTab = null;
        closeTabFrame(frame, () => {
          btn.classList.remove('active');
        });
      } else {
        const oldBtn = activeTab ? document.querySelector('.tab-btn[data-tab="' + activeTab + '"].active') : null;
        const oldFrame = activeTab ? getFrameForTab(activeTab) : null;
        const doOpen = () => {
          if (oldBtn) oldBtn.classList.remove('active');
          btn.classList.add('active');
          activeTab = tab;
          openTabFrame(frame);
        };
        if (oldFrame && oldFrame.classList.contains('open')) {
          closeTabFrame(oldFrame, doOpen);
        } else {
          doOpen();
        }
      }
    });
  });

  // Alerts section toggle
  document.querySelectorAll('.section-label[data-section="alerts"]').forEach(label => {
    label.addEventListener('click', () => {
      const body = document.getElementById('alertsBody');
      if (!body) return;
      const chevron = label.querySelector('.section-chevron');
      const isCollapsed = body.classList.contains('collapsed');

      if (body.dataset.animating === '1') return;
      body.dataset.animating = '1';

      const children = Array.from(body.querySelectorAll('.alert-card, .date-marker'));
      const total = children.length;

      if (isCollapsed) {
        children.forEach((child, i) => { child.style.animationDelay = (i * 40) + 'ms'; });
        body.classList.remove('collapsed', 'closing');
        body.style.transition = 'none';
        body.style.maxHeight = '0';
        body.offsetHeight;
        body.classList.add('opening');
        body.style.transition = '';
        requestAnimationFrame(() => { body.style.maxHeight = body.scrollHeight + 'px'; });
        if (chevron) chevron.classList.add('open');
        alertsCollapsed = false;
        setTimeout(() => { body.classList.remove('opening'); body.style.maxHeight = body.scrollHeight + 'px'; body.dataset.animating = '0'; }, Math.max(400, total * 40 + 400));
      } else {
        closeDetail();
        children.forEach((child, i) => { child.style.animationDelay = ((total - 1 - i) * 30) + 'ms'; });
        body.classList.remove('opening');
        body.classList.add('closing');
        if (chevron) chevron.classList.remove('open');
        alertsCollapsed = true;
        body.style.transition = 'none';
        body.style.maxHeight = body.scrollHeight + 'px';
        body.offsetHeight;
        body.style.transition = '';
        requestAnimationFrame(() => { body.style.maxHeight = '0'; });
        setTimeout(() => { body.classList.remove('closing'); body.classList.add('collapsed'); body.dataset.animating = '0'; }, Math.max(500, total * 30 + 500));
      }
    });
  });

  // Item card → floating detail panel
  document.querySelectorAll('.item-card[data-id]').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.detail-panel.open')) return;
      const id = card.dataset.id;
      const panel = document.getElementById('panel-' + id);
      if (!panel) return;

      if (expandedId === id) {
        // Close — border keeps animating as panel shrinks
        panel.classList.remove('open');
        expandedId = null;
    
        card.style.transition = 'margin-bottom 0.3s ease, transform 0.15s ease';
        card.style.marginBottom = '10px';
        setTimeout(() => {
          card.style.transition = 'none';
          card.classList.remove('is-expanded');
          card.style.marginBottom = '';
          stopCardBorderAnim(card);
          drawCardBorder(card);
          card.offsetHeight;
          card.style.transition = 'transform 0.15s ease';
          requestAnimationFrame(() => { card.style.transition = ''; });
          recalcSectionHeight(card);
        }, 320);
      } else {
        // Close previous
        if (expandedId) {
          const prevPanel = document.getElementById('panel-' + expandedId);
          const prevCard = document.querySelector(`[data-id="${expandedId}"]`);
          if (prevPanel) prevPanel.classList.remove('open');
          if (prevCard) {

            prevCard.style.transition = 'margin-bottom 0.3s ease, transform 0.15s ease';
            prevCard.style.marginBottom = '10px';
            setTimeout(() => {
              prevCard.style.transition = 'none';
              prevCard.classList.remove('is-expanded');
              prevCard.style.marginBottom = '';
              stopCardBorderAnim(prevCard);
              drawCardBorder(prevCard);
              prevCard.offsetHeight;
              prevCard.style.transition = 'transform 0.15s ease';
              requestAnimationFrame(() => { prevCard.style.transition = ''; });
            }, 320);
          }
        }
        // Open this one — immediately grow section to avoid pop-in reflow
        const body = card.closest('.section-body') || card.closest('.tab-frame-content') || card.closest('.current-content');
        if (body) { body.style.transition = 'none'; body.style.maxHeight = body.scrollHeight + 1200 + 'px'; body.offsetHeight; body.style.transition = ''; }
        panel.classList.add('open');
        card.classList.add('is-expanded');
        expandedId = id;
        applyTaskStates(id);
        // Start animating border — RAF loop tracks panel size
        startCardBorderAnim(card, panel);
        setTimeout(() => { recalcSectionHeight(card); }, 350);
        setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 380);
      }
    });
  });

  // Alert card expand/collapse
  document.querySelectorAll('.alert-card[data-alert]').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.alert-detail.open')) return;
      const aid = card.dataset.alert;
      const detail = document.getElementById('alert-detail-' + aid);
      if (!detail) return;

      if (expandedId === aid) {
        detail.style.maxHeight = detail.scrollHeight + 'px';
        requestAnimationFrame(() => { detail.style.maxHeight = '0'; detail.classList.remove('open'); });
        card.classList.remove('is-expanded');
        expandedId = null;
      } else {
        // Close previous alert detail
        if (expandedId && expandedId.startsWith('alert-')) {
          closeAlert(expandedId.replace('alert-', ''));
        } else if (expandedId) {
          closeDetail();
        }
        detail.style.maxHeight = '0';
        detail.classList.add('open');
        requestAnimationFrame(() => {
          detail.style.maxHeight = detail.scrollHeight + 'px';
          // Update parent section/tab-frame-content height
          const body = card.closest('.section-body') || card.closest('.tab-frame-content') || card.closest('.current-content');
          if (body) setTimeout(() => { body.style.maxHeight = body.scrollHeight + 'px'; }, 50);
          setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 150);
        });
        card.classList.add('is-expanded');
        expandedId = aid;
      }
    });
  });

  // Task canvases are initialized on panel open via applyTaskStates()
}

function recalcSectionHeight(el) {
  const body = el.closest('.section-body') || el.closest('.tab-frame-content') || el.closest('.current-content');
  if (body && !body.classList.contains('collapsed')) {
    setTimeout(() => { body.style.maxHeight = body.scrollHeight + 'px'; }, 50);
  }
}

// Telegram
if (window.Telegram && window.Telegram.WebApp) {
  const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
}

function fixSectionHeights() {
  document.querySelectorAll('.section-body').forEach(body => {
    if (!body.classList.contains('collapsed')) {
      body.style.maxHeight = body.scrollHeight + 'px';
    }
  });
}

// Init
document.fonts.ready.then(() => { render(); requestAnimationFrame(fixSectionHeights); });
</script>
</body>
